schema
  @link(url: "https://specs.apollo.dev/link/v1.0")
  @link(url: "https://specs.apollo.dev/join/v0.3", for: EXECUTION) {
  query: Query
}

directive @join__enumValue(graph: join__Graph!) repeatable on ENUM_VALUE

directive @join__graph(name: String!, url: String!) on ENUM_VALUE

directive @join__field(
  graph: join__Graph
  requires: join__FieldSet
  provides: join__FieldSet
  type: String
  external: Boolean
  override: String
  usedOverridden: Boolean
) repeatable on FIELD_DEFINITION | INPUT_FIELD_DEFINITION

directive @join__implements(
  graph: join__Graph!
  interface: String!
) repeatable on OBJECT | INTERFACE

directive @join__type(
  graph: join__Graph!
  key: join__FieldSet
  extension: Boolean! = false
  resolvable: Boolean! = true
  isInterfaceObject: Boolean! = false
) repeatable on OBJECT | INTERFACE | UNION | ENUM | INPUT_OBJECT | SCALAR

directive @join__unionMember(graph: join__Graph!, member: String!) repeatable on UNION

scalar join__FieldSet

directive @link(
  url: String
  as: String
  for: link__Purpose
  import: [link__Import]
) repeatable on SCHEMA

scalar link__Import

enum link__Purpose {
  """
  `SECURITY` features provide metadata necessary to securely resolve fields.
  """
  SECURITY

  """
  `EXECUTION` features provide metadata necessary for operation execution.
  """
  EXECUTION
}

enum join__Graph {
  BOOKS @join__graph(name: "books", url: "")
  REVIEWS @join__graph(name: "reviews", url: "")
}

"""
Book in the catalog
"""
type Book @join__type(graph: BOOKS, key: "isbn") @join__type(graph: REVIEWS, key: "isbn") {
  """
  International Standard Book Number (primary key)
  """
  isbn: ID!
  """
  Book title
  """
  title: String! @join__field(graph: BOOKS)
  """
  Book author
  """
  author: String @join__field(graph: BOOKS)
  """
  Publication year
  """
  year: Int @join__field(graph: BOOKS)
  """
  Reviews for this book
  """
  reviews: [Review!]! @join__field(graph: REVIEWS)
}

type Query @join__type(graph: BOOKS) @join__type(graph: REVIEWS) {
  """
  Get a book by ISBN
  """
  book(isbn: ID!): Book @join__field(graph: BOOKS)
  """
  Get all books
  """
  books: [Book!]! @join__field(graph: BOOKS)
  """
  Get a review by ID
  """
  review(id: ID!): Review @join__field(graph: REVIEWS)
  """
  Get all reviews
  """
  reviews: [Review!]! @join__field(graph: REVIEWS)
}

"""
Book review by a user
"""
type Review @join__type(graph: REVIEWS, key: "id") {
  """
  Review ID (primary key)
  """
  id: ID!
  """
  Foreign key to Book (ISBN)
  """
  bookIsbn: ID!
  """
  Rating from 1-5
  """
  rating: Int!
  """
  Review text content
  """
  content: String
  """
  Book being reviewed
  """
  book: Book!
}
