enum join__Graph {
  PRODUCTS @join__graph(name: "products", url: "") 
  REVIEWS @join__graph(name: "reviews", url: "") 
  USERS @join__graph(name: "users", url: "") 
}

"""
Product in the catalog
"""
type Product @join__type(graph: PRODUCTS, key: "upc")  @join__type(graph: REVIEWS, key: "upc")  {
  """
  Universal Product Code (primary key)
  """
  upc: ID!
  """
  Product name
  """
  name: String! @join__field(graph: PRODUCTS) 
  """
  Product price
  """
  price: Float @join__field(graph: PRODUCTS) 
  """
  Product weight in grams
  """
  weight: Int @join__field(graph: PRODUCTS) 
  """
  Reviews for this product
  """
  reviews: [Review!]! @join__field(graph: REVIEWS) 
}

type Query @join__type(graph: PRODUCTS)  @join__type(graph: REVIEWS)  @join__type(graph: USERS)  {
  """
  Get a product by UPC
  """
  product(upc: ID!) : Product @join__field(graph: PRODUCTS) 
  """
  Get all products
  """
  products: [Product!]! @join__field(graph: PRODUCTS) 
  """
  Get a review by ID
  """
  review(id: ID!) : Review @join__field(graph: REVIEWS) 
  """
  Get all reviews
  """
  reviews: [Review!]! @join__field(graph: REVIEWS) 
  """
  Get a user by email
  """
  user(email: ID!) : User @join__field(graph: USERS) 
  """
  Get all users
  """
  users: [User!]! @join__field(graph: USERS) 
}

"""
Extended User type with reviews
"""
type User @join__type(graph: REVIEWS, key: "email")  @join__type(graph: USERS, key: "email")  {
  """
  User's email address
  """
  email: ID!
  """
  Reviews written by this user
  """
  reviews: [Review!]! @join__field(graph: REVIEWS) 
  """
  User's display name
  """
  name: String @join__field(graph: USERS) 
  """
  Unique username for the account
  """
  username: String @join__field(graph: USERS) 
  """
  User's date of birth
  """
  birthDate: String @join__field(graph: USERS) 
}

"""
Product review by a user
"""
type Review @join__type(graph: REVIEWS, key: "id")  {
  """
  Review ID (primary key)
  """
  id: ID!
  """
  Foreign key to Product (UPC)
  """
  productUpc: ID!
  """
  Foreign key to User (email)
  """
  authorEmail: ID!
  """
  Review text content
  """
  body: String
  """
  Rating from 1-5
  """
  rating: Int
  """
  User who wrote the review
  """
  author: User!
  """
  Product being reviewed
  """
  product: Product!
}
    