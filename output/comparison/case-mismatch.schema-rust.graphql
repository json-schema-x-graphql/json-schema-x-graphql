"User information (defined in camelCase)"
type Userinfo {
  "User ID"
  userId: ID!
  "Full name"
  fullName: String!
  emailAddress: Email
}

"Account details (defined in PascalCase)"
type Accountdetails {
  accountId: ID!
  accountType: String!
  createdAt: DateTime
}

"User profile (defined in snake_case)"
type Userprofile {
  profileId: ID
  bio: String
  avatarUrl: URL
}

"Test schema where $ref paths use different casing than definitions"
type Casemismatchtest {
  "Reference using snake_case when definition is camelCase"
  user: Userinfo
  "Reference using snake_case when definition is PascalCase"
  account: Accountdetails
  "Reference using camelCase when definition is snake_case"
  profile: Userprofile
  "Reference using PascalCase when definition is camelCase"
  alternateUser: Userinfo
}

