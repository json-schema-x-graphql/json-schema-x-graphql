# A comprehensive test schema covering all JSON Schema features for round-trip validation
type ComplexTestSchema @auth {
  address: JSON
  # Age in years
age: Int
  # Combined schema using allOf
allOfExample: JSON
  # Field that accepts either email or URI
anyOfExample: JSON
  complexNested: JSON
  conditionalField: JSON
  dateFields: JSON
  # Email address
email: Email!
  # Unique identifier
id: ID!
  # Active status flag
isActive: Boolean
  # Additional metadata
metadata: JSON
  # Array with mixed types
mixedArray: [JSON]
  # Name field with length constraints
name: String!
  # Field that can be null
nullableField: JSON
  phoneNumbers: [JSON]
  preferences: JSON
  # User roles
roles: [String]
  # Score value
score: Float
  # Current status
status: String
  # Array of tags
tags: [String]
}


