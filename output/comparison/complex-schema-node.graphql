"A comprehensive test schema covering all JSON Schema features for round-trip validation"
type ComplexTestSchema @auth {
  "Unique identifier" id: ID!
  "Name field with length constraints" name: String!
  "Email address" email: Email!
  "Age in years" age: Int
  "Score value" score: Int
  "Active status flag" isActive: Boolean
  "Array of tags" tags: [String]
  "User roles" roles: [String]
  "Additional metadata" metadata: JSON
  "Current status" status: String
  address: JSON
  phoneNumbers: [JSON]
  preferences: JSON
  "Field that can be null" nullableField: String
  "Array with mixed types" mixedArray: [String]
  dateFields: JSON
  complexNested: JSON
  conditionalField: JSON
  "Field that accepts either email or URI" anyOfExample: String
  "Combined schema using allOf" allOfExample: String
}