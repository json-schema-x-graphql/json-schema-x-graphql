"Canonical schema for Public Spending (GDSM) procurement contract data from award_procurement table"
type PublicSpendingProcurementSchema {
  public_spending_procurement: Public SpendingProcurement
}

type Query {
  "Fetch a single Public Spending procurement record by PIID"
  public_spendingProcurement(piid: String!): Public SpendingProcurement
  "Return a list of Public Spending procurement records"
  public_spendingProcurements: [Public SpendingProcurement!]!
}