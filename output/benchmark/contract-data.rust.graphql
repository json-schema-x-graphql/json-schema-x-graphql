"""
Root Contract Data record combining system metadata, identifiers, financial data, vendor information, agency details, and all procurement-related fields.
"""
type ContractRecord {
  agency: Agency
  classification: Classification
  competition: Competition
  compliance: Compliance
  dates: Dates
  """
  Description of requirement
  """
  description: String
  financial: Financial
  identifiers: Identifiers!
  idvReference: IdvReference
  placeOfPerformance: PlaceOfPerformance
  systemMetadata: SystemMetadata!
  vendor: Vendor
}

"""
Core contract identifiers and reference numbers.
"""
type Identifiers {
  """
  Code for the agency involved
  """
  agencyCode: String
  """
  Fiscal year of the award
  """
  awardFiscalYear: String
  """
  Indicates whether record is an award or IDV
  """
  awardOrIdv: String
  """
  Unique identifier for each record in the dataset
  """
  id: Int
  """
  Contract modification number
  """
  modificationNumber: String
  """
  Legacy PIID from previous system
  """
  oldPiid: String
  """
  Original PIID for reference
  """
  originalPiid: String
  """
  Procurement Instrument Identifier - unique contract identifier
  """
  piid: String!
  """
  Name of the agency associated with PIID
  """
  piidAgencyName: String
  """
  Reference to parent contract
  """
  referencePiid: String
  """
  Solicitation identifier
  """
  solicitationId: String
  """
  Transaction sequence number
  """
  transactionNumber: Int
  """
  Record version number
  """
  version: String
}

"""
IDV (Indefinite Delivery Vehicle) reference information for orders under parent contracts.
"""
type IdvReference {
  """
  IDV last date
  """
  idvLastDate: DateTime
  """
  Multiple or single award IDC
  """
  multipleOrSingleAwardIdc: String
  """
  Type of indefinite delivery contract
  """
  typeOfIdc: String
  """
  Who can use the IDV
  """
  whoCanUse: String
}

