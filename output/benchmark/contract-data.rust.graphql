"""
System-level metadata for record tracking, versioning, and lineage.
"""
type SystemMetadata @shareable {
  """
  Timestamp when record was ingested
  """
  ingestedAt: DateTime
  """
  Timestamp when record was last modified at source
  """
  lastModified: DateTime
  """
  Version of the canonical Contract Data schema
  """
  schemaVersion: String
  """
  Primary identifier of the record within Contract Data
  """
  sourceRecordId: String!
  """
  Constant system identifier
  """
  systemName: String!
}

