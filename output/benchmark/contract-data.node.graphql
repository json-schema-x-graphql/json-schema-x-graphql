  ingested_at: DateTime
  "Timestamp when record was last modified at source"
  last_modified: DateTime
  "Version of the canonical Contract Data schema"
  schema_version: String
  "Primary identifier of the record within Contract Data"
  source_record_id: String!
  "Constant system identifier"
  system_name: String!
}

"Parent organization information."
type Parentorganization {
  "Parent DUNS"
  parent_duns_number: String
  "Parent UEI"
  parent_uei: String
  "Parent name"
  parent_vendor_name: String
}

"Vendor information including identity, address, contact, and business classifications."
type Vendor {
  "Annual revenue"
  annual_revenue: Float
  business_classifications: Businessclassifications
  "Commercial and Government Entity code"
  cage_code: String
  "Incorporation country"
  country_of_incorporation: String
  "DBA name"
  doing_business_as_name: String
  "Vendor email"
  email_address: Email
  "Employee count"
  number_of_employees: Int
  "Organization type"
  organizational_type: String
  parent: Parentorganization
  "Incorporation state"
  state_of_incorporation: String
  vendor_address: Address
  "DUNS number (deprecated)"
  vendor_duns_number: String
  "Legal vendor name"
  vendor_name: String
  "Vendor phone"
  vendor_phone_number: String
  "Unique Entity Identifier (Entity Management.gov)"
  vendor_uei: String
}

"Root Contract Data record combining system metadata, identifiers, financial data, vendor information, agency details, and all procurement-related fields."
type Fpdsrecord {
  agency: Agency
  classification: Classification
  competition: Competition
  compliance: Compliance
  dates: Dates
  "Description of requirement"
  description: String
  financial: Financial
  identifiers: Identifiers!
  idv_reference: Idvreference
  place_of_performance: Placeofperformance
  system_metadata: SystemMetadata!
  vendor: Vendor
}

"Canonical, snake_case JSON Schema for the Federal Procurement Data System (Contract Data). This schema represents the complete Contract Data dataset with 600+ fields organized by functional domain. Designed to auto-generate a valid GraphQL SDL subgraph via x-graphql-* hints."
type ContractDataCanonicalSchema {
  contract_data_record: Fpdsrecord
}

type Query {
  "Fetch a single Contract Data record by PIID and agency code"
  contract_dataRecord(piid: String!, agency_code: String): FpdsRecord
  "Return a list of Contract Data records (non-paginated)"
  contract_dataRecords: [FpdsRecord!]!
}
