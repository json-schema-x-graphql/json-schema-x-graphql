services:
  # SQLite Database (shared volume)
  db-init:
    image: alpine:latest
    volumes:
      - mock-data:/data
    command: sh -c "touch /data/mock-data.db && chmod 666 /data/mock-data.db"

  # FPDS Mock Service
  fpds-mock:
    build:
      context: .
      dockerfile: Dockerfile.mock
      args:
        BUILD_ENV: ${BUILD_ENV:-PRODUCTION}
    container_name: example-fpds-mock
    environment:
      - PORT=4001
      - SYSTEM=fpds
      - NODE_ENV=development
    volumes:
      - ../../../generated-schemas:/workspace/generated-schemas:ro
      - ./seed-data:/workspace/seed-data:ro
      - ./mockforge.config.js:/workspace/mockforge.config.js:ro
      - ./mock-server.js:/workspace/mock-server.js:ro
      - ./mock-server.js:/workspace/mock-server.js:ro
      - mock-data:/workspace/data
    ports:
      - "4001:4001"
    depends_on:
      - db-init
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:4001/graphql', (r) => process.exit(r.statusCode === 200 ? 0 : 1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 3

  # USAspending Mock Service
  usaspending-mock:
    build:
      context: .
      dockerfile: Dockerfile.mock
      args:
        BUILD_ENV: ${BUILD_ENV:-PRODUCTION}
    container_name: example-usaspending-mock
    environment:
      - PORT=4002
      - SYSTEM=usaspending
      - NODE_ENV=development
    volumes:
      - ../../../generated-schemas:/workspace/generated-schemas:ro
      - ./seed-data:/workspace/seed-data:ro
      - ./mockforge.config.js:/workspace/mockforge.config.js:ro
      - ./mock-server.js:/workspace/mock-server.js:ro
      - mock-data:/workspace/data
    ports:
      - "4002:4002"
    depends_on:
      - db-init
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:4002/graphql', (r) => process.exit(r.statusCode === 200 ? 0 : 1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 3

  # ASSIST Mock Service
  assist-mock:
    build:
      context: .
      dockerfile: Dockerfile.mock
      args:
        BUILD_ENV: ${BUILD_ENV:-PRODUCTION}
    container_name: example-assist-mock
    environment:
      - PORT=4003
      - SYSTEM=assist
      - NODE_ENV=development
    volumes:
      - ../../../generated-schemas:/workspace/generated-schemas:ro
      - ./seed-data:/workspace/seed-data:ro
      - ./mockforge.config.js:/workspace/mockforge.config.js:ro
      - ./mock-server.js:/workspace/mock-server.js:ro
      - mock-data:/workspace/data
    ports:
      - "4003:4003"
    depends_on:
      - db-init
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:4003/graphql', (r) => process.exit(r.statusCode === 200 ? 0 : 1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 3

  # EASI Mock Service
  easi-mock:
    build:
      context: .
      dockerfile: Dockerfile.mock
      args:
        BUILD_ENV: ${BUILD_ENV:-PRODUCTION}
    container_name: example-easi-mock
    environment:
      - PORT=4004
      - SYSTEM=easi
      - NODE_ENV=development
    volumes:
      - ../../../generated-schemas:/workspace/generated-schemas:ro
      - ./seed-data:/workspace/seed-data:ro
      - ./mockforge.config.js:/workspace/mockforge.config.js:ro
      - ./mock-server.js:/workspace/mock-server.js:ro
      - mock-data:/workspace/data
    ports:
      - "4004:4004"
    depends_on:
      - db-init
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:4004/graphql', (r) => process.exit(r.statusCode === 200 ? 0 : 1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 3

  # CALM Mock Service
  calm-mock:
    build:
      context: .
      dockerfile: Dockerfile.mock
      args:
        BUILD_ENV: ${BUILD_ENV:-PRODUCTION}
    container_name: example-calm-mock
    environment:
      - PORT=4005
      - SYSTEM=calm
      - NODE_ENV=development
    volumes:
      - ../../../generated-schemas:/workspace/generated-schemas:ro
      - ./seed-data:/workspace/seed-data:ro
      - ./mockforge.config.js:/workspace/mockforge.config.js:ro
      - ./mock-server.js:/workspace/mock-server.js:ro
      - mock-data:/workspace/data
    ports:
      - "4005:4005"
    depends_on:
      - db-init
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:4005/graphql', (r) => process.exit(r.statusCode === 200 ? 0 : 1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 3

  # Example Mock Service
  example-mock:
    build:
      context: .
      dockerfile: Dockerfile.mock
      args:
        BUILD_ENV: ${BUILD_ENV:-PRODUCTION}
    container_name: example-example-mock
    environment:
      - PORT=4006
      - SYSTEM=example
      - NODE_ENV=development
    volumes:
      - ../../../generated-schemas:/workspace/generated-schemas:ro
      - ./seed-data:/workspace/seed-data:ro
      - ./mockforge.config.js:/workspace/mockforge.config.js:ro
      - ./mock-server.js:/workspace/mock-server.js:ro
      - mock-data:/workspace/data
    ports:
      - "4006:4006"
    depends_on:
      - db-init
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:4006/graphql', (r) => process.exit(r.statusCode === 200 ? 0 : 1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 3

  # GraphQL Mesh Gateway
  mesh:
    build:
      context: .
      dockerfile: Dockerfile.mesh
      args:
        BUILD_ENV: ${BUILD_ENV:-PRODUCTION}
    container_name: example-mesh-gateway
    environment:
      - NODE_ENV=development
    volumes:
      - ./.meshrc.yaml:/workspace/.meshrc.yaml:ro
      - ../../../generated-schemas:/workspace/generated-schemas:ro
    ports:
      - "5050:5050"
    depends_on:
      - fpds-mock
      - usaspending-mock
      - assist-mock
      - easi-mock
      - calm-mock
      - example-mock
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:5050/graphql', (r) => process.exit(r.statusCode === 200 ? 0 : 1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 3

  # GraphQL Hive Gateway (The Guild's federation gateway)
  hive-gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
      args:
        BUILD_ENV: ${BUILD_ENV:-PRODUCTION}
    container_name: example-hive-gateway
    environment:
      - NODE_ENV=development
      - PORT=5100
    volumes:
      - ./gateway.config.ts:/workspace/gateway.config.ts:ro
      - ../../../generated-schemas:/workspace/generated-schemas:ro
    ports:
      - "5100:5100"
    depends_on:
      fpds-mock:
        condition: service_healthy
      usaspending-mock:
        condition: service_healthy
      assist-mock:
        condition: service_healthy
      easi-mock:
        condition: service_healthy
      calm-mock:
        condition: service_healthy
      example-mock:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:5100/graphql?query=%7B__typename%7D', (r) => process.exit(r.statusCode === 200 ? 0 : 1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  # Legacy MockForge (single service - for backwards compatibility)
  mockforge:
    build:
      context: .
      dockerfile: Dockerfile.mock
      args:
        BUILD_ENV: ${BUILD_ENV:-PRODUCTION}
    container_name: example-mockforge
    working_dir: /workspace
    environment:
      - PORT=3000
      - DOCKER=1
      - NODE_ENV=development
    volumes:
      - ./gateway-server.js:/workspace/gateway-server.js:ro
      - ../../../generated-schemas:/workspace/generated-schemas:ro
    ports:
      - "3000:3000"
    depends_on:
      - fpds-mock
      - usaspending-mock
      - assist-mock
      - easi-mock
      - calm-mock
      - example-mock
    command: ["node", "gateway-server.js"]
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/graphql?query=%7B__typename%7D', (r) => process.exit(r.statusCode === 200 ? 0 : 1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  mock-data:
    driver: local

networks:
  default:
    name: example-mock-network
