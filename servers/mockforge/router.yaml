# Apollo Router Configuration for Petrified Forest Mock Services

# Subgraph URL overrides
override_subgraph_url:
  fpds: http://fpds-mock:4001/graphql
  usaspending: http://usaspending-mock:4002/graphql
  assist: http://assist-mock:4003/graphql
  easi: http://easi-mock:4004/graphql
  calm: http://calm-mock:4005/graphql

# CORS configuration
cors:
  origins:
    - https://*.cloud.gov
    - http://localhost:*

# Health check endpoint
health_check:
  listen: 0.0.0.0:8088
