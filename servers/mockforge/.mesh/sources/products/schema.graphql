scalar _Any

scalar _FieldSet

scalar link__Import

enum link__Purpose {
  SECURITY
  EXECUTION
}

type _Service {
  sdl: String!
}

type Query {
  """Get a product by UPC"""
  product(upc: String!): Product
  """Get all products"""
  products: [Product!]!
}

"""Product in the catalog"""
type Product {
  """Universal Product Code (primary key)"""
  upc: String!
  """Product name"""
  name: String
  """Product price in cents"""
  price: Int
  """Product weight in grams"""
  weight: Int
}