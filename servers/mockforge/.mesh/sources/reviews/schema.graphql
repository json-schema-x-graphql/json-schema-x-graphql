scalar _Any

scalar _FieldSet

scalar link__Import

enum link__Purpose {
  SECURITY
  EXECUTION
}

type _Service {
  sdl: String!
}

type Query {
  """Get a review by ID"""
  review(id: ID!): Review
  """Get all reviews"""
  reviews: [Review!]!
}

"""Product review entity"""
type Review {
  """Review unique identifier"""
  id: ID!
  """Review body text"""
  body: String
  """Review author (provides username field)"""
  author: User
  """Product being reviewed"""
  product: Product
}

"""Extended User type with reviews"""
type User {
  """User's email address (from Users service)"""
  email: ID!
  """Reviews written by this user"""
  reviews: [Review]
}

"""Extended Product type with reviews"""
type Product {
  """Universal Product Code (from Products service)"""
  upc: String!
  """Reviews for this product"""
  reviews: [Review]
}