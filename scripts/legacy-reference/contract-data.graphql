# Contract Data, Legacy Procurement, Intake Process, Logistics Mgmt mapping SDL
#
# This file contains GraphQL SDL type definitions for the four systems
# (Contract Data, Legacy Procurement, Intake Process, Logistics Mgmt). Each field that should be included in the
# mapping output is annotated with the `@mapFrom(path: "...")` directive.
#
# The generator script should:
#  - parse the SDL,
#  - read every type intended to be exported (here: Contract Data_Contract, Legacy Procurement_Contract, Intake Process_Contract, Logistics Mgmt_Contract),
#  - for each field, if `@mapFrom(path: "...")` is present, emit a JSON mapping
#    where the GraphQL field name maps to the literal path string.
#
# Example produced JSON for Legacy Procurement (conceptual):
# {
#   "piid": "acquisitionData.iaPiidOrUniqueId",
#   "contractTitle": "awardData.purpose",
#   ...
# }
#
# Place generator CLI and mapping script alongside these SDLs, or have the generator
# read this file to discover all subgraph mapping types. Keep the `@mapFrom` paths
# synchronized with your archived mapping files (src/data/archived/*).
#
# Note: This file groups all subgraphs for convenience under a single SDL file
# (scripts/contract_data.graphql). If you later want separate files per subgraph, split them.

directive @mapFrom(path: String!) on FIELD_DEFINITION
directive @mapHint(note: String) on FIELD_DEFINITION

"""
Contract Data subgraph: minimal set of mapped fields
"""
type ContractData_Contract {
  piid: String @mapFrom(path: "commonElements.contractIdentification.piid")
  originalAwardPiid: String
    @mapFrom(path: "commonElements.contractIdentification.originalAwardPiid")
  contractTitle: String @mapFrom(path: "commonElements.contractIdentification.contractTitle")
  contractType: String @mapFrom(path: "commonElements.contractIdentification.contractType")
  descriptionOfRequirement: String
    @mapFrom(path: "commonElements.contractIdentification.descriptionOfRequirement")
  contractingAgencyCode: String
    @mapFrom(path: "commonElements.organizationInfo.contractingAgency.code")
  contractingAgencyName: String
    @mapFrom(path: "commonElements.organizationInfo.contractingAgency.name")
  vendorName: String @mapFrom(path: "commonElements.vendorInfo.vendorName")
  vendorUei: String @mapFrom(path: "commonElements.vendorInfo.vendorUei")
  placeOfPerformanceCity: String @mapFrom(path: "commonElements.placeOfPerformance.city")
  placeOfPerformanceState: String @mapFrom(path: "commonElements.placeOfPerformance.state")
  totalContractValue: String @mapFrom(path: "commonElements.financialInfo.totalContractValue")
  baseAndAllOptionsValue: String
    @mapFrom(path: "commonElements.financialInfo.baseAndAllOptionsValue")
  independentGovernmentEstimate: String
    @mapFrom(path: "commonElements.financialInfo.independentGovernmentEstimate")
  effectiveDate: String @mapFrom(path: "commonElements.contractCharacteristics.effectiveDate")
  expirationDate: String @mapFrom(path: "commonElements.contractCharacteristics.expirationDate")
  status: String @mapFrom(path: "commonElements.statusInfo.status")
}

