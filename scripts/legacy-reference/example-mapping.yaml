# Example mapping configuration for generating system-specific example JSON
# from canonical archived mapping files.
#
# Intended usage:
# - A small generator script should read this YAML, load the referenced source
#   archive JSON (under `sources`), then apply the mapping templates to produce
#   example JSON files under `output.dir`.
# - Mapping expression types:
#     - copy: "<json.pointer>"         -> copy value from source JSON (dot-notation)
#     - literal: <value>               -> literal value
#     - template: "<string {{place}}>" -> string with simple placeholder replacement
#     - now:                            -> generator should substitute current timestamp
#     - pick: [ "a", "b", ... ]        -> pick first (or optionally random)
#     - array_from: "<json.pointer>"   -> take an array from source
#     - generate: { type: "uuid" }     -> generator-side helper
#
# This YAML is intentionally conservative and declarative — the generator code
# is responsible for interpreting the mapping directives. Keep templates small
# and reuse `&common` anchor where possible to make maintenance easy.

version: "1.0"
description: |
  Mapping definitions for generating maintainable example JSON outputs for
  Contract Data, Legacy Procurement, EASi and Logistics Mgmt systems. Templates reuse archived mapping files
  in `src/data/archived/` as canonical inputs, and define per-system overrides
  to produce compact, human-readable example JSON records for the site.
output:
  dir: "public/data/generated/examples" # where generator should write example files
  pretty_print: true
  default_count: 1

sources:
  legacy_procurement:
    path: "src/data/archived/schema_unification2legacy_procurement.json"
    description: "Archived Legacy Procurement-to-Schema Unification mapping sample (structure + sample fields)"
  contract_data:
    path: "src/data/archived/schema_unification2contract_data.json"
    description: "Archived Contract Data mapping and example data"
  intake_process:
    path: "src/data/archived/schema-unification2intake_process.json"
    description: "Archived EASi mapping (note: filename spelling preserved)"
  # Logistics Mgmt does not have a direct archived example file; can reuse Legacy Procurement or Contract Data as a base
  logistics_mgmt:
    path: "src/data/archived/schema_unification2legacy_procurement.json"
    description: "Use Legacy Procurement archive as base for Logistics Mgmt example; override primarySystem"

# Shared mapping pieces reused by each system template
mapping_templates:
  common: &common
    systemMetadata:
      primarySystem:
        template: "{{SYSTEM}}" # replaced by generator with the system key
      globalRecordId:
        template: "PETRIFIED-{{SYSTEM}}-{{SEQ}}-2024"
      schemaVersion:
        literal: "2.0"
      lastModified:
        now: true
      systemChain:
        # pick systemChain from archive (array) if present; generator will copy or truncate
        array_from: "systemMetadata.systemChain"
    commonElements:
      contractIdentification:
        piid:
          copy: "commonElements.contractIdentification.piid"
        originalAwardPiid:
          copy: "commonElements.contractIdentification.originalAwardPiid"
        referencedPiid:
          copy: "commonElements.contractIdentification.referencedPiid"
        contractTitle:
          copy: "commonElements.contractIdentification.contractTitle"
        contractType:
          copy: "commonElements.contractIdentification.contractType"
        descriptionOfRequirement:
          copy: "commonElements.contractIdentification.descriptionOfRequirement"
      organizationInfo:
        contractingAgency:
          code:
            copy: "commonElements.organizationInfo.contractingAgency.code"
          name:
            copy: "commonElements.organizationInfo.contractingAgency.name"
        contractingDepartment:
          code:
            copy: "commonElements.organizationInfo.contractingDepartment.code"
          name:
            copy: "commonElements.organizationInfo.contractingDepartment.name"
      vendorInfo:
        vendorName:
          copy: "commonElements.vendorInfo.vendorName"
        vendorUei:
          copy: "commonElements.vendorInfo.vendorUei"
      placeOfPerformance:
        streetAddress:
          copy: "commonElements.placeOfPerformance.streetAddress"
        city:
          copy: "commonElements.placeOfPerformance.city"
        state:
          copy: "commonElements.placeOfPerformance.state"
        zip:
          copy: "commonElements.placeOfPerformance.zip"
      financialInfo:
        totalContractValue:
          copy: "commonElements.financialInfo.totalContractValue"
        amountSpentOnProduct:
          copy: "commonElements.financialInfo.amountSpentOnProduct"
      statusInfo:
        status:
          copy: "commonElements.statusInfo.status"
        isActive:
          copy: "commonElements.statusInfo.isActive"

  # Contract Data-specific overrides or expanded structure
  contract_data:
    <<: *common
    systemMetadata:
      primarySystem:
        literal: "Contract Data"
      globalRecordId:
        template: "PETRIFIED-Contract Data-{{SEQ}}"
      # prefer to use first element of systemChain if archive has it
      systemChain:
        array_from: "systemMetadata.systemChain"
    commonElements:
      contractIdentification:
        piid:
          # In archived Contract Data example it's a simple string; if numeric keep literal
          copy: "commonElements.contractIdentification.piid"
      businessClassification:
        naicsCode:
          copy: "commonElements.businessClassification.naicsCode"
        pscCode:
          copy: "commonElements.businessClassification.pscCode"
      # Contract Data specific system extensions
    systemExtensions:
      contract_data:
        copy: "systemExtensions.contract_data" # copy the entire contract_data extension array if present

  # Legacy Procurement-specific overrides
  legacy_procurement:
    <<: *common
    systemMetadata:
      primarySystem:
        literal: "Legacy Procurement"
      globalRecordId:
        template: "PETRIFIED-Legacy Procurement-{{SEQ}}"
    commonElements:
      contractIdentification:
        piid:
          # Some archived Legacy Procurement templates use dot-paths pointing into source raw record;
          # generator should copy existing example values where present or synthesize a sample.
          copy: "commonElements.contractIdentification.piid"
      contacts:
        array_from: "commonElements.contacts" # retain contact list from archive if present
    systemExtensions:
      legacy_procurement:
        copy: "systemExtensions.legacy_procurement"

  # EASi-specific overrides
  intake_process:
    <<: *common
    systemMetadata:
      primarySystem:
        literal: "Intake Process"
      globalRecordId:
        template: "PETRIFIED-Intake Process-{{SEQ}}"
    commonElements:
      contractIdentification:
        piid:
          copy: "commonElements.contractIdentification.piid"
    systemExtensions:
      intake_process:
        copy: "systemExtensions.intake_process"

  # Logistics Mgmt uses Legacy Procurement archive as base but primarySystem overridden
  logistics_mgmt:
    <<: *common
    systemMetadata:
      primarySystem:
        literal: "Logistics Mgmt"
      globalRecordId:
        template: "PETRIFIED-Logistics Mgmt-{{SEQ}}"
    # Logistics Mgmt-specific differences can be injected via overrides below
    commonElements:
      contractIdentification:
        piid:
          template: "Logistics Mgmt-{{SEQ}}-{{RAND}}"
      systemExtensions:
        logistics_mgmt:
          literal:
            - fieldName: "logistics_mgmtLegacyNote"
              fieldType: "string"
              value: "Generated Logistics Mgmt sample for demonstration"
              logistics_mgmtSpecific:
                legacySystem: true

# Example generation targets - each entry describes a single file to produce.
# Generator should iterate this list and write out files under output.dir.
# Use `{{SEQ}}` as a sequence number (1..n) and `{{RAND}}` for a short random suffix if helpful.
examples:
  - id: "contract_data-sample"
    system: "contract_data"
    template: "contract_data"
    count: 1
    output: "contract_data.json"
    notes: "Compact Contract Data example based on archived mapping"

  - id: "legacy_procurement-sample"
    system: "legacy_procurement"
    template: "legacy_procurement"
    count: 1
    output: "legacy_procurement.json"
    notes: "Legacy Procurement example using archived schema_unification2legacy_procurement.json structure"

  - id: "intake_process-sample"
    system: "intake_process"
    template: "intake_process"
    count: 1
    output: "intake_process.json"
    notes: "EASi example"

  - id: "logistics_mgmt-sample"
    system: "logistics_mgmt"
    template: "logistics_mgmt"
    count: 1
    output: "logistics_mgmt.json"
    notes: "Logistics Mgmt example synthesized from Legacy Procurement archive with Logistics Mgmt-specific overrides"

# Optional helpers and generation hints that the generator script can consume.
hints:
  seq_start: 1
  timestamp_format: "iso8601"
  random_suffix_length: 6
  preserve_array_order: true
  copy_missing_fallback: "literal" # if copy pointer missing, fallback to literal/default if provided
  example_comment:
    - "This file is generated from mapping definitions in scripts/example-mapping.yaml"
    - "To regenerate, run: node scripts/generate-examples.mjs (implement this small script to interpret the mapping)"

# Maintainer notes:
# - Keep templates DRY: add common field mappings to `mapping_templates.common` and override
#   system-specific fields under each system template.
# - When you add new archived source JSONs, add them under `sources:` and wire a new template.
# - The generator script should be idempotent: write files only when contents change (for cleaner diffs).
