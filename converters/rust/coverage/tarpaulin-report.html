ine":36}},{"line":786,"address":[],"length":0,"stats":{"Line":78}},{"line":787,"address":[],"length":0,"stats":{"Line":156}},{"line":788,"address":[],"length":0,"stats":{"Line":156}},{"line":789,"address":[],"length":0,"stats":{"Line":498}},{"line":790,"address":[],"length":0,"stats":{"Line":349}},{"line":791,"address":[],"length":0,"stats":{"Line":7}},{"line":792,"address":[],"length":0,"stats":{"Line":349}},{"line":793,"address":[],"length":0,"stats":{"Line":28}},{"line":794,"address":[],"length":0,"stats":{"Line":7}},{"line":796,"address":[],"length":0,"stats":{"Line":656}},{"line":799,"address":[],"length":0,"stats":{"Line":78}},{"line":802,"address":[],"length":0,"stats":{"Line":4}},{"line":803,"address":[],"length":0,"stats":{"Line":8}},{"line":804,"address":[],"length":0,"stats":{"Line":8}},{"line":805,"address":[],"length":0,"stats":{"Line":24}},{"line":806,"address":[],"length":0,"stats":{"Line":16}},{"line":807,"address":[],"length":0,"stats":{"Line":0}},{"line":808,"address":[],"length":0,"stats":{"Line":20}},{"line":809,"address":[],"length":0,"stats":{"Line":16}},{"line":810,"address":[],"length":0,"stats":{"Line":4}},{"line":812,"address":[],"length":0,"stats":{"Line":24}},{"line":815,"address":[],"length":0,"stats":{"Line":4}},{"line":818,"address":[],"length":0,"stats":{"Line":4}},{"line":819,"address":[],"length":0,"stats":{"Line":12}},{"line":820,"address":[],"length":0,"stats":{"Line":20}},{"line":821,"address":[],"length":0,"stats":{"Line":8}},{"line":822,"address":[],"length":0,"stats":{"Line":4}}],"covered":329,"coverable":446},{"path":["/","Users","johnhjediny","Documents","GitHub","json-schema-x-graphql","converters","rust","src","lib.rs"],"content":"//! JSON Schema x GraphQL Converter\n//!\n//! Bidirectional, lossless converter between JSON Schema and GraphQL SDL\n//! using standardized `x-graphql-*` extensions.\n//!\n//! # Features\n//!\n//! - Convert JSON Schema to GraphQL SDL\n//! - Convert GraphQL SDL to JSON Schema\n//! - Preserve all metadata via `x-graphql-*` extensions\n//! - Support for Apollo Federation directives\n//! - WASM-compatible for browser usage\n//! - Optional LRU caching for performance\n//!\n//! # Example\n//!\n//! ```rust\n//! use json_schema_graphql_converter::{Converter, ConversionDirection};\n//!\n//! let converter = Converter::new();\n//! let json_schema = r#\"{\"type\": \"object\", \"x-graphql-type-name\": \"User\"}\"#;\n//!\n//! let result = converter.convert(json_schema, ConversionDirection::JsonSchemaToGraphQL);\n//! ```\n\npub mod error;\npub mod graphql_to_json;\npub mod json_to_graphql;\npub mod types;\npub mod validator;\n\n#[cfg(feature = \"wasm\")]\npub mod wasm;\n\npub use error::{ConversionError, Result};\npub use types::{ConversionDirection, ConversionOptions};\n\nuse serde_json::Value as JsonValue;\n\n/// Main converter struct\npub struct Converter {\n    options: ConversionOptions,\n    #[cfg(feature = \"caching\")]\n    cache: std::sync::Mutex\u003clru::LruCache\u003cString, String\u003e\u003e,\n}\n\nimpl Converter {\n    /// Create a new converter with default options\n    pub fn new() -\u003e Self {\n        Self::with_options(ConversionOptions::default())\n    }\n\n    /// Create a new converter with custom options\n    pub fn with_options(options: ConversionOptions) -\u003e Self {\n        Self {\n            options,\n            #[cfg(feature = \"caching\")]\n            cache: std::sync::Mutex::new(lru::LruCache::new(\n                std::num::NonZeroUsize::new(100).unwrap(),\n            )),\n        }\n    }\n\n    /// Convert between JSON Schema and GraphQL SDL\n    pub fn convert(\u0026self, input: \u0026str, direction: ConversionDirection) -\u003e Result\u003cString\u003e {\n        #[cfg(feature = \"caching\")]\n        {\n            let cache_key = format!(\"{:?}:{}\", direction, input);\n            if let Ok(mut cache) = self.cache.lock() {\n                if let Some(cached) = cache.get(\u0026cache_key) {\n                    return Ok(cached.clone());\n                }\n            }\n        }\n\n        let result = match direction {\n            ConversionDirection::JsonSchemaToGraphQL =\u003e self.json_schema_to_graphql(input)?,\n            ConversionDirection::GraphQLToJsonSchema =\u003e self.graphql_to_json_schema(input)?,\n        };\n\n        #[cfg(feature = \"caching\")]\n        {\n            let cache_key = format!(\"{:?}:{}\", direction, input);\n            if let Ok(mut cache) = self.cache.lock() {\n                cache.put(cache_key, result.clone());\n            }\n        }\n\n        Ok(result)\n    }\n\n    /// Convert JSON Schema to GraphQL SDL\n    pub fn json_schema_to_graphql(\u0026self, json_schema: \u0026str) -\u003e Result\u003cString\u003e {\n        let schema: JsonValue = serde_json::from_str(json_schema)\n            .map_err(|e| ConversionError::InvalidJsonSchema(e.to_string()))?;\n\n        if self.options.validate {\n            validator::validate_json_schema(\u0026schema)?;\n        }\n\n        json_to_graphql::convert(\u0026schema, \u0026self.options)\n    }\n\n    /// Convert GraphQL SDL to JSON Schema\n    pub fn graphql_to_json_schema(\u0026self, graphql_sdl: \u0026str) -\u003e Result\u003cString\u003e {\n        if self.options.validate {\n            validator::validate_graphql_sdl(graphql_sdl)?;\n        }\n\n        let schema = graphql_to_json::convert(graphql_sdl, \u0026self.options)?;\n        serde_json::to_string_pretty(\u0026schema).map_err(Into::into)\n    }\n\n    /// Get current options\n    pub fn options(\u0026self) -\u003e \u0026ConversionOptions {\n        \u0026self.options\n    }\n\n    /// Clear cache (only available with caching feature)\n    #[cfg(feature = \"caching\")]\n    pub fn clear_cache(\u0026self) {\n        if let Ok(mut cache) = self.cache.lock() {\n            cache.clear();\n        }\n    }\n}\n\nimpl Default for Converter {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_converter_creation() {\n        let converter = Converter::new();\n        assert_eq!(converter.options().validate, true);\n    }\n\n    #[test]\n    fn test_converter_with_options() {\n        let options = ConversionOptions {\n            validate: false,\n            include_descriptions: true,\n            preserve_field_order: true,\n            federation_version: 2,\n            infer_ids: false,\n        };\n        let converter = Converter::with_options(options);\n        assert_eq!(converter.options().validate, false);\n    }\n\n    #[test]\n    fn test_simple_json_to_graphql() {\n        let converter = Converter::new();\n        let json_schema = r#\"{\n            \"$schema\": \"https://json-schema.org/draft/2020-12/schema\",\n            \"type\": \"object\",\n            \"x-graphql-type-name\": \"User\",\n            \"properties\": {\n                \"id\": {\n                    \"type\": \"string\",\n                    \"x-graphql-type\": \"ID!\"\n                },\n                \"name\": {\n                    \"type\": \"string\"\n                }\n            }\n        }\"#;\n\n        let result = converter.json_schema_to_graphql(json_schema);\n        assert!(result.is_ok());\n        let graphql = result.unwrap();\n        assert!(graphql.contains(\"type User\"));\n        assert!(graphql.contains(\"id: ID!\"));\n    }\n\n    #[test]\n    fn test_invalid_json_schema() {\n        let converter = Converter::new();\n        let invalid_json = \"not valid json{\";\n\n        let result = converter.json_schema_to_graphql(invalid_json);\n        assert!(result.is_err());\n    }\n\n    #[cfg(feature = \"caching\")]\n    #[test]\n    fn test_caching() {\n        let converter = Converter::new();\n        let json_schema = r#\"{\n            \"type\": \"object\",\n            \"x-graphql-type-name\": \"User\"\n        }\"#;\n\n        // First call\n        let result1 = converter.convert(json_schema, ConversionDirection::JsonSchemaToGraphQL);\n        assert!(result1.is_ok());\n\n        // Second call should hit cache\n        let result2 = converter.convert(json_schema, ConversionDirection::JsonSchemaToGraphQL);\n        assert!(result2.is_ok());\n        assert_eq!(result1.unwrap(), result2.unwrap());\n\n        // Clear cache\n        converter.clear_cache();\n    }\n}\n","traces":[{"line":49,"address":[],"length":0,"stats":{"Line":24}},{"line":50,"address":[],"length":0,"stats":{"Line":48}},{"line":54,"address":[],"length":0,"stats":{"Line":65}},{"line":58,"address":[],"length":0,"stats":{"Line":65}},{"line":65,"address":[],"length":0,"stats":{"Line":0}},{"line":76,"address":[],"length":0,"stats":{"Line":0}},{"line":77,"address":[],"length":0,"stats":{"Line":0}},{"line":78,"address":[],"length":0,"stats":{"Line":0}},{"line":89,"address":[],"length":0,"stats":{"Line":0}},{"line":93,"address":[],"length":0,"stats":{"Line":61}},{"line":94,"address":[],"length":0,"stats":{"Line":238}},{"line":95,"address":[],"length":0,"stats":{"Line":70}},{"line":97,"address":[],"length":0,"stats":{"Line":58}},{"line":98,"address":[],"length":0,"stats":{"Line":116}},{"line":101,"address":[],"length":0,"stats":{"Line":174}},{"line":105,"address":[],"length":0,"stats":{"Line":6}},{"line":106,"address":[],"length":0,"stats":{"Line":6}},{"line":107,"address":[],"length":0,"stats":{"Line":14}},{"line":110,"address":[],"length":0,"stats":{"Line":16}},{"line":111,"address":[],"length":0,"stats":{"Line":12}},{"line":115,"address":[],"length":0,"stats":{"Line":2}},{"line":116,"address":[],"length":0,"stats":{"Line":2}},{"line":129,"address":[],"length":0,"stats":{"Line":0}},{"line":130,"address":[],"length":0,"stats":{"Line":0}}],"covered":17,"coverable":24},{"path":["/","Users","johnhjediny","Documents","GitHub","json-schema-x-graphql","converters","rust","src","types.rs"],"content":"//! Core types for JSON Schema x GraphQL conversion\n\nuse serde::{Deserialize, Serialize};\nuse std::collections::HashMap;\n\n/// Direction of conversion\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Hash, Serialize, Deserialize)]\npub enum ConversionDirection {\n    /// Convert from JSON Schema to GraphQL SDL\n    JsonSchemaToGraphQL,\n    /// Convert from GraphQL SDL to JSON Schema\n    GraphQLToJsonSchema,\n}\n\n/// Options for conversion\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct ConversionOptions {\n    /// Whether to validate input before conversion\n    pub validate: bool,\n    /// Whether to include description fields\n    pub include_descriptions: bool,\n    /// Whether to preserve field order from source\n    pub preserve_field_order: bool,\n    /// Apollo Federation version (1 or 2)\n    pub federation_version: u8,\n    /// Whether to automatically infer ID scalar for fields named \"id\", \"_id\", etc.\n    pub infer_ids: bool,\n}\n\nimpl Default for ConversionOptions {\n    fn default() -\u003e Self {\n        Self {\n            validate: true,\n            include_descriptions: true,\n            preserve_field_order: true,\n            federation_version: 2,\n            infer_ids: false,\n        }\n    }\n}\n\n#[derive(Debug, Clone, PartialEq, Eq)]\npub enum GqlScalar {\n    String,\n    Int,\n    Float,\n    Boolean,\n    Id,\n    Custom(String),\n}\n\n#[derive(Debug, Clone, PartialEq, Eq)]\npub enum GqlType {\n    Scalar(GqlScalar),\n    List(Box\u003cGqlType\u003e),\n    NonNull(Box\u003cGqlType\u003e),\n}\n\n#[derive(Debug, Clone, PartialEq)]\npub enum GqlValue {\n    Variable(String),\n    Int(i64),\n    Float(f64),\n    String(String),\n    Boolean(bool),\n    Null,\n    Enum(String),\n    List(Vec\u003cGqlValue\u003e),\n    Object(HashMap\u003cString, GqlValue\u003e),\n}\n\n/// GraphQL type information\n#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]\npub struct GraphQLType {\n    /// Type name (e.g., \"String\", \"User\")\n    pub name: String,\n    /// Whether the type is required (non-null)\n    pub required: bool,\n    /// Whether the type is a list\n    pub is_list: bool,\n    /// Whether the list items are required (for lists only)\n    pub list_item_required: bool,\n}\n\nimpl GraphQLType {\n    /// Create a new GraphQL type\n    pub fn new(name: impl Into\u003cString\u003e) -\u003e Self {\n        Self {\n            name: name.into(),\n            required: false,\n            is_list: false,\n            list_item_required: false,\n        }\n    }\n\n    /// Make this type required (non-null)\n    pub fn required(mut self) -\u003e Self {\n        self.required = true;\n        self\n    }\n\n    /// Make this type a list\n    pub fn list(mut self) -\u003e Self {\n        self.is_list = true;\n        self\n    }\n\n    /// Make list items required\n    pub fn list_item_required(mut self) -\u003e Self {\n        self.list_item_required = true;\n        self\n    }\n\n    /// Convert to GraphQL SDL notation\n    pub fn to_sdl(\u0026self) -\u003e String {\n        let mut result = String::new();\n\n        if self.is_list {\n            result.push('[');\n            result.push_str(\u0026self.name);\n            if self.list_item_required {\n                result.push('!');\n            }\n            result.push(']');\n        } else {\n            result.push_str(\u0026self.name);\n        }\n\n        if self.required {\n            result.push('!');\n        }\n\n        result\n    }\n\n    /// Parse from GraphQL SDL notation\n    pub fn from_sdl(sdl: \u0026str) -\u003e Result\u003cSelf, String\u003e {\n        let mut chars = sdl.trim().chars().peekable();\n        let mut is_list = false;\n        let mut list_item_required = false;\n        let mut name = String::new();\n        let mut required = false;\n\n        // Check for list\n        if chars.peek() == Some(\u0026'[') {\n            is_list = true;\n            chars.next(); // consume '['\n\n            // Read type name\n            while let Some(\u0026ch) = chars.peek() {\n                if ch == '!' {\n                    list_item_required = true;\n                    chars.next();\n                } else if ch == ']' {\n                    chars.next();\n                    break;\n                } else {\n                    name.push(ch);\n                    chars.next();\n                }\n            }\n        } else {\n            // Not a list, read type name\n            while let Some(\u0026ch) = chars.peek() {\n                if ch == '!' {\n                    break;\n                } else {\n                    name.push(ch);\n                    chars.next();\n                }\n            }\n        }\n\n        // Check for required\n        if chars.peek() == Some(\u0026'!') {\n            required = true;\n        }\n\n        if name.is_empty() {\n            return Err(\"Empty type name\".to_string());\n        }\n\n        Ok(Self {\n            name: name.trim().to_string(),\n            required,\n            is_list,\n            list_item_required,\n        })\n    }\n}\n\n/// GraphQL field argument\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct GraphQLArgument {\n    /// Argument name\n    pub name: String,\n    /// Argument type\n    pub type_info: GraphQLType,\n    /// Optional description\n    pub description: Option\u003cString\u003e,\n    /// Optional default value\n    pub default_value: Option\u003cString\u003e,\n}\n\n/// GraphQL field definition\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct GraphQLField {\n    /// Field name\n    pub name: String,\n    /// Field type\n    pub type_info: GraphQLType,\n    /// Optional description\n    pub description: Option\u003cString\u003e,\n    /// Field arguments\n    pub arguments: Vec\u003cGraphQLArgument\u003e,\n    /// Directives applied to this field\n    pub directives: Vec\u003cGraphQLDirective\u003e,\n}\n\n/// GraphQL directive\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct GraphQLDirective {\n    /// Directive name (without @)\n    pub name: String,\n    /// Directive arguments\n    pub arguments: HashMap\u003cString, String\u003e,\n}\n\nimpl GraphQLDirective {\n    /// Create a new directive\n    pub fn new(name: impl Into\u003cString\u003e) -\u003e Self {\n        Self {\n            name: name.into(),\n            arguments: HashMap::new(),\n        }\n    }\n\n    /// Add an argument to the directive\n    pub fn with_arg(mut self, key: impl Into\u003cString\u003e, value: impl Into\u003cString\u003e) -\u003e Self {\n        self.arguments.insert(key.into(), value.into());\n        self\n    }\n\n    /// Convert to SDL notation\n    pub fn to_sdl(\u0026self) -\u003e String {\n        let mut result = format!(\"@{}\", self.name);\n\n        if !self.arguments.is_empty() {\n            result.push('(');\n            let args: Vec\u003cString\u003e = self\n                .arguments\n                .iter()\n                .map(|(k, v)| format!(\"{}: {}\", k, v))\n                .collect();\n            result.push_str(\u0026args.join(\", \"));\n            result.push(')');\n        }\n\n        result\n    }\n}\n\n/// GraphQL type definition (Object, Interface, etc.)\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct GraphQLTypeDefinition {\n    /// Type kind\n    pub kind: GraphQLTypeKind,\n    /// Type name\n    pub name: String,\n    /// Optional description\n    pub description: Option\u003cString\u003e,\n    /// Fields (for objects and interfaces)\n    pub fields: Vec\u003cGraphQLField\u003e,\n    /// Interfaces this type implements\n    pub implements: Vec\u003cString\u003e,\n    /// Directives applied to this type\n    pub directives: Vec\u003cGraphQLDirective\u003e,\n    /// Enum values (for enums only)\n    pub enum_values: Vec\u003cGraphQLEnumValue\u003e,\n    /// Union member types (for unions only)\n    pub union_types: Vec\u003cString\u003e,\n}\n\n/// GraphQL type kind\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Serialize, Deserialize)]\npub enum GraphQLTypeKind {\n    Object,\n    Interface,\n    Enum,\n    Union,\n    InputObject,\n    Scalar,\n}\n\n/// GraphQL enum value\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct GraphQLEnumValue {\n    /// Value name\n    pub name: String,\n    /// Optional description\n    pub description: Option\u003cString\u003e,\n    /// Directives applied to this enum value\n    pub directives: Vec\u003cGraphQLDirective\u003e,\n}\n\n/// JSON Schema property definition\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct JsonSchemaProperty {\n    /// Property name (snake_case)\n    pub name: String,\n    /// JSON Schema type\n    pub schema_type: JsonSchemaType,\n    /// Optional description\n    pub description: Option\u003cString\u003e,\n    /// GraphQL field name (camelCase)\n    pub graphql_name: Option\u003cString\u003e,\n    /// GraphQL type override\n    pub graphql_type: Option\u003cString\u003e,\n    /// Whether this property is required\n    pub required: bool,\n}\n\n/// JSON Schema type\n#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]\npub enum JsonSchemaType {\n    String,\n    Number,\n    Integer,\n    Boolean,\n    Object,\n    Array,\n    Null,\n}\n\nimpl JsonSchemaType {\n    /// Convert from JSON Schema type string\n    pub fn from_str(s: \u0026str) -\u003e Option\u003cSelf\u003e {\n        match s {\n            \"string\" =\u003e Some(Self::String),\n            \"number\" =\u003e Some(Self::Number),\n            \"integer\" =\u003e Some(Self::Integer),\n            \"boolean\" =\u003e Some(Self::Boolean),\n            \"object\" =\u003e Some(Self::Object),\n            \"array\" =\u003e Some(Self::Array),\n            \"null\" =\u003e Some(Self::Null),\n            _ =\u003e None,\n        }\n    }\n\n    /// Convert to JSON Schema type string\n    pub fn as_str(\u0026self) -\u003e \u0026'static str {\n        match self {\n            Self::String =\u003e \"string\",\n            Self::Number =\u003e \"number\",\n            Self::Integer =\u003e \"integer\",\n            Self::Boolean =\u003e \"boolean\",\n            Self::Object =\u003e \"object\",\n            Self::Array =\u003e \"array\",\n            Self::Null =\u003e \"null\",\n        }\n    }\n\n    /// Get corresponding GraphQL scalar type\n    pub fn to_graphql_scalar(\u0026self) -\u003e Option\u003c\u0026'static str\u003e {\n        match self {\n            Self::String =\u003e Some(\"String\"),\n            Self::Number =\u003e Some(\"Float\"),\n            Self::Integer =\u003e Some(\"Int\"),\n            Self::Boolean =\u003e Some(\"Boolean\"),\n            Self::Object =\u003e None, // Objects are custom types\n            Self::Array =\u003e None,  // Arrays are lists\n            Self::Null =\u003e None,   // Null is not directly representable\n        }\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_graphql_type_to_sdl() {\n        let type_info = GraphQLType::new(\"String\").required();\n        assert_eq!(type_info.to_sdl(), \"String!\");\n\n        let list_type = GraphQLType::new(\"String\").list().required();\n        assert_eq!(list_type.to_sdl(), \"[String]!\");\n\n        let required_list = GraphQLType::new(\"String\")\n            .list()\n            .list_item_required()\n            .required();\n        assert_eq!(required_list.to_sdl(), \"[String!]!\");\n    }\n\n    #[test]\n    fn test_graphql_type_from_sdl() {\n        let result = GraphQLType::from_sdl(\"String!\").unwrap();\n        assert_eq!(result.name, \"String\");\n        assert!(result.required);\n        assert!(!result.is_list);\n\n        let list_result = GraphQLType::from_sdl(\"[String]!\").unwrap();\n        assert_eq!(list_result.name, \"String\");\n        assert!(list_result.required);\n        assert!(list_result.is_list);\n        assert!(!list_result.list_item_required);\n\n        let required_list = GraphQLType::from_sdl(\"[String!]!\").unwrap();\n        assert_eq!(required_list.name, \"String\");\n        assert!(required_list.required);\n        assert!(required_list.is_list);\n        assert!(required_list.list_item_required);\n    }\n\n    #[test]\n    fn test_directive_to_sdl() {\n        let directive = GraphQLDirective::new(\"key\").with_arg(\"fields\", \"\\\"id\\\"\");\n        assert_eq!(directive.to_sdl(), \"@key(fields: \\\"id\\\")\");\n\n        let simple = GraphQLDirective::new(\"deprecated\");\n        assert_eq!(simple.to_sdl(), \"@deprecated\");\n    }\n\n    #[test]\n    fn test_json_schema_type_conversion() {\n        assert_eq!(\n            JsonSchemaType::from_str(\"string\"),\n            Some(JsonSchemaType::String)\n        );\n        assert_eq!(JsonSchemaType::String.as_str(), \"string\");\n        assert_eq!(JsonSchemaType::String.to_graphql_scalar(), Some(\"String\"));\n        assert_eq!(JsonSchemaType::Number.to_graphql_scalar(), Some(\"Float\"));\n        assert_eq!(JsonSchemaType::Integer.to_graphql_scalar(), Some(\"Int\"));\n    }\n}\n","traces":[{"line":31,"address":[],"length":0,"stats":{"Line":34}},{"line":87,"address":[],"length":0,"stats":{"Line":3}},{"line":89,"address":[],"length":0,"stats":{"Line":3}},{"line":97,"address":[],"length":0,"stats":{"Line":3}},{"line":98,"address":[],"length":0,"stats":{"Line":3}},{"line":99,"address":[],"length":0,"stats":{"Line":3}},{"line":103,"address":[],"length":0,"stats":{"Line":2}},{"line":104,"address":[],"length":0,"stats":{"Line":2}},{"line":105,"address":[],"length":0,"stats":{"Line":2}},{"line":109,"address":[],"length":0,"stats":{"Line":1}},{"line":110,"address":[],"length":0,"stats":{"Line":1}},{"line":111,"address":[],"length":0,"stats":{"Line":1}},{"line":115,"address":[],"length":0,"stats":{"Line":3}},{"line":116,"address":[],"length":0,"stats":{"Line":6}},{"line":118,"address":[],"length":0,"stats":{"Line":3}},{"line":119,"address":[],"length":0,"stats":{"Line":4}},{"line":120,"address":[],"length":0,"stats":{"Line":6}},{"line":121,"address":[],"length":0,"stat ess":[],"length":0,"stats":{"Line":6}},{"line":186,"address":[],"length":0,"stats":{"Line":3}},{"line":187,"address":[],"length":0,"stats":{"Line":3}},{"line":231,"address":[],"length":0,"stats":{"Line":2}},{"line":233,"address":[],"length":0,"stats":{"Line":4}},{"line":234,"address":[],"length":0,"stats":{"Line":2}},{"line":239,"address":[],"length":0,"stats":{"Line":1}},{"line":240,"address":[],"length":0,"stats":{"Line":6}},{"line":241,"address":[],"length":0,"stats":{"Line":1}},{"line":245,"address":[],"length":0,"stats":{"Line":2}},{"line":246,"address":[],"length":0,"stats":{"Line":6}},{"line":248,"address":[],"length":0,"stats":{"Line":2}},{"line":249,"address":[],"length":0,"stats":{"Line":2}},{"line":250,"address":[],"length":0,"stats":{"Line":3}},{"line":251,"address":[],"length":0,"stats":{"Line":1}},{"line":253,"address":[],"length":0,"stats":{"Line":3}},{"line":255,"address":[],"length":0,"stats":{"Line":4}},{"line":256,"address":[],"length":0,"stats":{"Line":2}},{"line":259,"address":[],"length":0,"stats":{"Line":2}},{"line":337,"address":[],"length":0,"stats":{"Line":1}},{"line":338,"address":[],"length":0,"stats":{"Line":1}},{"line":339,"address":[],"length":0,"stats":{"Line":2}},{"line":340,"address":[],"length":0,"stats":{"Line":0}},{"line":341,"address":[],"length":0,"stats":{"Line":0}},{"line":342,"address":[],"length":0,"stats":{"Line":0}},{"line":343,"address":[],"length":0,"stats":{"Line":0}},{"line":344,"address":[],"length":0,"stats":{"Line":0}},{"line":345,"address":[],"length":0,"stats":{"Line":0}},{"line":346,"address":[],"length":0,"stats":{"Line":0}},{"line":351,"address":[],"length":0,"stats":{"Line":1}},{"line":352,"address":[],"length":0,"stats":{"Line":1}},{"line":353,"address":[],"length":0,"stats":{"Line":1}},{"line":354,"address":[],"length":0,"stats":{"Line":0}},{"line":355,"address":[],"length":0,"stats":{"Line":0}},{"line":356,"address":[],"length":0,"stats":{"Line":0}},{"line":357,"address":[],"length":0,"stats":{"Line":0}},{"line":358,"address":[],"length":0,"stats":{"Line":0}},{"line":359,"address":[],"length":0,"stats":{"Line":0}},{"line":364,"address":[],"length":0,"stats":{"Line":3}},{"line":365,"address":[],"length":0,"stats":{"Line":3}},{"line":366,"address":[],"length":0,"stats":{"Line":1}},{"line":367,"address":[],"length":0,"stats":{"Line":1}},{"line":368,"address":[],"length":0,"stats":{"Line":1}},{"line":369,"address":[],"length":0,"stats":{"Line":0}},{"line":370,"address":[],"length":0,"stats":{"Line":0}},{"line":371,"address":[],"length":0,"stats":{"Line":0}},{"line":372,"address":[],"length":0,"stats":{"Line":0}}],"covered":82,"coverable":100},{"path":["/","Users","johnhjediny","Documents","GitHub","json-schema-x-graphql","converters","rust","src","validator.rs"],"content":"//! Validation utilities for JSON Schema and GraphQL SDL\n\nuse crate::error::{ConversionError, Result};\nuse regex::Regex;\nuse serde_json::Value as JsonValue;\nuse std::sync::OnceLock;\n\n/// Regex for valid GraphQL names: /^[_A-Za-z][_0-9A-Za-z]*$/\nfn graphql_name_regex() -\u003e \u0026'static Regex {\n    static REGEX: OnceLock\u003cRegex\u003e = OnceLock::new();\n    REGEX.get_or_init(|| Regex::new(r\"^[_A-Za-z][_0-9A-Za-z]*$\").unwrap())\n}\n\n/// Regex for valid GraphQL type references (including lists and non-null)\nfn graphql_type_regex() -\u003e \u0026'static Regex {\n    static REGEX: OnceLock\u003cRegex\u003e = OnceLock::new();\n    REGEX.get_or_init(|| Regex::new(r\"^(\\[)?[_A-Za-z][_0-9A-Za-z]*!?(\\])?!?$\").unwrap())\n}\n\n/// Regex for valid URLs\nfn url_regex() -\u003e \u0026'static Regex {\n    static REGEX: OnceLock\u003cRegex\u003e = OnceLock::new();\n    REGEX.get_or_init(|| Regex::new(r\"^https?://[^\\s/$.?#].[^\\s]*$\").unwrap())\n}\n\n/// Validate a GraphQL name\npub fn validate_graphql_name(name: \u0026str) -\u003e Result\u003c()\u003e {\n    if name.is_empty() {\n        return Err(ConversionError::invalid_name(name, \"name cannot be empty\"));\n    }\n\n    if !graphql_name_regex().is_match(name) {\n        return Err(ConversionError::invalid_name(\n            name,\n            \"name must match /^[_A-Za-z][_0-9A-Za-z]*$/\",\n        ));\n    }\n\n    // Check for GraphQL reserved names\n    if is_reserved_name(name) {\n        return Err(ConversionError::invalid_name(\n            name,\n            \"name is reserved by GraphQL specification\",\n        ));\n    }\n\n    Ok(())\n}\n\n/// Check if a name is reserved by GraphQL\nfn is_reserved_name(name: \u0026str) -\u003e bool {\n    // Names starting with __ are reserved\n    name.starts_with(\"__\")\n}\n\n/// Validate a GraphQL type reference\npub fn validate_graphql_type(type_str: \u0026str) -\u003e Result\u003c()\u003e {\n    if type_str.is_empty() {\n        return Err(ConversionError::InvalidType(\n            \"type cannot be empty\".to_string(),\n        ));\n    }\n\n    if !graphql_type_regex().is_match(type_str) {\n        return Err(ConversionError::InvalidType(format!(\n            \"invalid GraphQL type format: {}\",\n            type_str\n        )));\n    }\n\n    Ok(())\n}\n\n/// Validate federation field selection syntax\npub fn validate_federation_fields(fields: \u0026str) -\u003e Result\u003c()\u003e {\n    if fields.is_empty() {\n        return Err(ConversionError::FederationError(\n            \"fields selection cannot be empty\".to_string(),\n        ));\n    }\n\n    // Basic validation - more complex parsing would be needed for full support\n    if !fields.chars().all(|c| {\n        c.is_alphanumeric() || c == '_' || c == ' ' || c == '\"' || c == ',' || c == '{' || c == '}'\n    }) {\n        return Err(ConversionError::FederationError(format!(\n            \"invalid characters in fields selection: {}\",\n            fields\n        )));\n    }\n\n    Ok(())\n}\n\n/// Validate a URL\npub fn validate_url(url: \u0026str) -\u003e Result\u003c()\u003e {\n    if !url_regex().is_match(url) {\n        return Err(ConversionError::ValidationError(format!(\n            \"invalid URL format: {}\",\n            url\n        )));\n    }\n    Ok(())\n}\n\n/// Validate JSON Schema structure\npub fn validate_json_schema(schema: \u0026JsonValue) -\u003e Result\u003c()\u003e {\n    let mut errors = Vec::new();\n\n    // Check if it's an object\n    if !schema.is_object() {\n        return Err(ConversionError::InvalidJsonSchema(\n            \"schema must be an object\".to_string(),\n        ));\n    }\n\n    let obj = schema.as_object().unwrap();\n\n    // Validate $schema if present\n    if let Some(schema_version) = obj.get(\"$schema\") {\n        if let Some(version_str) = schema_version.as_str() {\n            if !version_str.contains(\"json-schema.org\") {\n                errors.push(ConversionError::validation(format!(\n                    \"invalid $schema URL: {}\",\n                    version_str\n                )));\n            }\n        }\n    }\n\n    // Validate x-graphql-type-name if present\n    if let Some(type_name) = obj.get(\"x-graphql-type-name\") {\n        if let Some(name) = type_name.as_str() {\n            if let Err(e) = validate_graphql_name(name) {\n                errors.push(e);\n            }\n        } else {\n            errors.push(ConversionError::invalid_extension(\n                \"x-graphql-type-name must be a string\",\n            ));\n        }\n    }\n\n    // Validate x-graphql-type if present\n    if let Some(gql_type) = obj.get(\"x-graphql-type\") {\n        if let Some(type_str) = gql_type.as_str() {\n            if let Err(e) = validate_graphql_type(type_str) {\n                errors.push(e);\n            }\n        } else {\n            errors.push(ConversionError::invalid_extension(\n                \"x-graphql-type must be a string\",\n            ));\n        }\n    }\n\n    // Validate properties recursively\n    if let Some(properties) = obj.get(\"properties\") {\n        if let Some(props_obj) = properties.as_object() {\n            for (prop_name, prop_schema) in props_obj {\n                // Validate property name format\n                if prop_name.is_empty() {\n                    errors.push(ConversionError::validation(\n                        \"property name cannot be empty\".to_string(),\n                    ));\n                }\n\n                // Recursively validate nested schemas\n                if let Err(e) = validate_json_schema(prop_schema) {\n                    errors.push(e);\n                }\n            }\n        }\n    }\n\n    // Validate items for arrays\n    if let Some(items) = obj.get(\"items\") {\n        if let Err(e) = validate_json_schema(items) {\n            errors.push(e);\n        }\n    }\n\n    // Validate x-graphql-directives if present\n    if let Some(directives) = obj.get(\"x-graphql-directives\") {\n        if let Some(dir_array) = directives.as_array() {\n            for directive in dir_array {\n                if let Err(e) = validate_directive(directive) {\n                    errors.push(e);\n                }\n            }\n        } else {\n            errors.push(ConversionError::invalid_extension(\n                \"x-graphql-directives must be an array\",\n            ));\n        }\n    }\n\n    if errors.is_empty() {\n        Ok(())\n    } else {\n        Err(ConversionError::combine(errors))\n    }\n}\n\n/// Validate a directive definition\nfn validate_directive(directive: \u0026JsonValue) -\u003e Result\u003c()\u003e {\n    let obj = directive.as_object().ok_or_else(|| {\n        ConversionError::InvalidDirective(\"directive must be an object\".to_string())\n    })?;\n\n    // Validate directive name\n    if let Some(name) = obj.get(\"name\") {\n        if let Some(name_str) = name.as_str() {\n            validate_graphql_name(name_str)?;\n        } else {\n            return Err(ConversionError::InvalidDirective(\n                \"directive name must be a string\".to_string(),\n            ));\n        }\n    } else {\n        return Err(ConversionError::InvalidDirective(\n            \"directive must have a name\".to_string(),\n        ));\n    }\n\n    // Validate arguments if present\n    if let Some(args) = obj.get(\"arguments\") {\n        if !args.is_object() {\n            return Err(ConversionError::InvalidDirective(\n                \"directive arguments must be an object\".to_string(),\n            ));\n        }\n    }\n\n    Ok(())\n}\n\n/// Validate GraphQL SDL syntax (basic validation)\npub fn validate_graphql_sdl(sdl: \u0026str) -\u003e Result\u003c()\u003e {\n    if sdl.trim().is_empty() {\n        return Err(ConversionError::InvalidGraphQLSdl(\n            \"SDL cannot be empty\".to_string(),\n        ));\n    }\n\n    // Basic syntax checks\n    let lines: Vec\u003c\u0026str\u003e = sdl.lines().collect();\n    let mut errors = Vec::new();\n    let mut brace_count = 0;\n    let mut in_type_definition = false;\n    let mut is_enum_definition = false;\n    let mut in_block_string = false;\n\n    for (line_num, line) in lines.iter().enumerate() {\n        let trimmed = line.trim();\n\n        // Handle block strings\n        if trimmed.contains(\"\\\"\\\"\\\"\") {\n            let count = trimmed.matches(\"\\\"\\\"\\\"\").count();\n            if count % 2 != 0 {\n                in_block_string = !in_block_string;\n            }\n            continue;\n        }\n\n        if in_block_string {\n            continue;\n        }\n\n        // Skip empty lines and comments\n        if trimmed.is_empty() || trimmed.starts_with('#') {\n            continue;\n        }\n\n        // Count braces for matching\n        brace_count += trimmed.matches('{').count() as i32;\n        brace_count -= trimmed.matches('}').count() as i32;\n\n        // Check for type definition keywords\n        if trimmed.starts_with(\"type \")\n            || trimmed.starts_with(\"interface \")\n            || trimmed.starts_with(\"enum \")\n            || trimmed.starts_with(\"union \")\n            || trimmed.starts_with(\"input \")\n            || trimmed.starts_with(\"scalar \")\n        {\n            in_type_definition = true;\n            is_enum_definition = trimmed.starts_with(\"enum \");\n\n            // Extract type name after keyword\n            let parts: Vec\u003c\u0026str\u003e = trimmed.split_whitespace().collect();\n            if parts.len() \u003e= 2 {\n                let type_name = parts[1].trim_end_matches('{').trim();\n                if let Err(e) = validate_graphql_name(type_name) {\n                    errors.push(ConversionError::InvalidGraphQLSdl(format!(\n                        \"Line {}: {}\",\n                        line_num + 1,\n                        e\n                    )));\n                }\n            }\n        }\n\n        // Check for field syntax inside type definitions\n        if in_type_definition \u0026\u0026 !is_enum_definition \u0026\u0026 brace_count \u003e 0 \u0026\u0026 trimmed.contains(':') {\n            // Basic field validation: should have \"name: Type\" format\n            if !trimmed.starts_with(\"type \")\n                \u0026\u0026 !trimmed.starts_with(\"interface \")\n                \u0026\u0026 !trimmed.starts_with(\"enum \")\n                \u0026\u0026 !trimmed.starts_with(\"union \")\n                \u0026\u0026 !trimmed.starts_with(\"input \")\n                \u0026\u0026 !trimmed.starts_with(\"scalar \")\n            {\n                let parts: Vec\u003c\u0026str\u003e = trimmed.split(':').collect();\n                if parts.len() \u003c 2 {\n                    errors.push(ConversionError::InvalidGraphQLSdl(format!(\n                        \"Line {}: Invalid field syntax\",\n                        line_num + 1\n                    )));\n                }\n            }\n        }\n\n        // Check for text without colons inside type bodies (likely invalid)\n        if in_type_definition\n            \u0026\u0026 !is_enum_definition\n            \u0026\u0026 brace_count \u003e 0\n            \u0026\u0026 !trimmed.is_empty()\n            \u0026\u0026 !trimmed.contains(':')\n            \u0026\u0026 !trimmed.starts_with('@')\n            \u0026\u0026 !trimmed.contains('{')\n            \u0026\u0026 !trimmed.contains('}')\n            \u0026\u0026 !trimmed.starts_with(\"\\\"\")\n            \u0026\u0026 !trimmed.starts_with(\"type \")\n            \u0026\u0026 !trimmed.starts_with(\"interface \")\n            \u0026\u0026 !trimmed.starts_with(\"enum \")\n            \u0026\u0026 !trimmed.starts_with(\"union \")\n            \u0026\u0026 !trimmed.starts_with(\"input \")\n            \u0026\u0026 !trimmed.starts_with(\"scalar \")\n        {\n            // Check if it looks like it should be a field (has alphanumeric chars)\n            if trimmed.chars().any(|c| c.is_alphanumeric()) {\n                let msg = if trimmed.contains('(') \u0026\u0026 trimmed.contains(')') {\n                    \"Invalid field/argument definition - check syntax\"\n                } else {\n                    \"Invalid field definition - missing colon between name and type\"\n                };\n\n                errors.push(ConversionError::InvalidGraphQLSdl(format!(\n                    \"Line {}: {}\",\n                    line_num + 1,\n                    msg\n                )));\n            }\n        }\n\n        if brace_count == 0 \u0026\u0026 in_type_definition {\n            in_type_definition = false;\n            is_enum_definition = false;\n        }\n    }\n\n    // Check for unmatched braces\n    if brace_count != 0 {\n        errors.push(ConversionError::InvalidGraphQLSdl(\n            \"Unmatched braces in SDL\".to_string(),\n        ));\n    }\n\n    if errors.is_empty() {\n        Ok(())\n    } else {\n        Err(ConversionError::combine(errors))\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use serde_json::json;\n\n    #[test]\n    fn test_validate_graphql_name() {\n        assert!(validate_graphql_name(\"User\").is_ok());\n        assert!(validate_graphql_name(\"_privateField\").is_ok());\n        assert!(validate_graphql_name(\"field123\").is_ok());\n\n        assert!(validate_graphql_name(\"\").is_err());\n        assert!(validate_graphql_name(\"123invalid\").is_err());\n        assert!(validate_graphql_name(\"invalid-name\").is_err());\n        assert!(validate_graphql_name(\"__reserved\").is_err());\n    }\n\n    #[test]\n    fn test_validate_graphql_type() {\n        assert!(validate_graphql_type(\"String\").is_ok());\n        assert!(validate_graphql_type(\"String!\").is_ok());\n        assert!(validate_graphql_type(\"[String]\").is_ok());\n        assert!(validate_graphql_type(\"[String!]!\").is_ok());\n\n        assert!(validate_graphql_type(\"\").is_err());\n        assert!(validate_graphql_type(\"123Invalid\").is_err());\n    }\n\n    #[test]\n    fn test_validate_url() {\n        assert!(validate_url(\"https://example.com\").is_ok());\n        assert!(validate_url(\"http://localhost:8080/path\").is_ok());\n\n        assert!(validate_url(\"not-a-url\").is_err());\n        assert!(validate_url(\"ftp://example.com\").is_err());\n    }\n\n    #[test]\n    fn test_validate_json_schema() {\n        let valid_schema = json!({\n            \"$schema\": \"https://json-schema.org/draft/2020-12/schema\",\n            \"type\": \"object\",\n            \"x-graphql-type-name\": \"User\",\n            \"properties\": {\n                \"id\": {\n                    \"type\": \"string\",\n                    \"x-graphql-type\": \"ID!\"\n                }\n            }\n        });\n\n        assert!(validate_json_schema(\u0026valid_schema).is_ok());\n\n        let invalid_schema = json!({\n            \"type\": \"object\",\n            \"x-graphql-type-name\": \"123Invalid\"\n        });\n\n        assert!(validate_json_schema(\u0026invalid_schema).is_err());\n    }\n\n    #[test]\n    fn test_validate_directive() {\n        let valid_directive = json!({\n            \"name\": \"key\",\n            \"arguments\": {\n                \"fields\": \"id\"\n            }\n        });\n\n        assert!(validate_directive(\u0026valid_directive).is_ok());\n\n        let invalid_directive = json!({\n            \"arguments\": {}\n        });\n\n        assert!(validate_directive(\u0026invalid_directive).is_err());\n    }\n\n    #[test]\n    fn test_validate_graphql_sdl() {\n        let valid_sdl = r#\"\n            type User {\n                id: ID!\n                name: String\n            }\n        \"#;\n\n        assert!(validate_graphql_sdl(valid_sdl).is_ok());\n\n        let invalid_sdl = \"\";\n        assert!(validate_graphql_sdl(invalid_sdl).is_err());\n    }\n\n    #[test]\n    fn test_reserved_names() {\n        assert!(is_reserved_name(\"__typename\"));\n        assert!(is_reserved_name(\"__schema\"));\n        assert!(!is_reserved_name(\"_privateField\"));\n        assert!(!is_reserved_name(\"User\"));\n    }\n}\n","traces":[{"line":9,"address":[],"length":0,"stats":{"Line":74}},{"line":11,"address":[],"length":0,"stats":{"Line":163}},{"line":15,"address":[],"length":0,"stats":{"Line":8}},{"line":17,"address":[],"length":0,"stats":{"Line":19}},{"line":21,"address":[],"length":0,"stats":{"Line":4}},{"line":23,"address":[],"length":0,"stats":{"Line":11}},{"line":27,"address":[],"length":0,"stats":{"Line":75}},{"line":28,"address":[],"length":0,"stats":{"Line":150}},{"line":29,"address":[],"length":0,"stats":{"Line":1}},{"line":32,"address":[],"length":0,"stats":{"Line":148}},{"line":33,"address":[],"length":0,"stats":{"Line":3}},{"line":34,"address":[],"length":0,"stats":{"Line":3}},{"line":35,"address":[],"length":0,"stats":{"Line":3}},{"line":40,"address":[],"length":0,"stats":{"Line":142}},{"line":41,"address":[],"length":0,"stats":{"Line":1}},{"line":42,"address":[],"length":0,"stats":{"Line":1}},{"line":43,"address":[],"length":0,"stats":{"Line":1}},{"line":47,"address":[],"length":0,"stats":{"Line":70}},{"line":51,"address":[],"length":0,"stats":{"Line":75}},{"line":53,"add n\n/// WASM-compatible conversion options\n#[wasm_bindgen]\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct WasmConversionOptions {\n    validate: bool,\n    include_descriptions: bool,\n    preserve_field_order: bool,\n    federation_version: u8,\n    infer_ids: bool,\n}\n\n#[wasm_bindgen]\nimpl WasmConversionOptions {\n    #[wasm_bindgen(constructor)]\n    pub fn new() -\u003e Self {\n        Self {\n            validate: true,\n            include_descriptions: true,\n            preserve_field_order: true,\n            federation_version: 2,\n            infer_ids: false,\n        }\n    }\n\n    #[wasm_bindgen(getter)]\n    pub fn validate(\u0026self) -\u003e bool {\n        self.validate\n    }\n\n    #[wasm_bindgen(setter)]\n    pub fn set_validate(\u0026mut self, value: bool) {\n        self.validate = value;\n    }\n\n    #[wasm_bindgen(getter)]\n    pub fn include_descriptions(\u0026self) -\u003e bool {\n        self.include_descriptions\n    }\n\n    #[wasm_bindgen(setter)]\n    pub fn set_include_descriptions(\u0026mut self, value: bool) {\n        self.include_descriptions = value;\n    }\n\n    #[wasm_bindgen(getter)]\n    pub fn preserve_field_order(\u0026self) -\u003e bool {\n        self.preserve_field_order\n    }\n\n    #[wasm_bindgen(setter)]\n    pub fn set_preserve_field_order(\u0026mut self, value: bool) {\n        self.preserve_field_order = value;\n    }\n\n    #[wasm_bindgen(getter)]\n    pub fn federation_version(\u0026self) -\u003e u8 {\n        self.federation_version\n    }\n\n    #[wasm_bindgen(setter)]\n    pub fn set_federation_version(\u0026mut self, value: u8) {\n        self.federation_version = value;\n    }\n\n    #[wasm_bindgen(getter)]\n    pub fn infer_ids(\u0026self) -\u003e bool {\n        self.infer_ids\n    }\n\n    #[wasm_bindgen(setter)]\n    pub fn set_infer_ids(\u0026mut self, value: bool) {\n        self.infer_ids = value;\n    }\n\n    /// Convert to internal options type\n    fn to_internal(\u0026self) -\u003e ConversionOptions {\n        ConversionOptions {\n            validate: self.validate,\n            include_descriptions: self.include_descriptions,\n            preserve_field_order: self.preserve_field_order,\n            federation_version: self.federation_version,\n            infer_ids: self.infer_ids,\n        }\n    }\n}\n\nimpl Default for WasmConversionOptions {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\n/// WASM-compatible converter\n#[wasm_bindgen]\npub struct WasmConverter {\n    converter: Converter,\n}\n\n#[wasm_bindgen]\nimpl WasmConverter {\n    /// Create a new converter with default options\n    #[wasm_bindgen(constructor)]\n    pub fn new() -\u003e Self {\n        Self {\n            converter: Converter::new(),\n        }\n    }\n\n    /// Create a new converter with custom options\n    #[wasm_bindgen(js_name = withOptions)]\n    pub fn with_options(options: \u0026WasmConversionOptions) -\u003e Self {\n        Self {\n            converter: Converter::with_options(options.to_internal()),\n        }\n    }\n\n    /// Convert JSON Schema to GraphQL SDL\n    #[wasm_bindgen(js_name = jsonSchemaToGraphQL)]\n    pub fn json_schema_to_graphql(\u0026self, json_schema: \u0026str) -\u003e Result\u003cString, JsValue\u003e {\n        self.converter\n            .json_schema_to_graphql(json_schema)\n            .map_err(Into::into)\n    }\n\n    /// Convert GraphQL SDL to JSON Schema\n    #[wasm_bindgen(js_name = graphqlToJsonSchema)]\n    pub fn graphql_to_json_schema(\u0026self, graphql_sdl: \u0026str) -\u003e Result\u003cString, JsValue\u003e {\n        self.converter\n            .graphql_to_json_schema(graphql_sdl)\n            .map_err(Into::into)\n    }\n\n    /// Convert between formats (bidirectional)\n    pub fn convert(\u0026self, input: \u0026str, direction: \u0026str) -\u003e Result\u003cString, JsValue\u003e {\n        let dir = match direction {\n            \"json-to-graphql\" | \"jsonToGraphQL\" =\u003e ConversionDirection::JsonSchemaToGraphQL,\n            \"graphql-to-json\" | \"graphqlToJson\" =\u003e ConversionDirection::GraphQLToJsonSchema,\n            _ =\u003e {\n                return Err(JsValue::from_str(\u0026format!(\n                    \"Invalid direction: {}. Use 'json-to-graphql' or 'graphql-to-json'\",\n                    direction\n                )))\n            }\n        };\n\n        self.converter.convert(input, dir).map_err(Into::into)\n    }\n\n    /// Clear the conversion cache (if caching is enabled)\n    #[cfg(feature = \"caching\")]\n    #[wasm_bindgen(js_name = clearCache)]\n    pub fn clear_cache(\u0026self) {\n        self.converter.clear_cache();\n    }\n}\n\nimpl Default for WasmConverter {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\n/// Standalone function to convert JSON Schema to GraphQL SDL\n#[wasm_bindgen(js_name = jsonSchemaToGraphQL)]\npub fn json_schema_to_graphql(json_schema: \u0026str) -\u003e Result\u003cString, JsValue\u003e {\n    let converter = Converter::new();\n    converter\n        .json_schema_to_graphql(json_schema)\n        .map_err(Into::into)\n}\n\n/// Standalone function to convert GraphQL SDL to JSON Schema\n#[wasm_bindgen(js_name = graphqlToJsonSchema)]\npub fn graphql_to_json_schema(graphql_sdl: \u0026str) -\u003e Result\u003cString, JsValue\u003e {\n    let converter = Converter::new();\n    converter\n        .graphql_to_json_schema(graphql_sdl)\n        .map_err(Into::into)\n}\n\n/// Validate JSON Schema\n#[wasm_bindgen(js_name = validateJsonSchema)]\npub fn validate_json_schema(json_schema: \u0026str) -\u003e Result\u003cbool, JsValue\u003e {\n    use crate::error::ConversionError;\n    use crate::validator;\n\n    let schema: serde_json::Value =\n        serde_json::from_str(json_schema).map_err(ConversionError::from)?;\n\n    validator::validate_json_schema(\u0026schema)\n        .map(|_| true)\n        .map_err(Into::into)\n}\n\n/// Validate GraphQL SDL\n#[wasm_bindgen(js_name  \"http://json-schema.org/draft-07/schema#\",\n        \"definitions\": {\n            \"Node\": {\n                \"type\": \"object\",\n                \"x-graphql-type-name\": \"Node\",\n                \"properties\": {\n                    \"value\": {\"type\": \"integer\"},\n                    \"next\": {\"$ref\": \"#/definitions/Node\"}\n                }\n            }\n        },\n        \"$ref\": \"#/definitions/Node\"\n    }\"##;\n\n    let converter = Converter::new();\n    let result = converter.json_schema_to_graphql(json);\n\n    assert!(result.is_ok(), \"Should handle recursive types\");\n    let graphql = result.unwrap();\n    assert!(graphql.contains(\"next: Node\"));\n}\n\n#[test]\nfn test_reserved_keywords_as_fields() {\n    let json = r#\"{\n        \"type\": \"object\",\n        \"x-graphql-type-name\": \"KeywordsInfo\",\n        \"properties\": {\n            \"type\": { \"type\": \"string\" },\n            \"input\": { \"type\": \"string\" },\n            \"implements\": { \"type\": \"string\" },\n            \"interface\": { \"type\": \"string\" }\n        }\n    }\"#;\n\n    let converter = Converter::new();\n    let result = converter.json_schema_to_graphql(json);\n\n    assert!(result.is_ok());\n    let graphql = result.unwrap();\n    // GraphQL allows these as field names\n    assert!(graphql.contains(\"type: String\"));\n    assert!(graphql.contains(\"input: String\"));\n    assert!(graphql.contains(\"interface: String\"));\n}\n\n#[test]\nfn test_complex_descriptions_escaping() {\n    let json = r#\"{\n        \"type\": \"object\",\n        \"x-graphql-type-name\": \"Test\",\n        \"description\": \"This has \\\"quotes\\\" and \\n newlines and \\t tabs.\",\n        \"properties\": {\n            \"field\": {\n                \"type\": \"string\",\n                \"description\": \"Another \\\"description\\\"\"\n            }\n        }\n    }\"#;\n\n    let converter = Converter::with_options(ConversionOptions {\n        include_descriptions: true,\n        ..Default::default()\n    });\n\n    let result = converter.json_schema_to_graphql(json);\n    assert!(result.is_ok());\n    let graphql = result.unwrap();\n\n    // Should use block strings \"\"\" for multiline content or escape quotes\n    assert!(graphql.contains(\"This has\"));\n}\n\n#[test]\nfn test_empty_object_handling() {\n    // GraphQL requires at least one field in a type\n    let json = r#\"{\n        \"type\": \"object\",\n        \"x-graphql-type-name\": \"Empty\"\n    }\"#;\n\n    let converter = Converter::new();\n    let result = converter.json_schema_to_graphql(json);\n\n    // Implementation specific: might fail or add dummy field\n    if let Ok(graphql) = result {\n        assert!(graphql.contains(\"type Empty\"));\n    }\n}\n\n#[test]\nfn test_very_long_identifiers() {\n    let long_name = \"A\".repeat(200);\n    let json = format!(\n        r#\"{{\n        \"type\": \"object\",\n        \"x-graphql-type-name\": \"{}\",\n        \"properties\": {{\n            \"val\": {{ \"type\": \"string\" }}\n        }}\n    }}\"#,\n        long_name\n    );\n\n    let converter = Converter::new();\n    let result = converter.json_schema_to_graphql(\u0026json);\n\n    // Should handle reasonable limits (GraphQL usually doesn't have a strict tiny limit, but good to check buffers)\n    assert!(result.is_ok());\n    let graphql = result.unwrap();\n    assert!(graphql.contains(\u0026long_name));\n}\n\n#[test]\nfn test_nested_arrays_unsupported_in_graphql() {\n    // GraphQL doesn't natively support nested lists [[T]]\n    // The converter usually flattens or errors or creates wrapper types.\n    // This test checks that it doesn't panic.\n    let json = r#\"{\n        \"type\": \"object\",\n        \"x-graphql-type-name\": \"Matrix\",\n        \"properties\": {\n            \"grid\": {\n                \"type\": \"array\",\n                \"items\": {\n                    \"type\": \"array\",\n                    \"items\": {\n                        \"type\": \"integer\"\n                    }\n                }\n            }\n        }\n    }\"#;\n\n    let converter = Converter::new();\n    let result = converter.json_schema_to_graphql(json);\n\n    // It is acceptable to fail or to succeed with a workaround\n    if let Err(e) = result {\n        println!(\"Got expected error/limitation: {}\", e);\n    } else {\n        let graphql = result.unwrap();\n        // If it succeeds, verify it produced valid syntax (roughly)\n        assert!(graphql.contains(\"type Matrix\"));\n    }\n}\n\n#[test]\nfn test_union_collision() {\n    // Two objects with same name in different contexts\n    let json = r#\"{\n        \"type\": \"object\",\n        \"x-graphql-type-name\": \"Container\",\n        \"properties\": {\n            \"a\": {\n                \"type\": \"object\",\n                \"x-graphql-type-name\": \"Item\",\n                \"properties\": { \"id\": { \"type\": \"string\" } }\n            },\n            \"b\": {\n                \"type\": \"object\",\n                \"x-graphql-type-name\": \"Item\",\n                \"properties\": { \"count\": { \"type\": \"integer\" } }\n            }\n        }\n    }\"#;\n\n    let converter = Converter::new();\n    let result = converter.json_schema_to_graphql(json);\n\n    assert!(result.is_ok());\n    let graphql = result.unwrap();\n    // Converter should handle name collision by renaming one of them, e.g. Item and Item1, or erroring.\n    // We just verify that the container is generated.\n    assert!(graphql.contains(\"type Container\"));\n}\n\n#[test]\nfn test_invalid_type_field() {\n    // Schema with an unknown type in \"type\" field\n    let json = r#\"{\n        \"type\": \"object\",\n        \"x-graphql-type-name\": \"InvalidTypeTest\",\n        \"properties\": {\n            \"bad\": { \"type\": \"unknown_type_here\" }\n        }\n    }\"#;\n\n    let converter = Converter::new();\n    let result = converter.json_schema_to_graphql(json);\n\n    // Should probably error or default to String/Scalar\n    if let Err(e) = result {\n        let msg = format!(\"{}\", e).to_lowercase();\n        assert!(msg.contains(\"unknown\") || msg.contains(\"valid\") || msg.contains(\"support\"));\n    }\n}\n\n#[test]\nfn test_mixed_case_properties() {\n    let json = r#\"{\n        \"type\": \"object\",\n        \"x-graphql-type-name\": \"CaseTest\",\n        \"properties\": {\n            \"myField\": { \"type\": \"string\" },\n            \"MyField\": { \"type\": \"integer\" }\n        }\n    }\"#;\n\n    let converter = Converter::new();\n    let result = converter.json_schema_to_graphql(json);\n\n    // GraphQL fields are case sensitive, so this should result in two distinct fields\n    assert!(result.is_ok());\n    let graphql = result.unwrap();\n    assert!(graphql.contains(\"myField: String\"));\n    assert!(graphql.contains(\"MyField: Int\"));\n}\n\n#[test]\nfn test_markdown_descriptions() {\n    let json = r##\"{\n        \"type\": \"object\",\n        \"x-graphql-type-name\": \"Markdown\",\n        \"description\": \"# Title\\n\\n- Item 1\\n- Item 2\\n\\n`code`\",\n        \"properties\": {\n            \"f\": { \"type\": \"string\" }\n        }\n    }\"##;\n\n    let converter = Converter::with_options(ConversionOptions {\n        include_descriptions: true,\n        ..Default::default()\n    });\n\n    let result = converter.json_schema_to_graphql(json);\n    assert!(result.is_ok());\n    let graphql = result.unwrap();\n    // Should be wrapped in block quotes\n    assert!(graphql.contains(\"# Title\"));\n    assert!(graphql.contains(\"- Item 1\"));\n}\n\n#[test]\nfn test_empty_required_array() {\n    let json = r#\"{\n        \"type\": \"object\",\n        \"x-graphql-type-name\": \"RequiredTest\",\n        \"required\": [],\n        \"properties\": {\n            \"optional\": { \"type\": \"string\" }\n        }\n    }\"#;\n\n    let converter = Converter::new();\n    let result = converter.json_schema_to_graphql(json);\n\n    assert!(result.is_ok());\n    let graphql = result.unwrap();\n    assert!(graphql.contains(\"optional: String\"));\n    assert!(!graphql.contains(\"optional: String!\"));\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","Users","johnhjediny","Documents","GitHub","json-schema-x-graphql","converters","rust","tests","integration_tests.rs"],"content":"//! Integration tests for JSON Schema \u003c-\u003e GraphQL SDL conversion\n//!\n//! Tests bidirectional conversion, federation support, and edge cases.\n\nuse json_schema_graphql_converter::{ConversionOptions, Converter};\nuse serde_json::json;\n\n// ============================================================================\n// Helper Functions\n// ============================================================================\n\nfn default_options() -\u003e ConversionOptions {\n    ConversionOptions {\n        validate: true,\n        include_descriptions: true,\n        preserve_field_order: true,\n        federation_version: 2,\n        infer_ids: false,\n    }\n}\n\nfn compare_sdl(actual: \u0026str, expected: \u0026str) -\u003e bool {\n    let normalize = |s: \u0026str| -\u003e String {\n        s.lines()\n            .map(|line| line.trim())\n            .filter(|line| !line.is_empty())\n            .collect::\u003cVec\u003c_\u003e\u003e()\n            .join(\"\\n\")\n    };\n\n    normalize(actual) == normalize(expected)\n}\n\n// ============================================================================\n// Basic Type Conversion Tests\n// ============================================================================\n\n#[test]\nfn test_simple_object_type() {\n    let converter = Converter::with_options(default_options());\n    let json_schema = json!({\n        \"$schema\": \"https://json-schema.org/draft/2020-12/schema\",\n        \"$defs\": {\n            \"User\": {\n                \"type\": \"object\",\n                \"description\": \"A user account\",\n                \"x-graphql-type-name\": \"User\",\n                \"properties\": {\n                    \"user_id\": {\n                        \"type\": \"string\",\n                        \"description\": \"Unique user identifier\",\n                        \"x-graphql-type\": \"ID!\",\n                        \"x-graphql-field-name\": \"userId\"\n                    },\n                    \"name\": {\n                        \"type\": \"string\",\n                        \"x-graphql-type\": \"String!\"\n                    },\n                    \"email\": {\n                        \"type\": \"string\",\n                        \"format\": \"email\"\n                    }\n                },\n                \"required\": [\"user_id\", \"name\"]\n            }\n        }\n    });\n\n    let result = converter.json_schema_to_graphql(\u0026json_schema.to_string());\n    assert!(result.is_ok(), \"Conversion failed: {:?}\", result.err());\n\n    let graphql = result.unwrap();\n    assert!(graphql.contains(\"type User\"), \"Missing User type\");\n    assert!(graphql.contains(\"userId: ID!\"), \"Missing userId field\");\n    assert!(graphql.contains(\"name: String!\"), \"Missing name field\");\n}\n\n#[test]\nfn test_enum_type() {\n    let converter = Converter::with_options(default_options());\n    let json_schema = json!({\n        \"$schema\": \"https://json-schema.org/draft/2020-12/schema\",\n        \"$defs\": {\n            \"Status\": {\n                \"type\": \"string\",\n                \"enum\": [\"ACTIVE\", \"INACTIVE\", \"PENDING\"],\n                \"x-graphql-type-name\": \"Status\",\n                \"x-graphql-type-kind\": \"enum\",\n                \"description\": \"Account status\"\n            }\n        }\n    });\n\n    let result = converter.json_schema_to_graphql(\u0026json_schema.to_string());\n    assert!(result.is_ok());\n\n    let graphql = result.unwrap();\n    assert!(graphql.contains(\"enum Status\"));\n    assert!(graphql.contains(\"ACTIVE\"));\n    assert!(graphql.contains(\"INACTIVE\"));\n    assert!(graphql.contains(\"PENDING\"));\n}\n\n#[test]\nfn test_interface_type() {\n    let converter = Converter::with_options(default_options());\n    let json_schema = json!({\n        \"$schema\": \"https://json-schema.org/draft/2020-12/schema\",\n        \"$defs\": {\n            \"Node\": {\n                \"type\": \"object\",\n                \"x-graphql-type-name\": \"Node\",\n                \"x-graphql-type-kind\": \"interface\",\n                \"properties\": {\n                    \"id\": {\n                        \"type\": \"string\",\n                        \"x-graphql-type\": \"ID!\"\n                    }\n                },\n                \"required\": [\"id\"]\n            }\n        }\n    });\n\n    let result = converter.json_schema_to_graphql(\u0026json_schema.to_string());\n    assert!(result.is_ok());\n\n    let graphql = result.unwrap();\n    assert!(graphql.contains(\"interface Node\"));\n}\n\n#[test]\nfn test_union_type() {\n    let converter = Converter::with_options(default_options());\n    let json_schema = json!({\n        \"$schema\": \"https://json-schema.org/draft/2020-12/schema\",\n        \"$defs\": {\n            \"SearchResult\": {\n                \"x-graphql-type-name\": \"SearchResult\",\n                \"x-graphql-type-kind\": \"union\",\n                \"x-graphql-union-types\": [\"User\", \"Post\", \"Comment\"]\n            }\n        }\n    });\n\n    let result = converter.json_schema_to_graphql(\u0026json_schema.to_string());\n    assert!(result.is_ok());\n\n    let graphql = result.unwrap();\n    assert!(graphql.contains(\"union SearchResult\"));\n}\n\n#[test]\nfn test_input_object_type() {\n    let converter = Converter::with_options(default_options());\n    let json_schema = json!({\n        \"$schema\": \"https://json-schema.org/draft/2020-12/schema\",\n        \"$defs\": {\n            \"CreateUserInput\": {\n                \"type\": \"object\",\n                \"x-graphql-type-name\": \"CreateUserInput\",\n                \"x-graphql-type-kind\": \"input\",\n                \"properties\": {\n                    \"name\": {\n                        \"type\": \"string\"\n                    },\n                    \"email\": {\n                        \"type\": \"string\"\n                    }\n                },\n                \"required\": [\"name\", \"email\"]\n            }\n        }\n    });\n\n    let result = converter.json_schema_to_graphql(\u0026json_schema.to_string());\n    assert!(result.is_ok());\n\n    let graphql = result.unwrap();\n    assert!(graphql.contains(\"input CreateUserInput\"));\n}\n\n// ============================================================================\n// Federation Directive Tests\n// ============================================================================\n\n#[test]\nfn test_federation_key_directive() {\n    let converter = Converter::with_options(default_options());\n    let json_schema = json!({\n        \"$schema\": \"https://json-schema.org/draft/2020-12/schema\",\n        \"$defs\": {\n            \"Product\": {\n                \"type\": \"object\",\n                \"x-graphql-type-name\": \"Product\",\n                \"x-graphql-directives\": [\n                    {\n                        \"name\": \"key\",\n                        \"arguments\": {\n                            \"fields\": \"\\\"id\\\"\"\n                        }\n                    }\n                ],\n                \"properties\": {\n                    \"id\": {\n                        \"type\": \"string\",\n                        \"x-graphql-type\": \"ID!\"\n                    },\n                    \"name\": {\n                        \"type\": \"string\"\n                    }\n                },\n                \"required\": [\"id\"]\n            }\n        }\n    });\n\n    let result = converter.json_schema_to_graphql(\u0026json_schema.to_string());\n    assert!(result.is_ok());\n\n    let graphql = result.unwrap();\n    assert!(graphql.contains(\"@key\"));\n}\n\n#[test]\nfn test_federation_external_requires_provides() {\n    let converter = Converter::with_options(default_options());\n    let json_schema = json!({\n        \"$schema\": \"https://json-schema.org/draft/2020-12/schema\",\n        \"$defs\": {\n            \"Product\": {\n                \"type\": \"object\",\n                \"x-graphql-type-name\": \"Product\",\n                \"properties\": {\n                    \"id\": {\n                        \"type\": \"string\",\n                        \"x-graphql-type\": \"ID!\",\n                        \"x-graphql-directives\": [\n                            {\"name\": \"external\"}\n                        ]\n                    },\n                    \"price\": {\n                        \"type\": \"number\"\n                    }\n                }\n            }\n        }\n    });\n\n    let result = converter.json_schema_to_graphql(\u0026json_schema.to_string());\n    assert!(result.is_ok());\n}\n\n#[test]\nfn test_federation_shareable() {\n    let converter = Converter::with_options(default_options());\n    let json_schema = json!({\n        \"$schema\": \"https://json-schema.org/draft/2020-12/schema\",\n        \"$defs\": {\n            \"Metadata\": {\n                \"type\": \"object\",\n                \"x-graphql-type-name\": \"Metadata\",\n                \"x-graphql-directives\": [\n                    {\"name\": \"shareable\"}\n                ],\n                \"properties\": {\n                    \"created_at\": {\n                        \"type\": \"string\",\n                        \"format\": \"date-time\"\n                    }\n                }\n            }\n        }\n    });\n\n    let result = converter.json_schema_to_graphql(\u0026json_schema.to_string());\n    assert!(result.is_ok());\n}\n\n#[test]\nfn test_federation_authenticated() {\n    let converter = Converter::with_options               \"id\": {\n                        \"type\": \"string\",\n                        \"x-graphql-type\": \"ID!\"\n                    }\n                },\n                \"required\": [\"id\"]\n            }\n        }\n    });\n\n    let graphql = converter\n        .json_schema_to_graphql(\u0026original_schema.to_string())\n        .expect(\"Failed to convert JSON Schema to GraphQL\");\n\n    let result_schema = converter\n        .graphql_to_json_schema(\u0026graphql)\n        .expect(\"Failed to convert GraphQL back to JSON Schema\");\n\n    assert!(!result_schema.is_empty());\n}\n\n// ============================================================================\n// Error Handling Tests\n// ============================================================================\n\n#[test]\nfn test_invalid_json_schema() {\n    let converter = Converter::with_options(default_options());\n    let invalid_json = \"not valid json{\";\n\n    let result = converter.json_schema_to_graphql(invalid_json);\n    assert!(result.is_err());\n}\n\n#[test]\nfn test_invalid_graphql_sdl() {\n    let converter = Converter::with_options(default_options());\n    let invalid_sdl = \"type User { invalid syntax\";\n\n    let result = converter.graphql_to_json_schema(invalid_sdl);\n    assert!(result.is_err());\n}\n\n#[test]\nfn test_empty_schema() {\n    let converter = Converter::with_options(default_options());\n    let empty_schema = json!({\n        \"$schema\": \"https://json-schema.org/draft/2020-12/schema\"\n    });\n\n    let result = converter.json_schema_to_graphql(\u0026empty_schema.to_string());\n    // Should handle empty schema gracefully\n    assert!(result.is_ok() || result.is_err());\n}\n\n#[test]\nfn test_list_types() {\n    let converter = Converter::with_options(default_options());\n    let json_schema = json!({\n        \"$schema\": \"https://json-schema.org/draft/2020-12/schema\",\n        \"$defs\": {\n            \"UserList\": {\n                \"type\": \"obje
