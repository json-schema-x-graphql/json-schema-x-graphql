<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <style>:root {
  --color: black;
  --bg: white;
  --head-bg: white;
  --link: #338;

  --blue: #ccf;
  --red: #fcc;
  --yellow: #ffc;
  --green: #cfc;
}

[data-theme='dark'] {
  --color: white;
  --bg: black;
  --head-bg: #333;
  --link: #aaf;

  --blue: #225;
  --red: #522;
  --yellow: #552;
  --green: #252;
}

html,
body {
  margin: 0;
  padding: 0;
  color: var(--color);
  background: var(--bg);
}

.app {
  margin: 10px;
  padding: 0;
}

.files-list {
  margin: 10px 0 0;
  width: 100%;
  border-collapse: collapse;
}
.files-list__head {
  border: 1px solid #999;
}
.files-list__head > tr > th {
  padding: 10px;
  border: 1px solid #999;
  text-align: left;
  font-weight: normal;
  background: var(--head-bg);
}
.files-list__body {
}
.files-list__file {
  cursor: pointer;
}
.files-list__file:hover {
  background: var(--blue);
}
.files-list__file > td {
  padding: 10px;
  border: 1px solid #999;
}
.files-list__file > td:first-child::before {
  content: '\01F4C4';
  margin-right: 1em;
}
.files-list__file_low {
  background: var(--red);
}
.files-list__file_medium {
  background: var(--yellow);
}
.files-list__file_high {
  background: var(--green);
}
.files-list__file_folder > td:first-child::before {
  content: '\01F4C1';
  margin-right: 1em;
}

.file-header {
  border: 1px solid #999;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background: var(--bg);
}

.file-header__back {
  margin: 10px;
  cursor: pointer;
  flex-shrink: 0;
  flex-grow: 0;
  text-decoration: underline;
  color: var(--link);
}

.file-header__name {
  margin: 10px;
  flex-shrink: 2;
  flex-grow: 2;
}

.file-header__stat {
  margin: 10px;
  flex-shrink: 0;
  flex-grow: 0;
}

.file-content {
  margin: 10px 0 0;
  border: 1px solid #999;
  padding: 10px;
  counter-reset: line;
  display: flex;
  flex-direction: column;
}

.code-line::before {
  content: counter(line);
  margin-right: 10px;
}
.code-line {
  margin: 0;
  padding: 0.3em;
  height: 1em;
  counter-increment: line;
}
.code-line_covered {
  background: var(--green);
}
.code-line_uncovered {
  background: var(--red);
}

#theme-toggle-label {
  margin-left: 1ch;
}
</style>
</head>

,\n\n    /// Disable schema validation\n    #[arg(long, default_value_t = false)]\n    no_validate: bool,\n\n    /// Include descriptions in output\n    #[arg(long, default_value_t = true)]\n    descriptions: bool,\n\n    /// Preserve field order\n    #[arg(long, default_value_t = true)]\n    preserve_order: bool,\n}\n\n#[tokio::main]\nasync fn main() -\u003e Result\u003c()\u003e {\n    let args = Args::parse();\n\n    // Fetch input content\n    let json_content = if args.input.starts_with(\"http://\") || args.input.starts_with(\"https://\") {\n        eprintln!(\"Fetching schema from {}...\", args.input);\n        reqwest::get(\u0026args.input)\n            .await\n            .context(\"Failed to fetch remote schema\")?\n            .text()\n            .await\n            .context(\"Failed to read response text\")?\n    } else {\n        fs::read_to_string(\u0026args.input)\n            .context(format!(\"Failed to read local file: {}\", args.input))?\n    };\n\n    // Configure converter\n    let options = ConversionOptions {\n        validate: !args.no_validate,\n        include_descriptions: args.descriptions,\n        preserve_field_order: args.preserve_order,\n        federation_version: 2,\n        infer_ids: args.infer_ids,\n    };\n\n    let converter = Converter::with_options(options);\n\n    // Convert\n    let graphql_sdl = converter\n        .json_schema_to_graphql(\u0026json_content)\n        .context(\"Conversion failed\")?;\n\n    // Output\n    if let Some(output_path) = args.output {\n        fs::write(\u0026output_path, \u0026graphql_sdl)\n            .context(format!(\"Failed to write output to {:?}\", output_path))?;\n        eprintln!(\"Successfully converted and saved to {:?}\", output_path);\n    } else {\n        println!(\"{}\", graphql_sdl);\n    }\n\n    Ok(())\n}\n","traces":[{"line":37,"address":[],"length":0,"stats":{"Line":0}},{"line":38,"address":[],"length":0,"stats":{"Line":0}},{"line":41,"address":[],"length":0,"stats":{"Line": nvalid type definition: {0}\")]\n    InvalidType(String),\n\n    /// Invalid field definition\n    #[error(\"Invalid field definition: {0}\")]\n    InvalidField(String),\n\n    /// Invalid directive\n    #[error(\"Invalid directive: {0}\")]\n    InvalidDirective(String),\n\n    /// Invalid GraphQL name (must match /^[_A-Za-z][_0-9A-Za-z]*$/)\n    #[error(\"Invalid GraphQL name '{0}': {1}\")]\n    InvalidGraphQLName(String, String),\n\n    /// Invalid x-graphql extension\n    #[error(\"Invalid x-graphql-* extension: {0}\")]\n    InvalidExtension(String),\n\n    /// Validation error\n    #[error(\"Validation error: {0}\")]\n    ValidationError(String),\n\n    /// Federation error\n    #[error(\"Federation error: {0}\")]\n    FederationError(String),\n\n    /// Unsupported feature\n    #[error(\"Unsupported feature: {0}\")]\n    UnsupportedFeature(String),\n\n    /// Type mismatch between JSON Schema and GraphQL\n    #[error(\"Type mismatch: {0}\")]\n    TypeMismatch(String),\n\n    /// Circular reference detected\n    #[error(\"Circular reference detected: {0}\")]\n    CircularReference(String),\n\n    /// JSON serialization/deserialization error\n    #[error(\"JSON error: {0}\")]\n    JsonError(String),\n\n    /// Regex error\n    #[error(\"Regex error: {0}\")]\n    RegexError(String),\n\n    /// Internal conversion error\n    #[error(\"Internal error: {0}\")]\n    InternalError(String),\n\n    /// Multiple errors occurred\n    #[error(\"Multiple errors: {0:?}\")]\n    MultipleErrors(Vec\u003cConversionError\u003e),\n}\n\nimpl ConversionError {\n    /// Create a validation error\n    pub fn validation(msg: impl Into\u003cString\u003e) -\u003e Self {\n        Self::ValidationError(msg.into())\n    }\n\n    /// Create an invalid GraphQL name error\n    pub fn invalid_name(name: impl Into\u003cString\u003e, reason: impl Into\u003cString\u003e) -\u003e Self {\n        Self::InvalidGraphQLName(name.into(), reason.into())\n    }\n\n    /// Create a missing field error\n    pub fn missing_field(field: impl Into\u003cString\u003e) -\u003e Self {\n        Self::MissingRequiredField(field.into())\n    }\n\n    /// Create an invalid extension error\n    pub fn invalid_extension(msg: impl Into\u003cString\u003e) -\u003e Self {\n        Self::InvalidExtension(msg.into())\n    }\n\n    /// Create a type mismatch error\n    pub fn type_mismatch(msg: impl Into\u003cString\u003e) -\u003e Self {\n        Self::TypeMismatch(msg.into())\n    }\n\n    /// Create an unsupported feature error\n    pub fn unsupported(msg: impl Into\u003cString\u003e) -\u003e Self {\n        Self::UnsupportedFeature(msg.into())\n    }\n\n    /// Combine multiple errors into one\n    pub fn combine(errors: Vec\u003cConversionError\u003e) -\u003e Self {\n        if errors.len() == 1 {\n            errors.into_iter().next().unwrap()\n        } else {\n            Self::MultipleErrors(errors)\n        }\n    }\n}\n\nimpl From\u003cserde_json::Error\u003e for ConversionError {\n    fn from(err: serde_json::Error) -\u003e Self {\n        ConversionError::JsonError(err.to_string())\n    }\n}\n\nimpl From\u003cregex::Error\u003e for ConversionError {\n    fn from(err: regex::Error) -\u003e Self {\n        ConversionError::RegexError(err.to_string())\n    }\n}\n\n#[cfg(feature = \"wasm\")]\nimpl From\u003cConversionError\u003e for wasm_bindgen::JsValue {\n    fn from(err: ConversionError) -\u003e Self {\n        serde_wasm_bindgen::to_value(\u0026err)\n            .unwrap_or_else(|_| wasm_bindgen::JsValue::from_str(\u0026err.to_string()))\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_error_creation() {\n        let err = ConversionError::validation(\"test error\");\n        assert!(matches!(err, ConversionError::ValidationError(_)));\n        assert_eq!(err.to_string(), \"Validation error: test error\");\n    }\n\n    #[test]\n    fn test_invalid_name_error() {\n        let err = ConversionError::invalid_name(\"123invalid\", \"must start with letter\");\n        assert!(matches!(err, ConversionError::InvalidGraphQLName(_, _)));\n        assert!(err.to_string().contains(\"123invalid\"));\n        assert!(err.to_string().contains(\"must start with letter\"));\n    }\n\n    #[test]\n    fn test_combine_errors() {\n        let errors = vec![\n            ConversionError::validation(\"error 1\"),\n            ConversionError::validation(\"error 2\"),\n        ];\n        let combined = ConversionError::combine(errors);\n        assert!(matches!(combined, ConversionError::MultipleErrors(_)));\n    }\n\n    #[test]\n    fn test_combine_single_error() {\n        let errors = vec![ConversionError::validation(\"single error\")];\n        let combined = ConversionError::combine(errors);\n        assert!(matches!(combined, ConversionError::ValidationError(_)));\n    }\n}\n","traces":[{"line":84,"address":[],"length":0,"stats":{"Line":4}},{"line":85,"address":[],"length":0,"stats":{"Line":4}},{"line":89,"address":[],"length":0,"stats":{"Line":6}},{"line":90,"address":[],"length":0,"stats":{"Line":18}},{"line":94,"address":[],"length":0,"stats":{"Line":0}},{"line":95,"address":[],"length":0,"stats":{"Line":0}},{"line":99,"address":[],"length":0,"stats":{"Line":0}},{"line":100,"address":[],"length":0,"stats":{"Line":0}},{"line":104,"address":[],"length":0,"stats":{"Line":0}},{"line":105,"address":[],"length":0,"stats":{"Line":0}},{"line":109,"address":[],"length":0,"stats":{"Line":0}},{"line":110,"address":[],"length":0,"stats":{"Line":0}},{"line":114,"address":[],"length":0,"stats":{"Line":5}},{"line":115,"address":[],"length":0,"stats":{"Line":5}},{"line":116,"address":[],"length":0,"stats":{"Line":12}},{"line":118,"address":[],"length":0,"stats":{"Line":1}},{"line":124,"address":[],"length":0,"stats":{"Line":0}},{"line":125,"address":[],"length":0,"stats":{"Line":0}},{"line":130,"address":[],"length":0,"stats":{"Line":0}},{"line":131,"address":[],"length":0,"stats":{"Line":0}},{"line":137,"address":[],"length":0,"stats":{"Line":0}},{"line":138,"address":[],"length":0,"stats":{"Line":0}},{"line":139,"address":[],"length":0,"stats":{"Line":0}}],"covered":8,"coverable":23},{"path":["/","Users","johnhjediny","Documents","GitHub","json-schema-x-graphql","converters","rust","src","graphql_to_json.rs"],"content":"//! Converts GraphQL SDL to JSON Schema.\n//!\n//! This module uses `async-graphql` to parse the GraphQL SDL into an Abstract Syntax Tree (AST),\n//! then traverses the AST to construct a corresponding JSON Schema.\n\nuse crate::error::ConversionError;\nuse crate::types::{ConversionOptions, GqlScalar, GqlType};\nuse async_graphql::parser::{\n    parse_schema,\n    types::{\n        BaseType, ConstDirective, FieldDefinition, InputValueDefinition, Type, TypeDefinition,\n        TypeKind as AsyncTypeKind, TypeSystemDefinition,\n    },\n    Positioned,\n};\nuse indexmap::IndexMap;\nuse serde_json::{json, Value as JsonValue};\n\n// --- Main Conversion Function ---\n\npub fn convert(sdl: \u0026str, _options: \u0026ConversionOptions) -\u003e Result\u003cString, ConversionError\u003e {\n    let doc = parse_schema(sdl).map_err(|e| ConversionError::InvalidGraphQLSdl(e.to_string()))?;\n    let dummy_registry = IndexMap::new();\n    let context = ConversionContext::new(sdl, \u0026dummy_registry);\n\n    let type_registry: IndexMap\u003cString, TypeDef\u003e = doc\n        .definitions\n        .into_iter()\n        .filter_map(|def| {\n            if let TypeSystemDefinition::Type(type_def) = def {\n                convert_definition(type_def, \u0026context)\n            } else {\n                None\n            }\n        })\n        .collect();\n\n    let context = ConversionContext::new(sdl, \u0026type_registry);\n\n    let mut schema_defs = IndexMap::new();\n    for (name, type_def) in context.type_registry {\n        let schema = convert_type_to_schema(type_def, \u0026context);\n        schema_defs.insert(name.clone(), schema);\n    }\n\n    let root_ref_name = if type_registry.contains_key(\"Query\") {\n        \"Query\"\n    } else {\n        type_registry\n            .values()\n            .find(|def| def.kind == TypeKind::Object)\n            .map(|def| def.name.as_str())\n            .unwrap_or_else(|| type_registry.keys().next().map_or(\"\", |s| s.as_str()))\n    };\n\n    let full_schema = json!({\n        \"$schema\": \"http://json-schema.org/draft-07/schema#\",\n        \"$ref\": format!(\"#/definitions/{}\", root_ref_name),\n        \"definitions\": schema_defs,\n    });\n\n    serde_json::to_string_pretty(\u0026full_schema).map_err(Into::into)\n}\n\n// --- Intermediate Representation ---\n\nstruct ConversionContext\u003c'a\u003e {\n    #[allow(dead_code)]\n    sdl: \u0026'a str,\n    type_registry: \u0026'a IndexMap\u003cString, TypeDef\u003e,\n}\n\nimpl\u003c'a\u003e ConversionContext\u003c'a\u003e {\n    fn new(sdl: \u0026'a str, type_registry: \u0026'a IndexMap\u003cString, TypeDef\u003e) -\u003e Self {\n        Self { sdl, type_registry }\n    }\n}\n\n#[derive(Debug, Clone)]\nstruct TypeDef {\n    kind: TypeKind,\n    name: String,\n    description: Option\u003cString\u003e,\n    fields: Vec\u003cFieldDef\u003e,\n    enum_values: Vec\u003cString\u003e,\n    union_types: Vec\u003cString\u003e,\n    interfaces: Vec\u003cString\u003e,\n    directives: Vec\u003cDirectiveDef\u003e,\n}\n\n#[derive(Debug, Clone, Copy, PartialEq, Eq)]\nenum TypeKind {\n    Object,\n    Interface,\n    Enum,\n    Union,\n    InputObject,\n    Scalar,\n}\n\n#[derive(Debug, Clone)]\nstruct FieldDef {\n    name: String,\n    field_type: GqlType,\n    description: Option\u003cString\u003e,\n    arguments: Vec\u003cArgumentDef\u003e,\n    directives: Vec\u003cDirectiveDef\u003e,\n}\n\n#[derive(Debug, Clone)]\nstruct ArgumentDef {\n    name: String,\n    arg_type: GqlType,\n    description: Option\u003cString\u003e,\n    default_value: Option\u003cString\u003e,\n}\n\n#[derive(Debug, Clone)]\nstruct DirectiveDef {\n    name: String,\n    arguments: IndexMap\u003cString, String\u003e,\n}\n\n// --- CST to Intermediate Representation Conversion ---\n\nfn get_description(desc: \u0026Option\u003cPositioned\u003cString\u003e\u003e) -\u003e Option\u003cString\u003e {\n    desc.as_ref().map(|d| d.node.clone())\n}\n\nfn convert_definition\u003c'a\u003e(\n    definition: Positioned\u003cTypeDefinition\u003e,\n    context: \u0026'a ConversionContext,\n) -\u003e Option\u003c(String, TypeDef)\u003e {\n    let name = definition.node.name.node.to_string();\n    let description = get_description(\u0026definition.node.description);\n    let directives = definition\n        .node\n        .directives\n        .iter()\n        .map(|d| convert_directive(d))\n        .collect::\u003cVec\u003c_\u003e\u003e();\n\n    let type_def = match \u0026definition.node.kind {\n        AsyncTypeKind::Object(def) =\u003e Some((\n            name.clone(),\n            TypeDef {\n                kind: TypeKind::Object,\n                name: name.clone(),\n                description: description.clone(),\n                fields: def\n                    .fields\n                    .iter()\n                    .map(|f| convert_field(f, context))\n                    .collect(),\n                enum_values: vec![],\n                union_types: vec![],\n                interfaces: def.implements.iter().map(|i| i.node.to_string()).collect(),\n                directives,\n            },\n        )),\n        AsyncTypeKind::Interface(def) =\u003e Some((\n            name.clone(),\n            TypeDef {\n                kind: TypeKind::Interface,\n                name: name.clone(),\n                description: description.clone(),\n                fields: def\n                    .fields\n                    .iter()\n                    .map(|f| convert_field(f, context))\n                    .collect(),\n                enum_values: vec![],\n                union_types: vec![],\n                interfaces: def.implements.iter().map(|i| i.node.to_string()).collect(),\n                directives,\n            },\n        )),\n        AsyncTypeKind::Enum(def) =\u003e Some((\n            name.clone(),\n            TypeDef {\n                kind: TypeKind::Enum,\n                name: name.clone(),\n                description: description.clone(),\n                fields: vec![],\n                enum_values: def\n                    .values\n                    .iter()\n                    .map(|v| v.node.value.to_string())\n                    .collect(),\n                union_types: vec![],\n                interfaces: vec![],\n                directives,\n            },\n        )),\n        AsyncTypeKind::Union(def) =\u003e Some((\n            name.clone(),\n            TypeDef {\n                kind: TypeKind::Union,\n                name: name.clone(),\n                description: description.clone(),\n                fields: vec![],\n                enum_values: vec![],\n                union_types: def.members.iter().map(|m| m.node.to_string()).collect(),\n                interfaces: vec![],\n                directives,\n            },\n        )),\n        AsyncTypeKind::InputObject(def) =\u003e Some((\n            name.clone(),\n            TypeDef {\n                kind: TypeKind::InputObject,\n                name: name.clone(),\n                description: description.clone(),\n                fields: def\n                    .fields\n                    .iter()\n                    .map(|f| convert_input_field(f, context))\n                    .collect(),\n                enum_values: vec![],\n                union_types: vec![],\n                interfaces: vec![],\n                directives,\n            },\n        )),\n        AsyncTypeKind::Scalar =\u003e Some((\n            name.clone(),\n            TypeDef {\n                kind: TypeKind::Scalar,\n                name: name.clone(),\n                description: description.clone(),\n                fields: vec![],\n                enum_values: vec![],\n                union_types: vec![],\n                interfaces: vec![],\n                directives,\n            },\n        )),\n    };\n    type_def\n}\n\nfn convert_field\u003c'a\u003e(\n    field: \u0026Positioned\u003cFieldDefinition\u003e,\n    context: \u0026'a ConversionContext,\n) -\u003e FieldDef {\n    FieldDef {\n        name: field.node.name.node.to_string(),\n        field_type: convert_gql_type(\u0026field.node.ty.node, context),\n        description: get_description(\u0026field.node.description),\n        arguments: field\n            .node\n            .arguments\n            .iter()\n            .map(|a| ArgumentDef {\n                name: a.node.name.node.to_string(),\n                arg_type: convert_gql_type(\u0026a.node.ty.node, context),\n                description: get_description(\u0026a.node.description),\n                default_value: a.node.default_value.as_ref().map(|v| v.node.to_string()),\n            })\n            .collect(),\n        directives: field\n            .node\n            .directives\n            .iter()\n            .map(|d| convert_directive(d))\n            .collect(),\n    }\n}\n\nfn convert_input_field\u003c'a\u003e(\n    field: \u0026Positioned\u003cInputValueDefinition\u003e,\n    context: \u0026'a ConversionContext,\n) -\u003e FieldDef {\n    FieldDef {\n        name: field.node.name.node.to_string(),\n        field_type: convert_gql_type(\u0026field.node.ty.node, context),\n        description: get_description(\u0026field.node.description),\n        arguments: vec![], // Input fields don't have arguments\n        directives: field\n            .node\n            .directives\n            .iter()\n            .map(|d| convert_directive(d))\n            .collect(),\n    }\n}\n\nfn convert_directive(directive: \u0026Positioned\u003cConstDirective\u003e) -\u003e DirectiveDef {\n    let mut arguments = IndexMap::new();\n    for (name, value) in \u0026directive.node.arguments {\n        arguments.insert(name.node.to_string(), value.node.to_string());\n    }\n    DirectiveDef {\n        name: directive.node.name.node.to_string(),\n        arguments,\n    }\n}\n\nfn convert_gql_type\u003c'a\u003e(gql_type: \u0026Type, context: \u0026'a ConversionContext) -\u003e GqlType {\n    let result = match \u0026gql_type.base {\n        BaseType::Named(name) =\u003e {\n            let type_name = name.to_string();\n            let scalar = match type_name.as_str() {\n                \"String\" =\u003e GqlScalar::String,\n                \"Int\" =\u003e GqlScalar::Int,\n                \"Float\" =\u003e GqlScalar::Float,\n                \"Boolean\" =\u003e GqlScalar::Boolean,\n                \"ID\" =\u003e GqlScalar::Id,\n                _ =\u003e GqlScalar::Custom(type_name),\n            };\n            GqlType::Scalar(scalar)\n        }\n        BaseType::List(inner) =\u003e GqlType::List(Box::new(convert_gql_type(inner, context))),\n    };\n    if gql_type.nullable {\n        result\n    } else {\n        GqlType::NonNull(Box::new(result))\n    }\n}\n\n// --- IR to JSON Schema Conversion ---\n\nfn convert_type_to_schema(type_def: \u0026TypeDef, context: \u0026ConversionContext) -\u003e JsonValue {\n    let mut x_graphql = json!({\n        \"typeName\": type_def.name,\n        \"kind\": format!(\"{:?}\", type_def.kind).to_lowercase(),\n    });\n\n    if !type_def.interfaces.is_empty() {\n        x_graphql[\"implements\"] = json!(type_def.interfaces);\n    }\n\n    if !type_def.directives.is_empty() {\n        x_graphql[\"directives\"] = json!(type_def\n            .directives\n            .iter()\n            .map(|d| {\n                let mut dir_json = json!({ \"name\": d.name });\n                if !d.arguments.is_empty() {\n                    dir_json[\"arguments\"] = json!(d.arguments);\n                }\n                dir_json\n            })\n            .collect::\u003cVec\u003c_\u003e\u003e());\n\n        // Extract federation directives\n        let mut federation = json!({});\n        let mut has_federation = false;\n\n        for dir in \u0026type_def.directives {\n            match dir.name.as_str() {\n                \"key\" =\u003e {\n                    if let Some(fields) = dir.arguments.get(\"fields\") {\n                        let fields_str = fields.trim_matches('\"');\n                        let resolvable = dir\n                            .arguments\n                            .get(\"resolvable\")\n                            .map(|v| v != \"false\")\n                            .unwrap_or(true);\n\n                        let key_obj = if resolvable {\n                            json!({ \"fields\": fields_str, \"resolvable\": true })\n                        } else {\n                            json!({ \"fields\": fields_str, \"resolvable\": false })\n                        };\n\n                        if let Some(keys) =\n                            federation.get_mut(\"keys\").and_then(|v| v.as_array_mut())\n                        {\n                            keys.push(key_obj);\n                        } else {\n                            federation[\"keys\"] = json!([key_obj]);\n                        }\n                        has_federation = true;\n                    }\n                }\n                \"shareable\" =\u003e {\n                    federation[\"shareable\"] = json!(true);\n                    has_federation = true;\n                }\n                \"extends\" =\u003e {\n                    federation[\"extends\"] = json!(true);\n                    has_federation = true;\n                }\n                \"interfaceObject\" =\u003e {\n                    federation[\"interfaceObject\"] = json!(true);\n                    has_federation = true;\n                }\n                \"authenticated\" =\u003e {\n                    federation[\"authenticated\"] = json!(true);\n                    has_federation = true;\n                }\n                \"requiresScopes\" =\u003e {\n                    if let Some(scopes) = dir.arguments.get(\"scopes\") {\n                        // scopes is usually a list of lists of strings, simplified here\n                        federation[\"requiresScopes\"] = json!(scopes);\n                        has_federation = true;\n                    }\n                }\n                _ =\u003e {}\n            }\n        }\n\n        if has_federation {\n            x_graphql[\"federation\"] = federation;\n        }\n    }\n\n    let mut schema = json!({\n        \"x-graphql\": x_graphql\n    });\n\n    if let Some(description) = \u0026type_def.description {\n        schema[\"description\"] = json!(description);\n    }\n\n    match type_def.kind {\n        TypeKind::Object | TypeKind::Interface | TypeKind::InputObject =\u003e {\n            schema[\"type\"] = json!(\"object\");\n            let mut properties = IndexMap::new();\n            let mut required = Vec::new();\n\n            for field in \u0026type_def.fields {\n                let (prop_schema, is_req) = gql_type_to_json_schema(\u0026field.field_type, context);\n                let mut final_prop_schema = prop_schema;\n\n                let mut field_x_graphql = json!({});\n                if field.name != camel_to_snake(\u0026field.name) {\n                    field_x_graphql[\"fieldName\"] = json!(field.name);\n                }\n\n                // Add arguments\n                if !field.arguments.is_empty() {\n                    let args: IndexMap\u003cString, JsonValue\u003e = field\n                        .arguments\n                        .iter()\n                        .map(|a| {\n                            let mut arg_schema = json!({\n                                \"type\": gql_type_to_string(\u0026a.arg_type)\n                            });\n                            if let Some(desc) = \u0026a.description {\n                                arg_schema[\"description\"] = json!(desc);\n                            }\n                            if let Some(default) = \u0026a.default_value {\n                                arg_schema[\"default\"] = json!(default);\n                            }\n                            (a.name.clone(), arg_schema)\n                        })\n                        .collect();\n                    field_x_graphql[\"args\"] = json!(args);\n                }\n\n                // Add directives\n                if !field.directives.is_empty() {\n                    field_x_graphql[\"directives\"] = json!(field\n                        .directives\n                        .iter()\n                        .map(|d| {\n                            let mut dir_json = json!({ \"name\": d.name });\n                            if !d.arguments.is_empty() {\n                                dir_json[\"arguments\"] = json!(d.arguments);\n                            }\n                            dir_json\n                        })\n                        .collect::\u003cVec\u003c_\u003e\u003e());\n\n                    // Handle federation field directives\n                    let mut federation = json!({});\n                    let mut has_federation = false;\n\n                    for dir in \u0026field.directives {\n                        match dir.name.as_str() {\n                            \"external\" =\u003e {\n                                federation[\"external\"] = json!(true);\n                                has_federation = true;\n                            }\n                            \"requires\" =\u003e {\n                                if let Some(fields) = dir.arguments.get(\"fields\") {\n                                    federation[\"requires\"] = json!(fields.trim_matches('\"'));\n                                    has_federation = true;\n                                }\n                            }\n                            \"provides\" =\u003e {\n                                if let Some(fields) = dir.arguments.get(\"fields\") {\n                                    federation[\"provides\"] = json!(fields.trim_matches('\"'));\n                                    has_federation = true;\n                                }\n                            }\n                            \"override\" =\u003e {\n                                if let Some(from) = dir.arguments.get(\"from\") {\n                                    federation[\"override\"] =\n                                        json!({ \"from\": from.trim_matches('\"') });\n                                    has_federation = true;\n                                }\n                            }\n                            \"shareable\" =\u003e {\n                                federation[\"shareable\"] = json!(true);\n                                has_federation = true;\n                            }\n                            _ =\u003e {}\n                        }\n                    }\n                    if has_federation {\n                        field_x_graphql[\"federation\"] = federation;\n                    }\n                }\n\n                if field_x_graphql\n                    .as_object()\n                    .map(|o| !o.is_empty())\n                    .unwrap_or(false)\n                {\n                    final_prop_schema[\"x-graphql\"] = field_x_graphql;\n                }\n\n                if let Some(desc) = \u0026field.description {\n                    final_prop_schema[\"description\"] = json!(desc);\n                }\n\n                let prop_name = camel_to_snake(\u0026field.name);\n                if is_req {\n                    required.push(prop_name.clone());\n                }\n                properties.insert(prop_name, final_prop_schema);\n            }\n            schema[\"properties\"] = json!(properties);\n            if !required.is_empty() {\n                schema[\"required\"] = json!(required);\n            }\n        }\n        TypeKind::Enum =\u003e {\n            schema[\"type\"] = json!(\"string\");\n            schema[\"enum\"] = json!(type_def.enum_values);\n        }\n        TypeKind::Union =\u003e {\n            schema[\"oneOf\"] = json!(type_def\n                .union_types\n                .iter()\n                .map(|t| json!({ \"$ref\": format!(\"#/definitions/{}\", t) }))\n                .collect::\u003cVec\u003c_\u003e\u003e());\n\n            // Union specific x-graphql info\n            if let Some(x) = schema.get_mut(\"x-graphql\").and_then(|v| v.as_object_mut()) {\n                x.insert(\"unionTypes\".to_string(), json!(type_def.union_types));\n            }\n        }\n        TypeKind::Scalar =\u003e {\n            schema[\"type\"] = json!(\"string\"); // Default, can be overridden by user\n        }\n    }\n    schema\n}\n\nfn gql_type_to_string(gql_type: \u0026GqlType) -\u003e String {\n    match gql_type {\n        GqlType::Scalar(scalar) =\u003e match scalar {\n            GqlScalar::String =\u003e \"String\".to_string(),\n            GqlScalar::Int =\u003e \"Int\".to_string(),\n            GqlScalar::Float =\u003e \"Float\".to_string(),\n            GqlScalar::Boolean =\u003e \"Boolean\".to_string(),\n            GqlScalar::Id =\u003e \"ID\".to_string(),\n            GqlScalar::Custom(name) =\u003e name.clone(),\n        },\n        GqlType::List(inner) =\u003e format!(\"[{}]\", gql_type_to_string(inner)),\n        GqlType::NonNull(inner) =\u003e format!(\"{}!\", gql_type_to_string(inner)),\n    }\n}\n\nfn gql_type_to_json_schema(gql_type: \u0026GqlType, context: \u0026ConversionContext) -\u003e (JsonValue, bool) {\n    match gql_type {\n        GqlType::Scalar(scalar) =\u003e (\n            match scalar {\n                GqlScalar::String =\u003e json!({\"type\": \"string\"}),\n                GqlScalar::Int =\u003e json!({\"type\": \"integer\"}),\n                GqlScalar::Float =\u003e json!({\"type\": \"number\"}),\n                GqlScalar::Boolean =\u003e json!({\"type\": \"boolean\"}),\n                GqlScalar::Id =\u003e json!({\"type\": \"string\", \"format\": \"uuid\"}),\n                GqlScalar::Custom(name) =\u003e json!({ \"$ref\": format!(\"#/definitions/{}\", name) }),\n            },\n            false,\n        ),\n        GqlType::List(inner) =\u003e (\n            json!({\n                \"type\": \"array\",\n                \"items\": gql_type_to_json_schema(inner, context).0,\n            }),\n            false,\n        ),\n        GqlType::NonNull(inner) =\u003e {\n            let (schema, _) = gql_type_to_json_schema(inner, context);\n            (schema, true)\n        }\n    }\n}\n\n// --- Utility Functions ---\n\nfn camel_to_snake(s: \u0026str) -\u003e String {\n    let mut snake = String::new();\n    for (i, ch) in s.chars().enumerate() {\n        if i \u003e 0 \u0026\u0026 ch.is_uppercase() {\n            snake.push('_');\n        }\n        snake.push(ch.to_ascii_lowercase());\n    }\n    snake\n}\n\n// --- Tests ---\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use pretty_assertions::assert_eq;\n\n    #[test]\n    fn test_convert_simple_type() {\n        let sdl = r#\"\n            \"\"\"\n            A user of the system.\n            \"\"\"\n            type User {\n                id: ID!\n                name: String\n                email: String!\n            }\n        \"#;\n        let options = ConversionOptions::default();\n        let result = convert(sdl, \u0026options).unwrap();\n\n        let expected_str = serde_json::to_string_pretty(\u0026json!({\n          \"$schema\": \"http://json-schema.org/draft-07/schema#\",\n          \"$ref\": \"#/definitions/User\",\n          \"definitions\": {\n            \"User\": {\n              \"description\": \"A user of the system.\",\n              \"type\": \"object\",\n              \"x-graphql\": {\n                \"typeName\": \"User\",\n                \"kind\": \"object\"\n              },\n              \"properties\": {\n                \"id\": {\n                  \"type\": \"string\",\n                  \"format\": \"uuid\"\n                },\n                \"name\": {\n                  \"type\": \"string\"\n                },\n                \"email\": {\n                  \"type\": \"string\"\n                }\n              },\n              \"required\": [\n                \"id\",\n                \"email\"\n              ]\n            }\n          }\n        }))\n        .unwrap();\n\n        assert_eq!(result, expected_str);\n    }\n}\n","traces":[{"line":21,"address":[],"length":0,"stats":{"Line":7}},{"line":22,"address":[],"length":0,"stats":{"Line":28}},{"line":23,"address":[],"length":0,"stats":{"Line":14}},{"line":24,"address":[],"length":0,"stats":{"Line":28}},{"line":26,"address":[],"length":0,"stats":{"Line":21}},{"line":27,"address":[],"length":0,"stats":{"Line":7}},{"line":29,"address":[],"length":0,"stats":{"Line":22}},{"line":30,"address":[],"length":0,"stats":{"Line":30}},{"line":31,"address":[],"length":0,"stats":{"Line":45}},{"line":33,"address":[],"length":0,"stats":{"Line":0}},{"line":38,"address":[],"length":0,"stats":{"Line":28}},{"line":40,"address":[],"length":0,"stats":{"Line":14}},{"line":41,"address":[],"length":0,"stats":{"Line":67}},{"line":42,"address":[],"length":0,"stats":{"Line":75}},{"line":43,"address":[],"length":0,"stats":{"Line":60}},{"line":46,"address":[],"length":0,"stats":{"Line":28}},{"line":47,"address":[],"length":0,"stats":{"Line":0}},{"line":49,"address":[],"length":0,"stats":{"Line":7}},{"line":51,"address":[],"length":0,"stats":{"Line":21}},{"line":52,"address":[],"length":0,"stats":{"Line":21}},{"line":53,"address":[],"length":0,"stats":{"Line":7}},{"line":56,"address":[],"length":0,"stats":{"Line":14}},{"line":57,"address":[],"length":0,"stats":{"Line":7}},{"line":58,"address":[],"length":0,"stats":{"Line":21}},{"line":59,"address":[],"length":0,"stats":{"Line":7}},{"line":62,"address":[],"length":0,"stats":{"Line":2 :0,"stats":{"Line":0}},{"line":576,"address":[],"length":0,"stats":{"Line":0}},{"line":577,"address":[],"length":0,"stats":{"Line":4}},{"line":578,"address":[],"length":0,"stats":{"Line":15}},{"line":579,"address":[],"length":0,"stats":{"Line":50}},{"line":583,"address":[],"length":0,"stats":{"Line":4}},{"line":584,"address":[],"length":0,"stats":{"Line":4}},{"line":585,"address":[],"length":0,"stats":{"Line":4}},{"line":586,"address":[],"length":0,"stats":{"Line":6}},{"line":588,"address":[],"length":0,"stats":{"Line":2}},{"line":590,"address":[],"length":0,"stats":{"Line":16}},{"line":591,"address":[],"length":0,"stats":{"Line":48}},{"line":592,"address":[],"length":0,"stats":{"Line":16}},{"line":599,"address":[],"length":0,"stats":{"Line":82}},{"line":600,"address":[],"length":0,"stats":{"Line":164}},{"line":601,"address":[],"length":0,"stats":{"Line":1330}},{"line":602,"address":[],"length":0,"stats":{"Line":1478}},{"line":603,"address":[],"length":0,"stats":{"Line":16}},{"line":605,"address":[],"length":0,"stats":{"Line":2168}},{"line":607,"address":[],"length":0,"stats":{"Line":82}}],"covered":224,"coverable":329},{"path":["/","Users","johnhjediny","Documents","GitHub","json-schema-x-graphql","converters","rust","src","json_to_graphql.rs"],"content":"//! JSON Schema to GraphQL SDL conversion\n\nuse crate::error::{ConversionError, Result};\nuse crate::types::ConversionOptions;\nuse serde_json::Value as JsonValue;\nuse std::collections::HashMap;\n\n/// Convert JSON Schema to GraphQL SDL\npub fn convert(schema: \u0026JsonValue, options: \u0026ConversionOptions) -\u003e Result\u003cString\u003e {\n    let mut output = String::new();\n    let mut context = ConversionContext::with_root(options, schema);\n\n    // Process the schema\n    if let Some(obj) = schema.as_object() {\n        // Check for $defs/definitions section\n        if let Some(defs) = obj.get(\"$defs\").or_else(|| obj.get(\"definitions\")) {\n            if let Some(defs_obj) = defs.as_object() {\n                for (def_key, def_schema) in defs_obj {\n                    // Determine type name: x-graphql-type-name \u003e title \u003e def_key\n                    let type_name = def_schema\n                        .get(\"x-graphql-type-name\")\n                        .and_then(|v| v.as_str())\n                        .or_else(|| def_schema.get(\"title\").and_then(|v| v.as_str()))\n                        .unwrap_or(def_key);\n\n                    let type_def = convert_type_definition(def_schema, type_name, \u0026mut context)?;\n                    output.push_str(\u0026type_def);\n                }\n            }\n        }\n\n        // Check for root type definition\n        let root_type_name = obj\n            .get(\"x-graphql-type-name\")\n            .and_then(|v| v.as_str())\n            .or_else(|| obj.get(\"title\").and_then(|v| v.as_str()));\n\n        if let Some(name) = root_type_name {\n            let type_def = convert_type_definition(schema, name, \u0026mut context)?;\n            output.push_str(\u0026type_def);\n        } else if obj.contains_key(\"properties\")\n            \u0026\u0026 !obj.contains_key(\"$defs\")\n            \u0026\u0026 !obj.contains_key(\"definitions\")\n        {\n            return Err(ConversionError::missing_field(\n                \"title or x-graphql-type-name (required for root object type)\",\n            ));\n        }\n    }\n\n    if output.is_empty() {\n        return Err(ConversionError::InvalidJsonSchema(\n            \"No GraphQL types found in schema. Ensure types have 'title' or 'x-graphql-type-name' or are in '$defs'.\".to_string(),\n        ));\n    }\n\n    Ok(output)\n}\n\nstruct ConversionContext\u003c'a\u003e {\n    options: \u0026'a ConversionOptions,\n    #[allow(dead_code)]\n    type_names: HashMap\u003cString, String\u003e,\n    #[allow(dead_code)]\n    root_schema: Option\u003c\u0026'a JsonValue\u003e,\n}\n\nimpl\u003c'a\u003e ConversionContext\u003c'a\u003e {\n    fn with_root(options: \u0026'a ConversionOptions, root_schema: \u0026'a JsonValue) -\u003e Self {\n        Self {\n            options,\n            type_names: HashMap::new(),\n            root_schema: Some(root_schema),\n        }\n    }\n}\n\nfn convert_type_definition(\n    schema: \u0026JsonValue,\n    type_name: \u0026str,\n    context: \u0026mut ConversionContext,\n) -\u003e Result\u003cString\u003e {\n    let obj = schema.as_object().ok_or_else(|| {\n        ConversionError::InvalidJsonSchema(\"schema must be an object\".to_string())\n    })?;\n\n    let mut output = String::new();\n\n    // Description\n    if context.options.include_descriptions {\n        if let Some(description) = obj.get(\"description\").and_then(|v| v.as_str()) {\n            output.push_str(\u0026format_description(description));\n        }\n    }\n\n    // Determine Type Kind\n    let x_graphql = obj.get(\"x-graphql\").and_then(|v| v.as_object());\n\n    let explicit_kind = x_graphql\n        .and_then(|x| x.get(\"type\").and_then(|v| v.as_str()))\n        .or_else(|| obj.get(\"x-graphql-type\").and_then(|v| v.as_str()))\n        .or_else(|| obj.get(\"x-graphql-type-kind\").and_then(|v| v.as_str()));\n\n    // Check for \"enum\", \"union\", \"interface\" keywords\n    let kind_hint = explicit_kind.map(|s| s.to_lowercase()).unwrap_or_default();\n\n    let kind = if kind_hint == \"enum\" || obj.contains_key(\"enum\") {\n        \"enum\"\n    } else if kind_hint == \"union\" || obj.contains_key(\"oneOf\") {\n        \"union\"\n    } else if kind_hint == \"interface\" {\n        \"interface\"\n    } else if kind_hint == \"input\" || kind_hint == \"input_object\" {\n        \"input\"\n    } else if kind_hint == \"scalar\" {\n        \"scalar\"\n    } else {\n        \"type\"\n    };\n\n    // Collect Directives\n    let mut directives_json: Vec\u003cJsonValue\u003e = x_graphql\n        .and_then(|x| x.get(\"directives\"))\n        .or_else(|| obj.get(\"x-graphql-directives\"))\n        .and_then(|v| v.as_array())\n        .cloned()\n        .unwrap_or_default();\n\n    // Federation support (Legacy \u0026 New)\n    if let Some(keys) = obj\n        .get(\"x-graphql-federation-keys\")\n        .and_then(|v| v.as_array())\n    {\n        for key in keys {\n            if let Some(fields) = key.get(\"fields\") {\n                directives_json\n                    .push(serde_json::json!({ \"name\": \"key\", \"arguments\": { \"fields\": fields } }));\n            }\n        }\n    }\n\n    // Comprehensive Federation Support\n    let fed = x_graphql.and_then(|x| x.get(\"federation\").and_then(|v| v.as_object()));\n\n    if let Some(fed) = fed {\n        // @key\n        if let Some(keys) = fed.get(\"keys\").and_then(|v| v.as_array()) {\n            for key_val in keys {\n                if let Some(fields) = key_val.as_str() {\n                    directives_json.push(\n                        serde_json::json!({ \"name\": \"key\", \"arguments\": { \"fields\": fields } }),\n                    );\n                } else if let Some(key_obj) = key_val.as_object() {\n                    if let Some(fields) = key_obj.get(\"fields\") {\n                        let mut args = serde_json::json!({ \"fields\": fields });\n                        if let Some(resolvable) = key_obj.get(\"resolvable\") {\n                            args.as_object_mut()\n                                .unwrap()\n                                .insert(\"resolvable\".to_string(), resolvable.clone());\n                        }\n                        directives_json\n                            .push(serde_json::json!({ \"name\": \"key\", \"arguments\": args }));\n                    }\n                }\n            }\n        }\n    }\n\n    // @shareable\n    if obj\n        .get(\"x-graphql-federation-shareable\")\n        .and_then(|v| v.as_bool())\n        == Some(true)\n        || fed.and_then(|f| f.get(\"shareable\").and_then(|v| v.as_bool())) == Some(true)\n    {\n        directives_json.push(serde_json::json!({ \"name\": \"shareable\" }));\n    }\n\n    // @inaccessible\n    if obj\n        .get(\"x-graphql-federation-inaccessible\")\n        .and_then(|v| v.as_bool())\n        == Some(true)\n        || fed.and_then(|f| f.get(\"inaccessible\").and_then(|v| v.as_bool())) == Some(true)\n    {\n        directives_json.push(serde_json::json!({ \"name\": \"inaccessible\" }));\n    }\n\n    // @extends\n    if fed.and_then(|f| f.get(\"extends\").and_then(|v| v.as_bool())) == Some(true) {\n        directives_json.push(serde_json::json!({ \"name\": \"extends\" }));\n    }\n\n    // @interfaceObject\n    if obj\n        .get(\"x-graphql-federation-interface-object\")\n        .and_then(|v| v.as_bool())\n        == Some(true)\n        || fed.and_then(|f| f.get(\"interfaceObject\").and_then(|v| v.as_bool())) == Some(true)\n    {\n        directives_json.push(serde_json::json!({ \"name\": \"interfaceObject\" }));\n    }\n\n    // @authenticated\n    if obj\n        .get(\"x-graphql-federation-authenticated\")\n        .and_then(|v| v.as_bool())\n        == Some(true)\n        || fed.and_then(|f| f.get(\"authenticated\").and_then(|v| v.as_bool())) == Some(true)\n    {\n        directives_json.push(serde_json::json!({ \"name\": \"authenticated\" }));\n    }\n\n    // @requiresScopes\n    if let Some(scopes) = obj\n        .get(\"x-graphql-federation-requires-scopes\")\n        .and_then(|v| v.as_array())\n        .or_else(|| fed.and_then(|f| f.get(\"requiresScopes\").and_then(|v| v.as_array())))\n    {\n        directives_json.push(\n            serde_json::json!({ \"name\": \"requiresScopes\", \"arguments\": { \"scopes\": scopes } }),\n        );\n    }\n\n    // @composeDirective\n    if let Some(cd) = fed.and_then(|f| f.get(\"composeDirective\").and_then(|v| v.as_str())) {\n        directives_json\n            .push(serde_json::json!({ \"name\": \"composeDirective\", \"arguments\": { \"name\": cd } }));\n    }\n\n    // @tag\n    if let Some(tags) = obj\n        .get(\"x-graphql-federation-tags\")\n        .and_then(|v| v.as_array())\n    {\n        for tag in tags {\n            if let Some(name) = tag.as_str() {\n                directives_json\n                    .push(serde_json::json!({ \"name\": \"tag\", \"arguments\": { \"name\": name } }));\n            }\n        }\n    }\n\n    if let Some(fed) = fed {\n        if let Some(tags) = fed.get(\"tags\").and_then(|v| v.as_array()) {\n            for tag in tags {\n                if let Some(tag_obj) = tag.as_object() {\n                    if let Some(name) = tag_obj.get(\"name\") {\n                        directives_json.push(\n                            serde_json::json!({ \"name\": \"tag\", \"arguments\": { \"name\": name } }),\n                        );\n                    }\n                }\n            }\n        }\n    }\n\n    let directives_str = format_directives(\u0026JsonValue::Array(directives_json))?;\n\n    // Generate SDL based on kind\n    match kind {\n        \"enum\" =\u003e {\n            output.push_str(\u0026format!(\"enum {}{} {{\\n\", type_name, directives_str));\n            if let Some(enum_vals) = obj.get(\"enum\").and_then(|v| v.as_array()) {\n                for value in enum_vals {\n                    if let Some(val_str) = value.as_str() {\n                        output.push_str(\u0026format!(\"  {}\\n\", val_str));\n                    }\n                }\n            } else {\n                return Err(ConversionError::InvalidType(\n                    \"enum type must have 'enum' field\".to_string(),\n                ));\n            }\n            output.push_str(\"}\\n\\n\");\n        }\n        \"union\" =\u003e {\n            output.push_str(\u0026format!(\"union {}{} = \", type_name, directives_str));\n            let mut members = Vec::new();\n\n            // Try explicit list first\n            if let Some(types) = obj.get(\"x-graphql-union-types\").and_then(|v| v.as_array()) {\n                for t in types {\n                    if let Some(s) = t.as_str() {\n                        members.push(s.to_string());\n                    }\n                }\n            }\n            // Try oneOf\n            else if let Some(one_of) = obj.get(\"oneOf\").and_then(|v| v.as_array()) {\n                for item in one_of {\n                    // Extract ref\n                    if let Some(ref_path) = item.get(\"$ref\").and_then(|v| v.as_str()) {\n                        if let Some(name) = extract_type_name_from_ref(ref_path) {\n                            members.push(name);\n                        }\n                    } else if let Some(title) = item.get(\"title\").and_then(|v| v.as_str()) {\n                        members.push(title.to_string());\n                    }\n                }\n            }\n\n            if members.is_empty() {\n                return Err(ConversionError::InvalidType(\n                    \"union type must have members\".to_string(),\n                ));\n            }\n            output.push_str(\u0026members.join(\" | \"));\n            output.push_str(\"\\n\\n\");\n        }\n        \"scalar\" =\u003e {\n            output.push_str(\u0026format!(\"scalar {}{}\\n\\n\", type_name, directives_str));\n        }\n        _ =\u003e {\n            // Object, Interface, Input\n            output.push_str(\u0026format!(\"{} {}\", kind, type_name));\n\n            // Interfaces (implements)\n            let mut implements = Vec::new();\n            // Legacy\n            if let Some(impl_array) = obj\n                .get(\"x-graphql-implements\")\n                .or_else(|| obj.get(\"x-graphql-type-implements\"))\n                .and_then(|v| v.as_array())\n            {\n                for v in impl_array {\n                    if let Some(s) = v.as_str() {\n                        implements.push(s.to_string());\n                    }\n                }\n            }\n            // allOf inference\n            if let Some(all_of) = obj.get(\"allOf\").and_then(|v| v.as_array()) {\n                for item in all_of {\n                    if let Some(ref_path) = item.get(\"$ref\").and_then(|v| v.as_str()) {\n                        if let Some(name) = extract_type_name_from_ref(ref_path) {\n                            // Assuming all refs in allOf are interfaces if this is an object type\n                            implements.push(name);\n                        }\n                    }\n                }\n            }\n\n            if !implements.is_empty() {\n                output.push_str(\u0026format!(\" implements {}\", implements.join(\" \u0026 \")));\n            }\n\n            output.push_str(\u0026directives_str);\n            output.push_str(\" {\\n\");\n\n            // Properties\n            if let Some(properties) = obj.get(\"properties\").and_then(|v| v.as_object()) {\n                let required_fields = obj\n                    .get(\"required\")\n                    .and_then(|v| v.as_array())\n                    .map(|arr| arr.iter().filter_map(|v| v.as_str()).collect::\u003cVec\u003c_\u003e\u003e())\n                    .unwrap_or_default();\n\n                let mut prop_names: Vec\u003c_\u003e = properties.keys().collect();\n                if !context.options.preserve_field_order {\n                    prop_names.sort();\n                }\n\n                for prop_name in prop_names {\n                    if let Some(prop_schema) = properties.get(prop_name) {\n                        let field_def = convert_field(\n                            prop_name,\n                            prop_schema,\n                            required_fields.contains(\u0026prop_name.as_str()),\n                            context,\n                        )?;\n                        output.push_str(\u0026format!(\"  {}\\n\", field_def));\n                    }\n                }\n            }\n\n            output.push_str(\"}\\n\\n\");\n        }\n    }\n\n    Ok(output)\n}\n\nfn convert_field(\n    field_name: \u0026str,\n    schema: \u0026JsonValue,\n    is_required: bool,\n    context: \u0026mut ConversionContext,\n) -\u003e Result\u003cString\u003e {\n    let obj = schema.as_object().ok_or_else(|| {\n        ConversionError::InvalidField(format!(\"field '{}' schema must be an object\", field_name))\n    })?;\n\n    let mut output = String::new();\n\n    // Description\n    if context.options.include_descriptions {\n        if let Some(description) = obj.get(\"description\").and_then(|v| v.as_str()) {\n            output.push_str(\u0026format_description(description));\n        }\n    }\n\n    // Check x-graphql object\n    let x_graphql = obj.get(\"x-graphql\").and_then(|v| v.as_object());\n\n    // Field Name\n    let gql_field_name = x_graphql\n        .and_then(|x| x.get(\"fieldName\"))\n        .or_else(|| obj.get(\"x-graphql-field-name\"))\n        .and_then(|v| v.as_str())\n        .map(|s| s.to_string())\n        .unwrap_or_else(|| snake_to_camel(field_name));\n\n    output.push_str(\u0026gql_field_name);\n\n    // Arguments\n    if let Some(args) = x_graphql\n        .and_then(|x| x.get(\"args\").or_else(|| x.get(\"arguments\")))\n        .or_else(|| obj.get(\"x-graphql-args\"))\n        .or_else(|| obj.get(\"x-graphql-arguments\"))\n    {\n        output.push_str(\u0026format_field_arguments(args)?);\n    }\n\n    // Type\n    let mut field_type = infer_graphql_type(schema, is_required)?;\n\n    if context.options.infer_ids\n        \u0026\u0026 (field_name == \"id\" || field_name == \"_id\")\n        \u0026\u0026 (field_type == \"String\" || field_type == \"String!\")\n    {\n        field_type = if is_required {\n            \"ID!\".to_string()\n        } else {\n            \"ID\".to_string()\n        };\n    }\n\n    output.push_str(\u0026format!(\": {}\", field_type));\n\n    // Directives\n    let mut directives_json: Vec\u003cJsonValue\u003e = x_graphql\n        .and_then(|x| x.get(\"directives\"))\n        .or_else(|| obj.get(\"x-graphql-directives\"))\n        .and_then(|v| v.as_array())\n        .cloned()\n        .unwrap_or_default();\n\n    // Deprecation\n    let is_deprecated = obj\n        .get(\"deprecated\")\n        .and_then(|v| v.as_bool())\n        .or_else(|| {\n            obj.get(\"x-graphql-field-deprecated\")\n                .and_then(|v| v.as_bool())\n        })\n        .unwrap_or(false);\n\n    if is_deprecated {\n        let mut directive = serde_json::json!({ \"name\": \"deprecated\" });\n\n        let reason = x_graphql\n            .and_then(|x| x.get(\"deprecation\"))\n            .and_then(|d| {\n                if let Some(s) = d.as_str() {\n                    Some(s)\n                } else {\n                    d.get(\"reason\").and_then(|v| v.as_str())\n                }\n            })\n            .or_else(|| obj.get(\"x-graphql-deprecation\").and_then(|v| v.as_str()))\n            .or_else(|| {\n                obj.get(\"x-graphql-field-deprecation-reason\")\n                    .and_then(|v| v.as_str())\n            });\n\n        if let Some(reason) = reason {\n            let args = serde_json::json!({ \"reason\": reason });\n            directive\n                .as_object_mut()\n                .unwrap()\n                .insert(\"arguments\".to_string(), args);\n        }\n        directives_json.push(directive);\n    }\n\n    // Federation directives\n    let fed = x_graphql.and_then(|x| x.get(\"federation\").and_then(|v| v.as_object()));\n\n    if obj\n        .get(\"x-graphql-federation-external\")\n        .and_then(|v| v.as_bool())\n        == Some(true)\n        || fed.and_then(|f| f.get(\"external\").and_then(|v| v.as_bool())) == Some(true)\n    {\n        directives_json.push(serde_json::json!({ \"name\": \"external\" }));\n    }\n\n    if obj\n        .get(\"x-graphql-federation-authenticated\")\n        .and_then(|v| v.as_bool())\n        == Some(true)\n        || fed.and_then(|f| f.get(\"authenticated\").and_then(|v| v.as_bool())) == Some(true)\n    {\n        directives_json.push(serde_json::json!({ \"name\": \"authenticated\" }));\n    }\n\n    if obj\n        .get(\"x-graphql-federation-inaccessible\")\n        .and_then(|v| v.as_bool())\n        == Some(true)\n        || fed.and_then(|f| f.get(\"inaccessible\").and_then(|v| v.as_bool())) == Some(true)\n    {\n        directives_json.push(serde_json::json!({ \"name\": \"inaccessible\" }));\n    }\n\n    if let Some(fields) = obj\n        .get(\"x-graphql-federation-requires\")\n        .and_then(|v| v.as_str())\n        .or_else(|| fed.and_then(|f| f.get(\"requires\").and_then(|v| v.as_str())))\n    {\n        directives_json\n            .push(serde_json::json!({ \"name\": \"requires\", \"arguments\": { \"fields\": fields } }));\n    }\n\n    if let Some(fields) = obj\n        .get(\"x-graphql-federation-provides\")\n        .and_then(|v| v.as_str())\n        .or_else(|| fed.and_then(|f| f.get(\"provides\").and_then(|v| v.as_str())))\n    {\n        directives_json\n            .push(serde_json::json!({ \"name\": \"provides\", \"arguments\": { \"fields\": fields } }));\n    }\n\n    if let Some(override_from) = obj\n        .get(\"x-graphql-federation-override-from\")\n        .and_then(|v| v.as_str())\n        .or_else(|| {\n            fed.and_then(|f| {\n                f.get(\"override\")\n                    .and_then(|o| o.get(\"from\").and_then(|v| v.as_str()))\n            })\n        })\n    {\n        directives_json.push(\n            serde_json::json!({ \"name\": \"override\", \"arguments\": { \"from\": override_from } }),\n        );\n    }\n\n    if obj\n        .get(\"x-graphql-federation-shareable\")\n        .and_then(|v| v.as_bool())\n        == Some(true)\n        || fed.and_then(|f| f.get(\"shareable\").and_then(|v| v.as_bool())) == Some(true)\n    {\n        directives_json.push(serde_json::json!({ \"name\": \"shareable\" }));\n    }\n\n    output.push_str(\u0026format_directives(\u0026JsonValue::Array(directives_json))?);\n\n    Ok(output)\n}\n\nfn infer_graphql_type(schema: \u0026JsonValue, is_required: bool) -\u003e Result\u003cString\u003e {\n    let obj = schema\n        .as_object()\n        .ok_or_else(|| ConversionError::InvalidType(\"schema must be an object\".to_string()))?;\n\n    let x_graphql = obj.get(\"x-graphql\").and_then(|v| v.as_object());\n\n    // Check for nullable override\n    let explicit_nullable = x_graphql.and_then(|x| x.get(\"nullable\").and_then(|v| v.as_bool()));\n    let should_be_required = if let Some(nullable) = explicit_nullable {\n        !nullable\n    } else {\n        is_required\n    };\n\n    // Helper to ensure we don't double-bang (e.g. \"ID!!\" -\u003e \"ID!\")\n    let finalize = move |t: String| {\n        if should_be_required \u0026\u0026 !t.ends_with('!') {\n            format!(\"{}!\", t)\n        } else {\n            t\n        }\n    };\n\n    // 1. Explicit override\n    if let Some(gql_type) = x_graphql\n        .and_then(|x| x.get(\"type\"))\n        .or_else(|| obj.get(\"x-graphql-type\"))\n        .and_then(|v| v.as_str())\n    {\n        return Ok(finalize(gql_type.to_string()));\n    }\n\n    // 2. Reference\n    if let Some(ref_path) = obj.get(\"$ref\").and_then(|v| v.as_str()) {\n        if let Some(type_name) = extract_type_name_from_ref(ref_path) {\n            return Ok(finalize(type_name));\n        }\n    }\n\n    // 3. Format Hints\n    if let Some(format) = obj.get(\"format\").and_then(|v| v.as_str()) {\n        let mapped = match format {\n            \"date-time\" =\u003e Some(\"DateTime\"),\n            \"date\" =\u003e Some(\"Date\"),\n            \"time\" =\u003e Some(\"Time\"),\n            \"email\" =\u003e Some(\"Email\"),\n            \"uri\" =\u003e Some(\"URL\"),\n            \"uuid\" =\u003e Some(\"ID\"),\n            _ =\u003e None,\n        };\n        if let Some(t) = mapped {\n            return Ok(finalize(t.to_string()));\n        }\n    }\n\n    // 4. Type Mapping\n    let schema_type = obj.get(\"type\").and_then(|v| v.as_str());\n\n    let gql_type = match schema_type {\n        Some(\"string\") =\u003e \"String\".to_string(),\n        Some(\"integer\") =\u003e \"Int\".to_string(),\n        Some(\"number\") =\u003e \"Float\".to_string(),\n        Some(\"boolean\") =\u003e \"Boolean\".to_string(),\n        Some(\"array\") =\u003e {\n            if let Some(items) = obj.get(\"items\") {\n                // Check for nullableItems override\n                let items_nullable =\n                    x_graphql.and_then(|x| x.get(\"nullableItems\").and_then(|v| v.as_bool()));\n\n                let item_is_required = if let Some(nullable) = items_nullable {\n                    !nullable\n                } else {\n                    false\n                };\n\n                let item_type = infer_graphql_type(items, item_is_required)?;\n                format!(\"[{}]\", item_type)\n            } else {\n                \"JSON\".to_string()\n            }\n        }\n        Some(\"object\") =\u003e {\n            if let Some(name) = x_graphql\n                .and_then(|x| x.get(\"typeName\"))\n                .or_else(|| obj.get(\"x-graphql-type-name\"))\n                .and_then(|v| v.as_str())\n            {\n                name.to_string()\n            } else {\n                \"JSON\".to_string()\n            }\n        }\n        _ =\u003e \"JSON\".to_string(),\n    };\n\n    Ok(finalize(gql_type))\n}\n\nfn format_field_arguments(args: \u0026JsonValue) -\u003e Result\u003cString\u003e {\n    let mut output = String::new();\n    output.push('(');\n\n    let mut first = true;\n\n    if let Some(args_obj) = args.as_object() {\n        if args_obj.is_empty() {\n            return Ok(String::new());\n        }\n        // Object format: {\"limit\": { \"type\": \"integer\", \"default\": 10 }}\n        for (arg_name, arg_schema) in args_obj {\n            if !first {\n                output.push_str(\", \");\n            }\n            first = false;\n\n            output.push_str(arg_name);\n            output.push_str(\": \");\n\n            let arg_type = infer_graphql_type(arg_schema, false)?;\n            output.push_str(\u0026arg_type);\n\n            if let Some(default) = arg_schema.get(\"default\") {\n                output.push_str(\" = \");\n                output.push_str(\u0026format_value(default));\n            }\n        }\n    } else if let Some(args_array) = args.as_array() {\n        // Legacy array format\n        for arg in args_array {\n            if let Some(arg_obj) = arg.as_object() {\n                let name = arg_obj\n                    .get(\"name\")\n                    .and_then(|v| v.as_str())\n                    .unwrap_or(\"arg\");\n                if !first {\n                    output.push_str(\", \");\n                }\n                first = false;\n                output.push_str(name);\n                output.push_str(\": \");\n\n                let type_str = arg_obj\n                    .get(\"type\")\n                    .and_then(|v| v.as_str())\n                    .unwrap_or(\"String\");\n                output.push_str(type_str);\n\n                if let Some(default) = arg_obj.get(\"default\") {\n                    output.push_str(\" = \");\n                    output.push_str(\u0026format_value(default));\n                }\n            }\n        }\n    }\n\n    if first {\n        return Ok(String::new());\n    }\n\n    output.push(')');\n    Ok(output)\n}\n\nfn format_value(value: \u0026JsonValue) -\u003e String {\n    match value {\n        JsonValue::String(s) =\u003e format!(\"\\\"{}\\\"\", s.replace(\"\\\"\", \"\\\\\\\"\")),\n        JsonValue::Number(n) =\u003e n.to_string(),\n        JsonValue::Bool(b) =\u003e b.to_string(),\n        JsonValue::Null =\u003e \"null\".to_string(),\n        _ =\u003e \"null\".to_string(),\n    }\n}\n\nfn format_directives(directives: \u0026JsonValue) -\u003e Result\u003cString\u003e {\n    let dir_array = match directives.as_array() {\n        Some(arr) =\u003e arr,\n        None =\u003e return Ok(String::new()),\n    };\n\n    let mut output = String::new();\n\n    for directive in dir_array {\n        let dir_obj = directive.as_object().ok_or_else(|| {\n            ConversionError::InvalidDirective(\"directive must be an object\".to_string())\n        })?;\n\n        let dir_name = dir_obj\n            .get(\"name\")\n            .and_then(|v| v.as_str())\n            .ok_or_else(|| {\n                ConversionError::InvalidDirective(\"directive must have a name\".to_string())\n            })?;\n\n        output.push_str(\u0026format!(\" @{}\", dir_name));\n\n        if let Some(args) = dir_obj.get(\"arguments\").and_then(|v| v.as_object()) {\n            if !args.is_empty() {\n                output.push('(');\n                let mut first = true;\n                for (key, value) in args {\n                    if !first {\n                        output.push_str(\", \");\n                    }\n                    first = false;\n                    output.push_str(\u0026format!(\"{}: {}\", key, format_value(value)));\n                }\n                output.push(')');\n            }\n        }\n    }\n\n    Ok(output)\n}\n\nfn format_description(description: \u0026str) -\u003e String {\n    format!(\n        \"\\\"\\\"\\\"\\n{}\\n\\\"\\\"\\\"\\n\",\n        description.replace(\"\\\"\\\"\\\"\", \"\\\\\\\"\\\"\\\"\")\n    )\n}\n\nfn snake_to_camel(snake: \u0026str) -\u003e String {\n    let mut result = String::new();\n    let mut capitalize_next = false;\n    for c in snake.chars() {\n        if c == '_' {\n            capitalize_next = true;\n        } else if capitalize_next {\n            result.push(c.to_ascii_uppercase());\n            capitalize_next = false;\n        } else {\n            result.push(c);\n        }\n    }\n    result\n}\n\nfn snake_to_pascal(snake: \u0026str) -\u003e String {\n    let mut result = String::new();\n    let mut capitalize_next = true;\n    for c in snake.chars() {\n        if c == '_' {\n            capitalize_next = true;\n        } else if capitalize_next {\n            result.push(c.to_ascii_uppercase());\n            capitalize_next = false;\n        } else {\n            result.push(c);\n        }\n    }\n    result\n}\n\nfn extract_type_name_from_ref(ref_path: \u0026str) -\u003e Option\u003cString\u003e {\n    let path = ref_path.trim_start_matches('#').trim_start_matches('/');\n    let segments: Vec\u003c\u0026str\u003e = path.split('/').collect();\n    let last_segment = segments.last()?;\n    Some(snake_to_pascal(last_segment))\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use serde_json::json;\n\n    #[test]\n    fn test_snake_to_camel() {\n        assert_eq!(snake_to_camel(\"user_id\"), \"userId\");\n    }\n\n    #[test]\n    fn test_infer_graphql_type() {\n        let schema = json!({\"type\": \"string\"});\n        assert_eq!(infer_graphql_type(\u0026schema, false).unwrap(), \"String\");\n        assert_eq!(infer_graphql_type(\u0026schema, true).unwrap(), \"String!\");\n\n        let schema_uuid = json!({\"type\": \"string\", \"format\": \"uuid\"});\n        assert_eq!(infer_graphql_type(\u0026schema_uuid, false).unwrap(), \"ID\");\n\n        let schema_override = json!({\"type\": \"string\", \"x-graphql-type\": \"MyScalar\"});\n        assert_eq!(\n            infer_graphql_type(\u0026schema_override, false).unwrap(),\n            \"MyScalar\"\n        );\n        // Test double-bang prevention\n        assert_eq!(\n            infer_graphql_type(\u0026schema_override, true).unwrap(),\n            \"MyScalar!\"\n        );\n        let schema_override_bang = json!({\"type\": \"string\", \"x-graphql-type\": \"MyScalar!\"});\n        assert_eq!(\n            infer_graphql_type(\u0026schema_override_bang, true).unwrap(),\n            \"MyScalar!\"\n        );\n    }\n\n    #[test]\n    fn test_convert_simple_type() {\n        let options = ConversionOptions::default();\n        let schema = json!({\n            \"$schema\": \"https://json-schema.org/draft/2020-12/schema\",\n            \"title\": \"User\",\n            \"type\": \"object\",\n            \"properties\": {\n                \"id\": { \"type\": \"string\", \"format\": \"uuid\" },\n                \"name\": { \"type\": \"string\" }\n            },\n            \"required\": [\"id\"]\n        });\n\n        let result = convert(\u0026schema, \u0026options);\n        assert!(result.is_ok());\n        let graphql = result.unwrap();\n        assert!(graphql.contains(\"type User\"));\n        assert!(graphql.contains(\"id: ID!\"));\n        assert!(graphql.contains(\"name: String\"));\n    }\n\n    #[test]\n    fn test_convert_union_from_oneof() {\n        let options = ConversionOptions::default();\n        let schema = json!({\n            \"title\": \"SearchResult\",\n            \"oneOf\": [\n                { \"$ref\": \"#/$defs/User\" },\n                { \"$ref\": \"#/$defs/Post\" }\n            ],\n            \"$defs\": {\n                \"User\": { \"title\": \"User\", \"type\": \"object\" },\n                \"Post\": { \"title\": \"Post\", \"type\": \"object\" }\n            }\n        });\n        let result = convert(\u0026schema, \u0026options).unwrap();\n        assert!(result.contains(\"union SearchResult = User | Post\"));\n    }\n\n    #[test]\n    fn test_infer_ids_option() {\n        let mut options = ConversionOptions::default();\n        options.infer_ids = true;\n\n        let schema = json!({\n            \"title\": \"User\",\n            \"type\": \"object\",\n            \"properties\": {\n                \"id\": { \"type\": \"string\" },\n                \"_id\": { \"type\": \"string\" },\n                \"other_id\": { \"type\": \"string\" },\n                \"name\": { \"type\": \"string\" }\n            }\n        });\n\n        let result = convert(\u0026schema, \u0026options).unwrap();\n        assert!(result.contains(\"id: ID\"));\n        a
