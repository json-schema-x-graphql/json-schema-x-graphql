ength":0,"stats":{"Line":15}},{"line":155,"address":[],"length":0,"stats":{"Line":4}},{"line":156,"address":[],"length":0,"stats":{"Line":2}},{"line":158,"address":[],"length":0,"stats":{"Line":48}},{"line":159,"address":[],"length":0,"stats":{"Line":12}},{"line":164,"address":[],"length":0,"stats":{"Line":14}},{"line":165,"address":[],"length":0,"stats":{"Line":7}},{"line":166,"address":[],"length":0,"stats":{"Line":1}},{"line":168,"address":[],"length":0,"stats":{"Line":24}},{"line":169,"address":[],"length":0,"stats":{"Line":6}},{"line":175,"address":[],"length":0,"stats":{"Line":6}},{"line":176,"address":[],"length":0,"stats":{"Line":3}},{"line":179,"address":[],"length":0,"stats":{"Line":6}},{"line":180,"address":[],"length":0,"stats":{"Line":0}},{"line":183,"address":[],"length":0,"stats":{"Line":3}},{"line":184,"address":[],"length":0,"stats":{"Line":9}},{"line":185,"address":[],"length":0,"stats":{"Line":6}},{"line":186,"address":[],"length":0,"stats":{"Line":3}},{"line":187,"address":[],"length":0,"stats":{"Line":3}},{"line":231,"address":[],"length":0,"stats":{"Line":2}},{"line":233,"address":[],"length":0,"stats":{"Line":4}},{"line":234,"address":[],"length":0,"stats":{"Line":2}},{"line":239,"address":[],"length":0,"stats":{"Line":1}},{"line":240,"address":[],"length":0,"stats":{"Line":6}},{"line":241,"address":[],"length":0,"stats":{"Line":1}},{"line":245,"address":[],"length":0,"stats":{"Line":2}},{"line":246,"address":[],"length":0,"stats":{"Line":6}},{"line":248,"address":[],"length":0,"stats":{"Line":2}},{"line":249,"address":[],"length":0,"stats":{"Line":2}},{"line":250,"address":[],"length":0,"stats":{"Line":3}},{"line":251,"address":[],"length":0,"stats":{"Line":1}},{"line":253,"address":[],"length":0,"stats":{"Line":3}},{"line":255,"address":[],"length":0,"stats":{"Line":4}},{"line":256,"address":[],"length":0,"stats":{"Line":2}},{"line":259,"address":[],"length":0,"stats":{"Line":2}},{"line":337,"address":[],"length":0,"stats":{"Line":1}},{"line":338,"address":[],"length":0,"stats":{"Line":1}},{"line":339,"address":[],"length":0,"stats":{"Line":2}},{"line":340,"address":[],"length":0,"stats":{"Line":0}},{"line":341,"address":[],"length":0,"stats":{"Line":0}},{"line":342,"address":[],"length":0,"stats":{"Line":0}},{"line":343,"address":[],"length":0,"stats":{"Line":0}},{"line":344,"address":[],"length":0,"stats":{"Line":0}},{"line":345,"address":[],"length":0,"stats":{"Line":0}},{"line":346,"address":[],"length":0,"stats":{"Line":0}},{"line":351,"address":[],"length":0,"stats":{"Line":1}},{"line":352,"address":[],"length":0,"stats":{"Line":1}},{"line":353,"address":[],"length":0,"stats":{"Line":1}},{"line":354,"address":[],"length":0,"stats":{"Line":0}},{"line":355,"address":[],"length":0,"stats":{"Line":0}},{"line":356,"address":[],"length":0,"stats":{"Line":0}},{"line":357,"address":[],"length":0,"stats":{"Line":0}},{"line":358,"address":[],"length":0,"stats":{"Line":0}},{"line":359,"address":[],"length":0,"stats":{"Line":0}},{"line":364,"address":[],"length":0,"stats":{"Line":3}},{"line":365,"address":[],"length":0,"stats":{"Line":3}},{"line":366,"address":[],"length":0,"stats":{"Line":1}},{"line":367,"address":[],"length":0,"stats":{"Line":1}},{"line":368,"address":[],"length":0,"stats":{"Line":1}},{"line":369,"address":[],"length":0,"stats":{"Line":0}},{"line":370,"address":[],"length":0,"stats":{"Line":0}},{"line":371,"address":[],"length":0,"stats":{"Line":0}},{"line":372,"address":[],"length":0,"stats":{"Line":0}}],"covered":82,"coverable":100},{"path":["/","Users","johnhjediny","Documents","GitHub","json-schema-x-graphql","converters","rust","src","validator.rs"],"content":"//! Validation utilities for JSON Schema and GraphQL SDL\n\nuse crate::error::{ConversionError, Result};\nuse regex::Regex;\nuse serde_json::Value as JsonValue;\nuse std::sync::OnceLock;\n\n/// Regex for valid GraphQL names: /^[_A-Za-z][_0-9A-Za-z]*$/\nfn graphql_name_regex() -\u003e \u0026'static Regex {\n    static REGEX: OnceLock\u003cRegex\u003e = OnceLock::new();\n    REGEX.get_or_init(|| Regex::new(r\"^[_A-Za-z][_0-9A-Za-z]*$\").unwrap())\n}\n\n/// Regex for valid GraphQL type references (including lists and non-null)\nfn graphql_type_regex() -\u003e \u0026'static Regex {\n    static REGEX: OnceLock\u003cRegex\u003e = OnceLock::new();\n    REGEX.get_or_init(|| Regex::new(r\"^(\\[)?[_A-Za-z][_0-9A-Za-z]*!?(\\])?!?$\").unwrap())\n}\n\n/// Regex for valid URLs\nfn url_regex() -\u003e \u0026'static Regex {\n    static REGEX: OnceLock\u003cRegex\u003e = OnceLock::new();\n    REGEX.get_or_init(|| Regex::new(r\"^https?://[^\\s/$.?#].[^\\s]*$\").unwrap())\n}\n\n/// Validate a GraphQL name\npub fn validate_graphql_name(name: \u0026str) -\u003e Result\u003c()\u003e {\n    if name.is_empty() {\n        return Err(ConversionError::invalid_name(name, \"name cannot be empty\"));\n    }\n\n    if !graphql_name_regex().is_match(name) {\n        return Err(ConversionError::invalid_name(\n            name,\n            \"name must match /^[_A-Za-z][_0-9A-Za-z]*$/\",\n        ));\n    }\n\n    // Check for GraphQL reserved names\n    if is_reserved_name(name) {\n        return Err(ConversionError::invalid_name(\n            name,\n            \"name is reserved by GraphQL specification\",\n        ));\n    }\n\n    Ok(())\n}\n\n/// Check if a name is reserved by GraphQL\nfn is_reserved_name(name: \u0026str) -\u003e bool {\n    // Names starting with __ are reserved\n    name.starts_with(\"__\")\n}\n\n/// Validate a GraphQL type reference\npub fn validate_graphql_type(type_str: \u0026str) -\u003e Result\u003c()\u003e {\n    if type_str.is_empty() {\n        return Err(ConversionError::InvalidType(\n            \"type cannot be empty\".to_string(),\n        ));\n    }\n\n    if !graphql_type_regex().is_match(type_str) {\n        return Err(ConversionError::InvalidType(format!(\n            \"invalid GraphQL type format: {}\",\n            type_str\n        )));\n    }\n\n    Ok(())\n}\n\n/// Validate federation field selection syntax\npub fn validate_federation_fields(fields: \u0026str) -\u003e Result\u003c()\u003e {\n    if fields.is_empty() {\n        return Err(ConversionError::FederationError(\n            \"fields selection cannot be empty\".to_string(),\n        ));\n    }\n\n    // Basic validation - more complex parsing would be needed for full support\n    if !fields.chars().all(|c| {\n        c.is_alphanumeric() || c == '_' || c == ' ' || c == '\"' || c == ',' || c == '{' || c == '}'\n    }) {\n        return Err(ConversionError::FederationError(format!(\n            \"invalid characters in fields selection: {}\",\n            fields\n        )));\n    }\n\n    Ok(())\n}\n\n/// Validate a URL\npub fn validate_url(url: \u0026str) -\u003e Result\u003c()\u003e {\n    if !url_regex().is_match(url) {\n        return Err(ConversionError::ValidationError(format!(\n            \"invalid URL format: {}\",\n            url\n        )));\n    }\n    Ok(())\n}\n\n/// Validate JSON Schema structure\npub fn validate_json_schema(schema: \u0026JsonValue) -\u003e Result\u003c()\u003e {\n    let mut errors = Vec::new();\n\n    // Check if it's an object\n    if !schema.is_object() {\n        return Err(ConversionError::InvalidJsonSchema(\n            \"schema must be an object\".to_string(),\n        ));\n    }\n\n    let obj = schema.as_object().unwrap();\n\n    // Validate $schema if present\n    if let Some(schema_version) = obj.get(\"$schema\") {\n        if let Some(version_str) = schema_version.as_str() {\n            if !version_str.contains(\"json-schema.org\") {\n                errors.push(ConversionError::validation(format!(\n                    \"invalid $schema URL: {}\",\n                    version_str\n                )));\n            }\n        }\n    }\n\n    // Validate x-graphql-type-name if present\n    if let Some(type_name) = obj.get(\"x-graphql-type-name\") {\n        if let Some(name) = type_name.as_str() {\n            if let Err(e) = validate_graphql_name(name) {\n                errors.push(e);\n            }\n        } else {\n            errors.push(ConversionError::invalid_extension(\n                \"x-graphql-type-name must be a string\",\n            ));\n        }\n    }\n\n    // Validate x-graphql-type if present\n    if let Some(gql_type) = obj.get(\"x-graphql-type\") {\n        if let Some(type_str) = gql_type.as_str() {\n            if let Err(e) = validate_graphql_type(type_str) {\n                errors.push(e);\n            }\n        } else {\n            errors.push(ConversionError::invalid_extension(\n                \"x-graphql-type must be a string\",\n            ));\n        }\n    }\n\n    // Validate properties recursively\n    if let Some(properties) = obj.get(\"properties\") {\n        if let Some(props_obj) = properties.as_object() {\n            for (prop_name, prop_schema) in props_obj {\n                // Validate property name format\n                if prop_name.is_empty() {\n                    errors.push(ConversionError::validation(\n                        \"property name cannot be empty\".to_string(),\n                    ));\n                }\n\n                // Recursively validate nested schemas\n                if let Err(e) = validate_json_schema(prop_schema) {\n                    errors.push(e);\n                }\n            }\n        }\n    }\n\n    // Validate items for arrays\n    if let Some(items) = obj.get(\"items\") {\n        if let Err(e) = validate_json_schema(items) {\n            errors.push(e);\n        }\n    }\n\n    // Validate x-graphql-directives if present\n    if let Some(directives) = obj.get(\"x-graphql-directives\") {\n        if let Some(dir_array) = directives.as_array() {\n            for directive in dir_array {\n                if let Err(e) = validate_directive(directive) {\n                    errors.push(e);\n                }\n            }\n        } else {\n            errors.push(ConversionError::invalid_extension(\n                \"x-graphql-directives must be an array\",\n            ));\n        }\n    }\n\n    if errors.is_empty() {\n        Ok(())\n    } else {\n        Err(ConversionError::combine(errors))\n    }\n}\n\n/// Validate a directive definition\nfn validate_directive(directive: \u0026JsonValue) -\u003e Result\u003c()\u003e {\n    let obj = directive.as_object().ok_or_else(|| {\n        ConversionError::InvalidDirective(\"directive must be an object\".to_string())\n    })?;\n\n    // Validate directive name\n    if let Some(name) = obj.get(\"name\") {\n        if let Some(name_str) = name.as_str() {\n            validate_graphql_name(name_str)?;\n        } else {\n            return Err(ConversionError::InvalidDirective(\n                \"directive name must be a string\".to_string(),\n            ));\n        }\n    } else {\n        return Err(ConversionError::InvalidDirective(\n            \"directive must have a name\".to_string(),\n        ));\n    }\n\n    // Validate arguments if present\n    if let Some(args) = obj.get(\"arguments\") {\n        if !args.is_object() {\n            return Err(ConversionError::InvalidDirective(\n                \"directive arguments must be an object\".to_string(),\n            ));\n        }\n    }\n\n    Ok(())\n}\n\n/// Validate GraphQL SDL syntax (basic validation)\npub fn validate_graphql_sdl(sdl: \u0026str) -\u003e Result\u003c()\u003e {\n    if sdl.trim().is_empty() {\n        return Err(ConversionError::InvalidGraphQLSdl(\n            \"SDL cannot be empty\".to_string(),\n        ));\n    }\n\n    // Basic syntax checks\n    let lines: Vec\u003c\u0026str\u003e = sdl.lines().collect();\n    let mut errors = Vec::new();\n    let mut brace_count = 0;\n    let mut in_type_definition = false;\n    let mut is_enum_definition = false;\n    let mut in_block_string = false;\n\n    for (line_num, line) in lines.iter().enumerate() {\n        let trimmed = line.trim();\n\n        // Handle block strings\n        if trimmed.contains(\"\\\"\\\"\\\"\") {\n            let count = trimmed.matches(\"\\\"\\\"\\\"\").count();\n            if count % 2 != 0 {\n                in_block_string = !in_block_string;\n            }\n            continue;\n        }\n\n        if in_block_string {\n            continue;\n        }\n\n        // Skip empty lines and comments\n        if trimmed.is_empty() || trimmed.starts_with('#') {\n            continue;\n        }\n\n        // Count braces for matching\n        brace_count += trimmed.matches('{').count() as i32;\n        brace_count -= trimmed.matches('}').count() as i32;\n\n        // Check for type definition keywords\n        if trimmed.starts_with(\"type \")\n            || trimmed.starts_with(\"interface \")\n            || trimmed.starts_with(\"enum \")\n            || trimmed.starts_with(\"union \")\n            || trimmed.starts_with(\"input \")\n            || trimmed.starts_with(\"scalar \")\n        {\n            in_type_definition = true;\n            is_enum_definition = trimmed.starts_with(\"enum \");\n\n            // Extract type name after keyword\n            let parts: Vec\u003c\u0026str\u003e = trimmed.split_whitespace().collect();\n            if parts.len() \u003e= 2 {\n                let type_name = parts[1].trim_end_matches('{').trim();\n                if let Err(e) = validate_graphql_name(type_name) {\n                    errors.push(ConversionError::InvalidGraphQLSdl(format!(\n                        \"Line {}: {}\",\n                        line_num + 1,\n                        e\n                    )));\n                }\n            }\n        }\n\n        // Check for field syntax inside type definitions\n        if in_type_definition \u0026\u0026 !is_enum_definition \u0026\u0026 brace_count \u003e 0 \u0026\u0026 trimmed.contains(':') {\n            // Basic field validation: should have \"name: Type\" format\n            if !trimmed.starts_with(\"type \")\n                \u0026\u0026 !trimmed.starts_with(\"interface \")\n                \u0026\u0026 !trimmed.starts_with(\"enum \")\n                \u0026\u0026 !trimmed.starts_with(\"union \")\n                \u0026\u0026 !trimmed.starts_with(\"input \")\n                \u0026\u0026 !trimmed.starts_with(\"scalar \")\n            {\n                let parts: Vec\u003c\u0026str\u003e = trimmed.split(':').collect();\n                if parts.len() \u003c 2 {\n                    errors.push(ConversionError::InvalidGraphQLSdl(format!(\n                        \"Line {}: Invalid field syntax\",\n                        line_num + 1\n                    )));\n                }\n            }\n        }\n\n        // Check for text without colons inside type bodies (likely invalid)\n        if in_type_definition\n            \u0026\u0026 !is_enum_definition\n            \u0026\u0026 brace_count \u003e 0\n            \u0026\u0026 !trimmed.is_empty()\n            \u0026\u0026 !trimmed.contains(':')\n            \u0026\u0026 !trimmed.starts_with('@')\n            \u0026\u0026 !trimmed.contains('{')\n            \u0026\u0026 !trimmed.contains('}')\n            \u0026\u0026 !trimmed.starts_with(\"\\\"\")\n            \u0026\u0026 !trimmed.starts_with(\"type \")\n            \u0026\u0026 !trimmed.starts_with(\"interface \")\n            \u0026\u0026 !trimmed.starts_with(\"enum \")\n            \u0026\u0026 !trimmed.starts_with(\"union \")\n            \u0026\u0026 !trimmed.starts_with(\"input \")\n            \u0026\u0026 !trimmed.starts_with(\"scalar \")\n        {\n            // Check if it looks like it should be a field (has alphanumeric chars)\n            if trimmed.chars().any(|c| c.is_alphanumeric()) {\n                let msg = if trimmed.contains('(') \u0026\u0026 trimmed.contains(')') {\n                    \"Invalid field/argument definition - check syntax\"\n                } else {\n                    \"Invalid field definition - missing colon between name and type\"\n                };\n\n                errors.push(Con     <script>const e = React.createElement;

function pathToString(path) {
  if (path[0] === '/') {
    return '/' + path.slice(1).join('/');
  } else {
    return path.join('/');
  }
}

function findCommonPath(files) {
  if (!files || !files.length) {
    return [];
  }

  function isPrefix(arr, prefix) {
    if (arr.length < prefix.length) {
      return false;
    }
    for (let i = prefix.length - 1; i >= 0; --i) {
      if (arr[i] !== prefix[i]) {
        return false;
      }
    }
    return true;
  }

  let commonPath = files[0].path.slice(0, -1);
  while (commonPath.length) {
    if (files.every(file => isPrefix(file.path, commonPath))) {
      break;
    }
    commonPath.pop();
  }
  return commonPath;
}

function findFolders(files) {
  if (!files || !files.length) {
    return [];
  }

  let folders = files.filter(file => file.path.length > 1).map(file => file.path[0]);
  folders = [...new Set(folders)]; // unique
  folders.sort();

  folders = folders.map(folder => {
    let filesInFolder = files
      .filter(file => file.path[0] === folder)
      .map(file => ({
        ...file,
        path: file.path.slice(1),
        parent: [...file.parent, file.path[0]],
      }));

    const children = findFolders(filesInFolder); // recursion

    return {
      is_folder: true,
      path: [folder],
      parent: files[0].parent,
      children,
      covered: children.reduce((sum, file) => sum + file.covered, 0),
      coverable: children.reduce((sum, file) => sum + file.coverable, 0),
      prevRun: {
        covered: children.reduce((sum, file) => sum + file.prevRun.covered, 0),
        coverable: children.reduce((sum, file) => sum + file.prevRun.coverable, 0),
      },
    };
  });

  return [...folders, ...files.filter(file => file.path.length === 1)];
}

class App extends React.Component {
  constructor(...args) {
    super(...args);

    this.state = {
      current: [],
    };
  }

  componentDidMount() {
    this.updateStateFromLocation();
    window.addEventListener('hashchange', () => this.updateStateFromLocation(), false);
  }

  updateStateFromLocation() {
    if (window.location.hash.length > 1) {
      const current = window.location.hash.slice(1).split('/');
      this.setState({current});
    } else {
      this.setState({current: []});
    }
  }

  getCurrentPath() {
    let file = this.props.root;
    let path = [file];
    for (let p of this.state.current) {
      file = file.children.find(file => file.path[0] === p);
      if (!file) {
        return path;
      }
      path.push(file);
    }
    return path;
  }

  render() {
    const path = this.getCurrentPath();
    const file = path[path.length - 1];

    let w = null;
    if (file.is_folder) {
      w = e(FilesList, {
        folder: file,
        onSelectFile: this.selectFile.bind(this),
        onBack: path.length > 1 ? this.back.bind(this) : null,
      });
    } else {
      w = e(DisplayFile, {
        file,
        onBack: this.back.bind(this),
      });
    }

    return e('div', {className: 'app'}, w);
  }

  selectFile(file) {
    this.setState(
      ({current}) => {
        return {current: [...current, file.path[0]]};
      },
      () => this.updateHash(),
    );
  }

  back(file) {
    this.setState(
      ({current}) => {
        return {current: current.slice(0, current.length - 1)};
      },
      () => this.updateHash(),
    );
  }

  updateHash() {
    if (!this.state.current || !this.state.current.length) {
      window.location = '#';
    } else {
      window.location = '#' + this.state.current.join('/');
    }
  }
}

function FilesList({folder, onSelectFile, onBack}) {
  let files = folder.children;
  return e(
    'div',
    {className: 'display-folder'},
    e(FileHeader, {file: folder, onBack}),
    e(
      'table',
      {className: 'files-list'},
      e('thead', {className: 'files-list__head'}, e('tr', null, e('th', null, 'Path'), e('th', null, 'Coverage'))),
      e(
        'tbody',
        {className: 'files-list__body'},
        files.map(file => e(File, {file, onClick: onSelectFile})),
      ),
    ),
  );
}

function File({file, onClick}) {
  const coverage = file.coverable ? (file.covered / file.coverable) * 100 : -1;
  const coverageDelta =
    file.prevRun && (file.covered / file.coverable) * 100 - (file.prevRun.covered / file.prevRun.coverable) * 100;

  return e(
    'tr',
    {
      className:
        'files-list__file' +
        (coverage >= 0 && coverage < 50 ? ' files-list__file_low' : '') +
        (coverage >= 50 && coverage < 80 ? ' files-list__file_medium' : '') +
        (coverage >= 80 ? ' files-list__file_high' : '') +
        (file.is_folder ? ' files-list__file_folder' : ''),
      onClick: () => onClick(file),
    },
    e('td', null, e('a', null, pathToString(file.path))),
    e(
      'td',
      null,
      file.covered + ' / ' + file.coverable + (coverage >= 0 ? ' (' + coverage.toFixed(2) + '%)' : ''),
      e(
        'span',
        {title: 'Change from the previous run'},
        coverageDelta ? ` (${coverageDelta > 0 ? '+' : ''}${coverageDelta.toFixed(2)}%)` : '',
      ),
    ),
  );
}

function DisplayFile({file, onBack}) {
  return e('div', {className: 'display-file'}, e(FileHeader, {file, onBack}), e(FileContent, {file}));
}

function FileHeader({file, onBack}) {
  const coverage = (file.covered / file.coverable) * 100;
  const coverageDelta = file.prevRun && coverage - (file.prevRun.covered / file.prevRun.coverable) * 100;

  return e(
    'div',
    {className: 'file-header'},
    onBack ? e('a', {className: 'file-header__back', onClick: onBack}, 'Back') : null,
    e('div', {className: 'file-header__name'}, pathToString([...file.parent, ...file.path])),
    e(
      'div',
      {className: 'file-header__stat'},
      'Covered: ' + file.covered + ' of ' + file.coverable + (file.coverable ? ' (' + coverage.toFixed(2) + '%)' : ''),
      e(
        'span',
        {title: 'Change from the previous run'},
        coverageDelta ? ` (${coverageDelta > 0 ? '+' : ''}${coverageDelta.toFixed(2)}%)` : '',
      ),
      e('input', {id: 'theme-toggle', type: 'checkbox', hidden: true}),
      e('label', {for: 'theme-toggle', id: 'theme-toggle-label'}, '🌙'),
    ),
  );
}

function FileContent({file}) {
  return e(
    'pre',
    {className: 'file-content'},
    file.content.split(/\r?\n/).map((line, index) => {
      const trace = file.traces.find(trace => trace.line === index + 1);
      const covered = trace && trace.stats.Line;
      const uncovered = trace && !trace.stats.Line;
      return e(
        'code',
        {
          className: 'code-line' + (covered ? ' code-line_covered' : '') + (uncovered ? ' code-line_uncovered' : ''),
          title: trace ? JSON.stringify(trace.stats, null, 2) : null,
        },
        line,
      );
    }),
  );
}

(function () {
  const commonPath = findCommonPath(data.files);
  const prevFilesMap = new Map();

  previousData &&
    previousData.files.forEach(file => {
      const path = file.path.slice(commonPath.length).join('/');
      prevFilesMap.set(path, file);
    });

  const files = data.files.map(file => {
    const path = file.path.slice(commonPath.length);
    const {covered = 0, coverable = 0} = prevFilesMap.get(path.join('/')) || {};
    return {
      ...file,
      path,
      parent: commonPath,
      prevRun: {covered, coverable},
    };
  });

  const children = findFolders(files);

  const root = {
    is_folder: true,
    children,
    path: commonPath,
    parent: [],
    covered: children.reduce((sum, file) => sum + file.covered, 0),
    coverable: children.reduce((sum, file) => sum + file.coverable, 0),
    prevRun: {
      covered: children.reduce((sum, file) => sum + file.prevRun.covered, 0),
      coverable: children.reduce((sum, file) => sum + file.prevRun.coverable, 0),
    },
  };

  ReactDOM.render(e(App, {root, prevFilesMap}), document.getElementById('root'));

  const toggle = document.getElementById('theme-toggle');
  const label = document.getElementById('theme-toggle-label');
  label.textContent = '🌙';

  toggle.addEventListener('change', () => {
    if (toggle.checked) {
      document.documentElement.setAttribute('data-theme', 'dark');
      label.textContent = '☀️';
    } else {
      document.documentElement.removeAttribute('data-theme');
      label.textContent = '🌙';
    }
  });
})();
</script>
