"""
A custom scalar representing a date and time in ISO 8601 format
"""
scalar DateTime

"""
A custom scalar for arbitrary JSON values
"""
scalar JSON

type Query {
  """
  Alias for globalRecordId for GraphQL Node interface
  """
  id: String
  system_metadata: system_metadata!
  common_elements: common_elements!
  system_extensions: system_extensions
  """
  Related contracts via referencedPiid
  """
  related_contracts: String
  """
  Procurement Instrument Identifier
  """
  piid: String
  """
  Vendor information structure
  """
  vendor_info: vendor_info
  """
  Alias (camelCase) for vendor_info for GraphQL parity
  """
  vendorInfo: vendor_info
  """
  Location data
  """
  place_of_performance: place_of_performance
  """
  Alias (camelCase) for place_of_performance for GraphQL parity
  """
  placeOfPerformance: place_of_performance
}
