}

"""
Contract classification codes and categories.
"""
type Classification {
  """NAICS industry classification code"""
  naicsCode: String
  """NAICS description"""
  naicsDescription: String
  """Product or service code (PSC)"""
  productOrServiceCode: String
  """PSC description"""
  productOrServiceDescription: String
  """System equipment code"""
  systemEquipmentCode: String
  """System equipment description"""
  systemEquipmentDesc: String
  """Contract financing type"""
