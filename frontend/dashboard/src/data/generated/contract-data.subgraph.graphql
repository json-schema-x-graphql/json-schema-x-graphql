  """Veteran-owned indicator"""
  veteranOwnedFlag: String
  """Women-owned indicator"""
  womenOwnedFlag: String
  """Minority-owned indicator"""
  minorityOwnedBusinessFlag: String
  """HUBZone certified indicator"""
  hubzoneFlag: String
  """8(a) program participant"""
