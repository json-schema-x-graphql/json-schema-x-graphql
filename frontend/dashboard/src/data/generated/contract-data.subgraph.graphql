extend schema @link(url: "https://specs.apollo.dev/federation/v2.3", import: ["@key", "@shareable", "@external", "@provides", "@requires"])

"""
ISO 8601 date-time string (YYYY-MM-DDTHH:mm:ss.sssZ)
"""
scalar DateTime

"""
Email address conforming to RFC 5322 (simplified)
"""
scalar Email

"""
Enumeration of system identifiers
"""
enum SystemName {
  Legacy Procurement
  Intake Process
  Logistics Mgmt
  Contract Data
  PRISM
}

"""
Root Contract Data record combining system metadata, identifiers, financial data, vendor information, agency details, and all procurement-related fields.
"""
type FpdsRecord @key(fields: "piid") @key(fields: "id") {
  systemMetadata: SystemMetadata!
  identifiers: Identifiers!
  financial: Financial
  vendor: Vendor
  agency: Agency
  dates: Dates
  classification: Classification
  competition: Competition
  placeOfPerformance: PlaceOfPerformance
  idvReference: IdvReference
  compliance: Compliance
  """Description of requirement"""
  description: String
}

"""
System-level metadata for record tracking, versioning, and lineage.
"""
type SystemMetadata @shareable {
  """Constant system identifier"""
  systemName: SystemName!
  """Primary identifier of the record within Contract Data"""
  sourceRecordId: String!
  """Version of the canonical Contract Data schema"""
  schemaVersion: String
  """Timestamp when record was ingested"""
  ingestedAt: DateTime
  """Timestamp when record was last modified at source"""
  lastModified: DateTime
}

"""
Core contract identifiers and reference numbers.
"""
type Identifiers {
  """Unique identifier for each record in the dataset"""
  id: Int
  """Procurement Instrument Identifier - unique contract identifier"""
  piid: String!
  """Legacy PIID from previous system"""
  oldPiid: String
  """Original PIID for reference"""
  originalPiid: String
  """Reference to parent contract"""
  referencePiid: String
  """Code for the agency involved"""
  agencyCode: String
  """Name of the agency associated with PIID"""
  piidAgencyName: String
  """Indicates whether record is an award or IDV"""
  awardOrIdv: String
  """Transaction sequence number"""
  transactionNumber: Int
  """Contract modification number"""
  modificationNumber: String
  """Solicitation identifier"""
  solicitationId: String
  """Fiscal year of the award"""
  awardFiscalYear: String
  """Record version number"""
  version: String
}

"""
Financial information including obligations, values, and fees.
"""
type Financial {
  """Total dollars obligated"""
  dollarsObligated: Float
  """Dollars obligated per action"""
  dollarsObligatedPerAction: Float
  """Current contract value"""
  currentContractValue: Float
  """Ultimate expected contract value"""
  ultimateContractValue: Float
  """Base obligation amount"""
  baseDollarsObligated: Float
  """Maximum order limit"""
  maxOrderLimit: Float
  """Service fee paid"""
  feePaidForUseOfService: Float
  """Lower fee range value"""
  feeRangeLowerValue: Float
  """Upper fee range value"""
  feeRangeUpperValue: Float
  """Fixed fee amount"""
  fixedFeeValue: Float
  """Non-federal funding amount"""
  nonFederalFundingAmount: Float
  """Non-government contribution"""
  nonGovernmentValue: Float
  """Total non-government value"""
  totalNonGovernmentValue: Float
}

"""
Vendor information including identity, address, contact, and business classifications.
"""
type Vendor {
  """Legal vendor name"""
  vendorName: String
  """Unique Entity Identifier (Entity Management.gov)"""
  vendorUei: String
  """DUNS number (deprecated)"""
  vendorDunsNumber: String
  """Commercial and Government Entity code"""
  cageCode: String
  """DBA name"""
  doingBusinessAsName: String
  vendorAddress: Address
  """Vendor phone"""
  vendorPhoneNumber: String
  """Vendor email"""
  emailAddress: Email
  """Annual revenue"""
  annualRevenue: Float
  """Employee count"""
  numberOfEmployees: Int
  """Organization type"""
  organizationalType: String
  """Incorporation state"""
  stateOfIncorporation: String
  """Incorporation country"""
  countryOfIncorporation: String
  parent: ParentOrganization
  businessClassifications: BusinessClassifications
}

"""
Physical address structure.
"""
type Address {
  """Address line 1"""
  line1: String
  """Address line 2"""
  line2: String
  """Address line 3"""
  line3: String
  """City"""
  city: String
  """State code"""
  stateCode: String
  """State name"""
  stateName: String
  """ZIP/postal code"""
  zipCode: String
  """Country code"""
  countryCode: String
  """Country name"""
  countryName: String
}

"""
Parent organization information.
"""
type ParentOrganization {
  """Parent DUNS"""
