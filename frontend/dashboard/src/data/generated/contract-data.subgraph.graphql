  """Funding agency name"""
  fundingAgencyName: String
  """Funding office code"""
  fundingOfficeCode: String
  """Funding office name"""
  fundingOfficeName: String
  """Funding department ID"""
  fundingDepartmentId: String
  """Funding department name"""
  fundingDepartmentName: String
  """Regional code"""
