"""
A custom scalar representing a date and time in ISO 8601 format
"""
scalar DateTime

"""
A custom scalar for arbitrary JSON values
"""
scalar JSON

"""
Specifies the currency code for monetary values
"""
directive @currency(
  """
  ISO 4217 currency code (e.g., USD, EUR, GBP)
  """
  code: String!
) on FIELD_DEFINITION


"""
Base contract interface implemented by all contract types
"""
interface Contract {
  """
  Unique contract identifier
  """
  contractId: String!
  """
  Procurement Instrument Identifier
  """
  procurementInstrumentId: String!
  """
  Modification number
  """
  modificationNumber: String
  status: ContractStatus!
  """
  When the contract becomes effective
  """
  effectiveDate: DateTime
  """
  Current obligated amount in USD
  """
  obligatedAmount: Float @currency(code: "USD")
}

"""
Result type for contract searches (can be IDV or Order)
"""
union ContractSearchResult = IDVContract | Order

"""
Current status of the contract lifecycle
"""
enum ContractStatus {
  ACTIVE
  COMPLETED
  CANCELLED
  PENDING
}

"""
Type of IDV vehicle
"""
enum IdvType {
  GWAC
  IDIQ_SINGLE
  IDIQ_MULTIPLE
  BOA
}

"""
Type of order
"""
enum OrderType {
  TASK_ORDER
  DELIVERY_ORDER
}

"""
Indefinite Delivery Vehicle (IDV) contract with child orders
"""
type IDVContract implements Contract {
  """
  Unique contract identifier
  """
  contractId: String!
  """
  Procurement Instrument Identifier
  """
  procurementInstrumentId: String!
  """
  Modification number
  """
  modificationNumber: String
  status: ContractStatus!
  """
  When the contract becomes effective
  """
  effectiveDate: DateTime
  """
  Current obligated amount in USD
  """
  obligatedAmount: Float @currency(code: "USD")
  """
  Type of IDV vehicle
  """
  idvType: IdvType!
  """
  Task/delivery orders under this IDV
  """
  orders: [Order!]
}

"""
Task or delivery order issued against an IDV
"""
type Order implements Contract {
  """
  Unique contract identifier
  """
  contractId: String!
  """
  Procurement Instrument Identifier
  """
  procurementInstrumentId: String!
  """
  Modification number
  """
  modificationNumber: String
  status: ContractStatus!
  """
  When the contract becomes effective
  """
  effectiveDate: DateTime
  """
  Current obligated amount in USD
  """
  obligatedAmount: Float @currency(code: "USD")
  """
  Reference to parent IDV contract ID
  """
  parentIdv: String!
  """
  Type of order
  """
  orderType: OrderType!
}

"""
Vendor or contractor performing work
"""
type Vendor {
  """
  Dun & Bradstreet DUNS number
  """
  duns: String!
  name: String!
  """
  Commercial and Government Entity Code
  """
  cageCode: String
  address: Address
  businessType: BusinessType
}

"""
Physical or mailing address
"""
type Address {
  street: String
  city: String
  """
  Two-letter state code
  """
  state: String
  postalCode: String
  """
  ISO country code
  """
  country: String
}

"""
Socioeconomic business classifications
"""
type BusinessType {
  isSmallBusiness: Boolean!
  isWomanOwned: Boolean!
  isVeteranOwned: Boolean!
  """
  SBA 8(a) Program participant
  """
  isSBA8A: Boolean!
  """
  Historically Underutilized Business Zone
  """
  isHUBZone: Boolean!
}

"""
Individual transaction or modification action
"""
type ContractAction {
  actionDate: DateTime!
  actionType: String!
  """
  Action amount in USD
  """
  amount: Float
  """
  Narrative description of the action
  """
  description: String
  """
  Contracting officer who performed action
  """
  performedBy: String
}

"""
Metadata about the contract record
"""
type ContractMetadata {
  """
  When the record was created
  """
  createdAt: DateTime!
  """
  When the record was last updated
  """
  updatedAt: DateTime!
  """
  Source system (Contract Data, Legacy Procurement, etc.)
  """
  source: String!
  """
  Record version number
  """
  version: Int!
}

"""
Complete contract record with metadata, contract data, vendor, and actions
"""
type ContractRecord {
  """
  Global unique identifier for this contract record
  """
  id: String!
  """
  Record metadata
  """
  metadata: ContractMetadata!
  """
  The contract data (IDVContract or Order)
  """
  contractData: ContractSearchResult!
  """
  Vendor performing the work
  """
  vendor: Vendor!
  """
  History of contract actions and modifications
  """
  actions: [ContractAction!]!
}

type Query {
  """
  Get a complete contract record by ID with all related data
  """
  contractRecord(id: ID!): ContractRecord
  """
  Search for contract records with complete data
  """
  contractRecords(piid: String, vendorDuns: String, status: ContractStatus, limit: Int = 100): [ContractRecord!]
  """
  Search for contracts by various criteria
  """
  contracts(piid: String, vendorDuns: String, status: ContractStatus, limit: Int = 100): [ContractSearchResult!]
  """
  Get a single contract by ID
  """
  contract(id: ID!): ContractSearchResult
  """
  Get vendor information by DUNS
  """
  vendor(duns: String!): Vendor
}
