<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="JSON Schema authoring UI with live GraphQL SDL conversion, intelligent validation, and AI-accessible APIs"
    />
    <meta
      name="keywords"
      content="JSON Schema, GraphQL, SDL, converter, validation, authoring"
    />
    <meta name="author" content="JSON Schema ↔ GraphQL Team" />

    <!-- Preconnect to improve performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Favicon (placeholder) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Title -->
    <title>JSON Schema Authoring UI</title>

    <!-- Monaco Editor will configure workers automatically -->

    <style>
      /* Prevent flash of unstyled content */
      body {
        margin: 0;
        padding: 0;
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          "Roboto",
          "Oxygen",
          "Ubuntu",
          "Cantarell",
          "Fira Sans",
          "Droid Sans",
          "Helvetica Neue",
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #1e1e1e;
        color: #d4d4d4;
      }

      #root {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }

      /* Loading spinner */
      .loading-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: linear-gradient(135deg, #1e1e1e 0%, #2d2d30 100%);
      }

      .loading-spinner {
        width: 60px;
        height: 60px;
        border: 4px solid rgba(59, 130, 246, 0.2);
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      .loading-text {
        margin-top: 20px;
        font-size: 16px;
        color: #d4d4d4;
        font-weight: 500;
      }

      .loading-subtext {
        margin-top: 8px;
        font-size: 14px;
        color: #858585;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Hide loading once React mounts */
      #root:not(:empty) + .loading-container {
        display: none;
      }

      /* Error message styling */
      .error-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: linear-gradient(135deg, #1e1e1e 0%, #2d2d30 100%);
        padding: 20px;
        text-align: center;
      }

      .error-icon {
        font-size: 48px;
        margin-bottom: 16px;
      }

      .error-title {
        font-size: 24px;
        font-weight: 600;
        color: #ef4444;
        margin-bottom: 12px;
      }

      .error-message {
        font-size: 16px;
        color: #d4d4d4;
        margin-bottom: 24px;
        max-width: 600px;
      }

      .error-details {
        font-size: 14px;
        color: #858585;
        font-family: "JetBrains Mono", monospace;
        background: #2d2d30;
        padding: 12px 16px;
        border-radius: 4px;
        max-width: 800px;
        text-align: left;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .error-actions {
        margin-top: 24px;
      }

      .error-button {
        display: inline-block;
        padding: 10px 20px;
        background: #3b82f6;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        text-decoration: none;
        transition: background 0.2s;
      }

      .error-button:hover {
        background: #2563eb;
      }
    </style>
  </head>
  <body>
    <!-- React root -->
    <div id="root"></div>

    <!-- Loading indicator (shown while app initializes) -->
    <div class="loading-container">
      <div class="loading-spinner"></div>
      <div class="loading-text">Loading JSON Schema Authoring UI</div>
      <div class="loading-subtext">Initializing converters and editor...</div>
    </div>

    <!-- Error boundary fallback (shown if JavaScript fails) -->
    <noscript>
      <div class="error-container">
        <div class="error-icon">⚠️</div>
        <div class="error-title">JavaScript Required</div>
        <div class="error-message">
          This application requires JavaScript to run. Please enable JavaScript
          in your browser settings.
        </div>
      </div>
    </noscript>

    <!-- Module script -->
    <script type="module" src="/src/main.tsx"></script>

    <!-- Global error handler -->
    <script>
      window.addEventListener("error", function (event) {
        console.error("Global error:", event.error);

        // Show error UI if root is empty
        const root = document.getElementById("root");
        if (!root || root.children.length === 0) {
          document.body.innerHTML = `
            <div class="error-container">
              <div class="error-icon">❌</div>
              <div class="error-title">Application Error</div>
              <div class="error-message">
                An error occurred while loading the application. Please refresh the page or check the console for details.
              </div>
              <div class="error-details">${event.error?.message || "Unknown error"}</div>
              <div class="error-actions">
                <button class="error-button" onclick="window.location.reload()">Reload Page</button>
              </div>
            </div>
          `;
        }
      });

      // Detect WASM support
      if (typeof WebAssembly === "undefined") {
        console.warn(
          "WebAssembly is not supported in this browser. Node.js converter will be used as fallback.",
        );
      }

      // Performance monitoring
      if (window.performance && window.performance.mark) {
        window.performance.mark("app-start");

        window.addEventListener("load", function () {
          window.performance.mark("app-loaded");
          window.performance.measure(
            "app-load-time",
            "app-start",
            "app-loaded",
          );

          const loadTime =
            window.performance.getEntriesByName("app-load-time")[0];
          if (loadTime) {
            console.info("App load time:", loadTime.duration.toFixed(2), "ms");
          }
        });
      }
    </script>
  </body>
</html>
