version: 2
updates:
  # ── GitHub Actions ────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - github-actions

  # ── npm / pnpm (root + all workspace packages) ───────────────────────────
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - javascript
    groups:
      eslint:
        patterns:
          - "eslint*"
          - "@typescript-eslint/*"
      vitest:
        patterns:
          - "vitest*"
          - "@vitest/*"
      vite:
        patterns:
          - "vite*"
          - "@vitejs/*"
      nextra:
        patterns:
          - "nextra*"
          - "next"
      apollo:
        patterns:
          - "@apollo/*"

  # ── Cargo ─────────────────────────────────────────────────────────────────
  - package-ecosystem: cargo
    directory: "/converters/rust"
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - rust
