version: 2
updates:
  # Root pnpm workspace (automatically manages all workspace packages listed in pnpm-workspace.yaml)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      workspace-npm-dependencies:
        patterns:
          - "*"

  # Standalone Frontend dashboard (not in workspace)
  - package-ecosystem: "npm"
    directory: "/frontend/dashboard"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      dashboard-npm-dependencies:
        patterns:
          - "*"

  # Rust Cargo ecosystem
  - package-ecosystem: "cargo"
    directory: "/converters/rust"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      cargo-dependencies:
        patterns:
          - "*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      github-actions-dependencies:
        patterns:
          - "*"

