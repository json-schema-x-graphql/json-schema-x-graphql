version: 2
updates:
  # ── GitHub Actions ────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - github-actions

  # ── npm / pnpm (root + all workspace packages) ───────────────────────────
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - javascript
    groups:
      eslint:
        patterns:
          - "eslint*"
          - "@typescript-eslint/*"
      vitest:
        patterns:
          - "vitest*"
          - "@vitest/*"
      vite:
        patterns:
          - "vite*"
          - "@vitejs/*"
      nextra:
        patterns:
          - "nextra*"
          - "next"
        # nextra v4 requires App Router; site uses Pages Router — stay on v3
        update-types:
          - "patch"
          - "minor"
    ignore:
      # nextra v4 incompatible with Pages Router — pin to ^3.x until App Router migration
      - dependency-name: "nextra"
        versions: [">=4"]
      - dependency-name: "nextra-theme-docs"
        versions: [">=4"]
      apollo:
        patterns:
          - "@apollo/*"

  # ── Cargo ─────────────────────────────────────────────────────────────────
  - package-ecosystem: cargo
    directory: "/converters/rust"
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - rust
