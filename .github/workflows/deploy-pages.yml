name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: "latest"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Editor (subgraph-composer) → /editor ──────────────────────────
      - name: Build WASM for editor
        run: |
          chmod +x scripts/build-wasm.sh
          ./scripts/build-wasm.sh

      - name: Build editor app
        run: pnpm --filter subgraph-composer build
        env:
          VITE_BASE_URL: "/json-schema-x-graphql/editor/"

      # ── Docs site (Nextra) → / ─────────────────────────────────────────
      - name: Build docs site
        run: pnpm --filter @json-schema-x-graphql/website build
        env:
          BASE_PATH: "/json-schema-x-graphql"

      # ── Assemble pages artifact ────────────────────────────────────────
      - name: Assemble site
        run: |
          mkdir -p _site/editor
          cp -r website/out/. _site/
          cp -r frontend/subgraph-composer/dist/. _site/editor/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
