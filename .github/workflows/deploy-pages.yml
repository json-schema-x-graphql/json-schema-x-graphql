name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@0d096b08b4e5a7de8c28de67e11e945404e9eefa # v0.4.0
        with:
          version: "latest"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build WASM for editor
        run: |
          chmod +x scripts/build-wasm.sh
          ./scripts/build-wasm.sh

      - name: Build editor app
        run: pnpm --filter subgraph-composer build
        env:
          # GitHub Pages for a non-root repo deploys under /<repo-name>/.
          # Vite's base must match the full path prefix so asset URLs resolve correctly.
          VITE_BASE_URL: "/json-schema-x-graphql/editor/"

      - name: Build docs site
        run: pnpm --filter @json-schema-x-graphql/website build
        env:
          BASE_PATH: "/json-schema-x-graphql"

      - name: Assemble site
        run: |
          mkdir -p _site/editor
          cp -r website/out/. _site/
          cp -r frontend/subgraph-composer/dist/. _site/editor/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: ./_site

  deploy:
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
