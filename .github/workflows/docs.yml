name: Build Docs Site

on:
  push:
    branches: [main, develop]
    paths:
      - "website/**"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "website/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Nextra Site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm --filter @json-schema-x-graphql/website build
        env:
          BASE_PATH: "/json-schema-x-graphql"

      - name: Type check
        run: pnpm --filter @json-schema-x-graphql/website typecheck
