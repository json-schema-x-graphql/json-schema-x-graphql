name: Comprehensive Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  rust-tests:
    name: Rust Tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        rust: [stable, beta]

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        working-directory: converters/rust
        run: cargo fmt -- --check

      - name: Run clippy
        working-directory: converters/rust
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        working-directory: converters/rust
        run: cargo build --release --all-features --verbose

      - name: Run tests
        working-directory: converters/rust
        run: cargo test --all-features --verbose

      - name: Run doc tests
        working-directory: converters/rust
        run: cargo test --doc --all-features --verbose

  rust-coverage:
    name: Rust Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          toolchain: stable

      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Generate coverage
        working-directory: converters/rust
        run: cargo tarpaulin --all-features --workspace --timeout 300 --out Xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@0f8570b1a125f4937846a11fcfa3bcd548bd8c97 # v4.6.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./converters/rust/cobertura.xml
          flags: rust
          name: rust-coverage

  node-tests:
    name: Node.js Tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        node-version: [24]

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup pnpm
        uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        working-directory: converters/node
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        working-directory: converters/node
        run: pnpm run format:check

      - name: Run linter
        working-directory: converters/node
        run: pnpm run lint

      - name: Build
        working-directory: converters/node
        run: pnpm run build

      - name: Run tests
        working-directory: converters/node
        run: pnpm test

      - name: Type check
        working-directory: converters/node
        run: npx tsc --noEmit

  node-coverage:
    name: Node.js Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6

      - name: Install dependencies
        working-directory: converters/node
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: converters/node
        run: pnpm run build

      - name: Generate coverage
        working-directory: converters/node
        run: pnpm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@0f8570b1a125f4937846a11fcfa3bcd548bd8c97 # v4.6.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./converters/node/coverage/lcov.info
          flags: node
          name: node-coverage

  round-trip-tests:
    name: 3-Cycle Round-Trip Validation
    runs-on: ubuntu-latest
    needs: [rust-tests, node-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          toolchain: stable

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6

      - name: Build Rust converter
        working-directory: converters/rust
        run: cargo build --release --features cli --bin jxql

      - name: Install Node.js dependencies
        working-directory: converters/node
        run: pnpm install --frozen-lockfile

      - name: Build Node.js converter
        working-directory: converters/node
        run: pnpm run build

      - name: Run round-trip tests
        run: pnpm run test:roundtrip:ci

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: round-trip-test-outputs
          path: test-output/

  parity-tests:
    name: Rust-Node Parity Tests
    runs-on: ubuntu-latest
    needs: [rust-tests, node-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          toolchain: stable

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6

      - name: Build converters
        run: |
          cd converters/rust && cargo build --release && cd ../..
          cd converters/node && pnpm install --frozen-lockfile && pnpm run build && cd ../..

      - name: Run parity tests
        run: |
          if [ -f scripts/test-parity.sh ]; then
            chmod +x scripts/test-parity.sh
            ./scripts/test-parity.sh
          else
            echo "Parity test script not found, skipping..."
          fi

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs:
      [rust-tests, node-tests, rust-coverage, node-coverage, round-trip-tests]
    if: always()

    steps:
      - name: Check results
        run: |
          echo "Test Results Summary:"
          echo "===================="
          echo "Rust Tests: ${{ needs.rust-tests.result }}"
          echo "Node Tests: ${{ needs.node-tests.result }}"
          echo "Rust Coverage: ${{ needs.rust-coverage.result }}"
          echo "Node Coverage: ${{ needs.node-coverage.result }}"
          echo "Round-Trip Tests: ${{ needs.round-trip-tests.result }}"
          echo ""

          if [ "${{ needs.rust-tests.result }}" != "success" ] || \
             [ "${{ needs.node-tests.result }}" != "success" ] || \
             [ "${{ needs.round-trip-tests.result }}" != "success" ]; then
            echo "❌ Test suite failed"
            exit 1
          else
            echo "✅ All tests passed!"
          fi
