name: Comprehensive Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  rust-tests:
    name: Rust Tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        rust: [stable, beta]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: converters/rust/target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        working-directory: converters/rust
        run: cargo fmt -- --check

      - name: Run clippy
        working-directory: converters/rust
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        working-directory: converters/rust
        run: cargo build --release --all-features --verbose

      - name: Run tests
        working-directory: converters/rust
        run: cargo test --all-features --verbose

      - name: Run doc tests
        working-directory: converters/rust
        run: cargo test --doc --all-features --verbose

  rust-coverage:
    name: Rust Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Generate coverage
        working-directory: converters/rust
        run: cargo tarpaulin --all-features --workspace --timeout 300 --out Xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./converters/rust/cobertura.xml
          flags: rust
          name: rust-coverage

  node-tests:
    name: Node.js Tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        node-version: [24.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        working-directory: converters/node
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        working-directory: ../..
        run: pnpm exec oxfmt check converters/node/src

      - name: Run linter
        working-directory: ../..
        run: pnpm exec oxlint check --config .oxlint/config.json converters/node/src

      - name: Build
        working-directory: converters/node
        run: pnpm run build

      - name: Run tests
        working-directory: converters/node
        run: pnpm test

      - name: Type check
        working-directory: converters/node
        run: npx tsc --noEmit

  node-coverage:
    name: Node.js Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        working-directory: converters/node
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: converters/node
        run: pnpm run build

      - name: Generate coverage
        working-directory: converters/node
        run: pnpm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./converters/node/coverage/lcov.info
          flags: node
          name: node-coverage

  round-trip-tests:
    name: 3-Cycle Round-Trip Validation
    runs-on: ubuntu-latest
    needs: [rust-tests, node-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Build Rust converter
        working-directory: converters/rust
        run: cargo build --release

      - name: Install Node.js dependencies
        working-directory: converters/node
        run: pnpm install --frozen-lockfile

      - name: Build Node.js converter
        working-directory: converters/node
        run: pnpm run build

      - name: Create round-trip test script
        run: |
          cat > round-trip-test.sh << 'EOF'
          #!/bin/bash
          set -e

          echo "Creating test data directory..."
          mkdir -p test-output

          echo "Testing with complex-schema.json..."
          TEST_FILE="converters/test-data/complex-schema.json"

          if [ ! -f "$TEST_FILE" ]; then
            echo "Creating test schema..."
            cat > "$TEST_FILE" << 'SCHEMA'
          {
            "$schema": "http://json-schema.org/draft-07/schema#",
            "type": "object",
            "title": "User",
            "properties": {
              "id": { "type": "string", "format": "uuid" },
              "name": { "type": "string", "minLength": 1 },
              "email": { "type": "string", "format": "email" },
              "age": { "type": "integer", "minimum": 0 },
              "tags": { "type": "array", "items": { "type": "string" } },
              "metadata": { "type": "object" }
            },
            "required": ["id", "name", "email"]
          }
          SCHEMA
          fi

          echo "Running 3-cycle round-trip test for Rust..."
          cd converters/rust

          # Cycle 1
          cargo run --release --example json_to_graphql -- "../../$TEST_FILE" > ../../test-output/rust-cycle1.graphql || exit 1
          cargo run --release --example graphql_to_json -- ../../test-output/rust-cycle1.graphql > ../../test-output/rust-cycle1.json || exit 1

          # Cycle 2
          cargo run --release --example json_to_graphql -- ../../test-output/rust-cycle1.json > ../../test-output/rust-cycle2.graphql || exit 1
          cargo run --release --example graphql_to_json -- ../../test-output/rust-cycle2.graphql > ../../test-output/rust-cycle2.json || exit 1

          # Cycle 3
          cargo run --release --example json_to_graphql -- ../../test-output/rust-cycle2.json > ../../test-output/rust-cycle3.graphql || exit 1
          cargo run --release --example graphql_to_json -- ../../test-output/rust-cycle3.graphql > ../../test-output/rust-cycle3.json || exit 1

          cd ../..

          # Verify no drift in JSON
          if ! diff test-output/rust-cycle1.json test-output/rust-cycle2.json; then
            echo "ERROR: Drift detected in Rust converter between cycle 1 and 2 (JSON)"
            exit 1
          fi

          if ! diff test-output/rust-cycle2.json test-output/rust-cycle3.json; then
            echo "ERROR: Drift detected in Rust converter between cycle 2 and 3 (JSON)"
            exit 1
          fi

          # Verify no drift in GraphQL
          if ! diff test-output/rust-cycle1.graphql test-output/rust-cycle2.graphql; then
            echo "ERROR: Drift detected in Rust converter between cycle 1 and 2 (GraphQL)"
            exit 1
          fi

          if ! diff test-output/rust-cycle2.graphql test-output/rust-cycle3.graphql; then
            echo "ERROR: Drift detected in Rust converter between cycle 2 and 3 (GraphQL)"
            exit 1
          fi

          echo "✅ Rust: 3-cycle round-trip validation passed - No drift detected"

          # Node.js round-trip testing
          echo "Running 3-cycle round-trip test for Node.js..."

          cat > converters/node/roundtrip-ci.js << 'NODEEOF'
          import { jsonSchemaToGraphQL, graphqlToJsonSchema } from './dist/index.js';
          import fs from 'fs';

          const testFile = process.argv[2];
          const outputDir = process.argv[3];

          async function runRoundTrip() {
            try {
              const initialSchema = JSON.parse(fs.readFileSync(testFile, 'utf8'));

              // Cycle 1
              const graphql1 = jsonSchemaToGraphQL(initialSchema);
              fs.writeFileSync(`${outputDir}/node-cycle1.graphql`, graphql1);
              const json1 = graphqlToJsonSchema(graphql1);
              fs.writeFileSync(`${outputDir}/node-cycle1.json`, JSON.stringify(json1, null, 2));

              // Cycle 2
              const graphql2 = jsonSchemaToGraphQL(json1);
              fs.writeFileSync(`${outputDir}/node-cycle2.graphql`, graphql2);
              const json2 = graphqlToJsonSchema(graphql2);
              fs.writeFileSync(`${outputDir}/node-cycle2.json`, JSON.stringify(json2, null, 2));

              // Cycle 3
              const graphql3 = jsonSchemaToGraphQL(json2);
              fs.writeFileSync(`${outputDir}/node-cycle3.graphql`, graphql3);
              const json3 = graphqlToJsonSchema(graphql3);
              fs.writeFileSync(`${outputDir}/node-cycle3.json`, JSON.stringify(json3, null, 2));

              // Validate
              const json1Str = JSON.stringify(json1);
              const json2Str = JSON.stringify(json2);
              const json3Str = JSON.stringify(json3);

              if (json1Str !== json2Str) {
                console.error('ERROR: Drift detected between cycle 1 and 2 (JSON)');
                process.exit(1);
              }

              if (json2Str !== json3Str) {
                console.error('ERROR: Drift detected between cycle 2 and 3 (JSON)');
                process.exit(1);
              }

              if (graphql1 !== graphql2) {
                console.error('ERROR: Drift detected between cycle 1 and 2 (GraphQL)');
                process.exit(1);
              }

              if (graphql2 !== graphql3) {
                console.error('ERROR: Drift detected between cycle 2 and 3 (GraphQL)');
                process.exit(1);
              }

              console.log('✅ Node.js: 3-cycle round-trip validation passed - No drift detected');
              process.exit(0);
            } catch (error) {
              console.error('ERROR:', error.message);
              process.exit(1);
            }
          }

          runRoundTrip();
          NODEEOF

          cd converters/node
          node roundtrip-ci.js "../../$TEST_FILE" "../../test-output" || exit 1
          cd ../..

          echo ""
          echo "✅ All 3-cycle round-trip validations passed!"
          EOF

          chmod +x round-trip-test.sh

      - name: Run round-trip tests
        run: ./round-trip-test.sh

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: round-trip-test-outputs
          path: test-output/

  parity-tests:
    name: Rust-Node Parity Tests
    runs-on: ubuntu-latest
    needs: [rust-tests, node-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Build converters
        run: |
          cd converters/rust && cargo build --release && cd ../..
          cd converters/node && pnpm install --frozen-lockfile && pnpm run build && cd ../..

      - name: Run parity tests
        run: |
          if [ -f scripts/test-parity.sh ]; then
            chmod +x scripts/test-parity.sh
            ./scripts/test-parity.sh
          else
            echo "Parity test script not found, skipping..."
          fi

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [rust-tests, node-tests, rust-coverage, node-coverage, round-trip-tests]
    if: always()

    steps:
      - name: Check results
        run: |
          echo "Test Results Summary:"
          echo "===================="
          echo "Rust Tests: ${{ needs.rust-tests.result }}"
          echo "Node Tests: ${{ needs.node-tests.result }}"
          echo "Rust Coverage: ${{ needs.rust-coverage.result }}"
          echo "Node Coverage: ${{ needs.node-coverage.result }}"
          echo "Round-Trip Tests: ${{ needs.round-trip-tests.result }}"
          echo ""

          if [ "${{ needs.rust-tests.result }}" != "success" ] || \
             [ "${{ needs.node-tests.result }}" != "success" ] || \
             [ "${{ needs.round-trip-tests.result }}" != "success" ]; then
            echo "❌ Test suite failed"
            exit 1
          else
            echo "✅ All tests passed!"
          fi
