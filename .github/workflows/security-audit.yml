name: Security Audit

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run security audit daily at 2 AM UTC
    - cron: "0 2 * * *"
  workflow_dispatch:

env:
  NODE_VERSION: "24"

jobs:
  security-audit-rust:
    name: Rust Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('Cargo.lock', 'converters/rust/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('Cargo.lock', 'converters/rust/Cargo.lock') }}

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        working-directory: converters/rust
        run: |
          cargo audit \
            --deny warnings \
            --deny unmaintained \
            --deny unsound \
            --deny yanked \
            --ignore RUSTSEC-2026-0007 \
            --ignore RUSTSEC-2025-0134 \
            --ignore RUSTSEC-2026-0002
        continue-on-error: false

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Run cargo deny
        working-directory: converters/rust
        run: |
          cargo deny check advisories
          cargo deny check licenses
          cargo deny check bans
          cargo deny check sources

  security-audit-node:
    name: Node.js Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        run: |
          pnpm audit --audit-level=high
        continue-on-error: false

      - name: Check for outdated packages with known vulnerabilities
        working-directory: converters/node
        run: |
          pnpm outdated || true

  # CodeQL is handled by GitHub's default setup (repo Settings → Security → Code scanning).
  # Running an advanced workflow config simultaneously conflicts with the default setup,
  # producing: "CodeQL analyses from advanced configurations cannot be processed when
  # the default setup is enabled". Removed to avoid that conflict.

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        continue-on-error: true
        with:
          fail-on-severity: moderate
          deny-licenses: GPL-2.0, GPL-3.0

  security-summary:
    name: Security Audit Summary
    runs-on: ubuntu-latest
    # CodeQL is informational only — not a required gate for CI
    needs: [security-audit-rust, security-audit-node]
    if: always()

    steps:
      - name: Check job results
        run: |
          echo "Security Audit Results:"
          echo "Rust Security: ${{ needs.security-audit-rust.result }}"
          echo "Node Security: ${{ needs.security-audit-node.result }}"

          if [ "${{ needs.security-audit-rust.result }}" != "success" ] || \
             [ "${{ needs.security-audit-node.result }}" != "success" ]; then
            echo "❌ Security audit failed"
            exit 1
          else
            echo "✅ All security audits passed"
          fi
