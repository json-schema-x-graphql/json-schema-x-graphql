name: Validation and Testing

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  RUST_VERSION: 'stable'

jobs:
  # Job 1: JSON Schema Validation
  validate-schemas:
    name: Validate JSON Schemas
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate JSON Schemas
        run: |
          cd converters/node
          pnpm tsx ../../scripts/validation/validate-schemas.ts \
            --fail-on-error \
            --output=../../schema-validation-report.json

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: schema-validation-report
          path: schema-validation-report.json
          retention-days: 30

  # Job 2: GraphQL SDL Validation
  validate-graphql:
    name: Validate GraphQL SDL
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate GraphQL SDL
        run: |
          cd converters/node
          pnpm tsx ../../scripts/validation/validate-graphql.ts \
            --fail-on-error \
            --output=../../graphql-validation-report.json

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: graphql-validation-report
          path: graphql-validation-report.json
          retention-days: 30

  # Job 3: Integration Tests
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [validate-schemas, validate-graphql]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build converter
        run: |
          cd converters/node
          pnpm build

      - name: Run integration tests
        run: |
          cd converters/node
          pnpm tsx ../../scripts/integration/test-conversions.ts \
            --fail-on-error \
            --output=../../integration-test-report.json

      - name: Upload integration test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-report
          path: integration-test-report.json
          retention-days: 30

  # Job 4: Unit Tests (Node)
  unit-tests-node:
    name: Unit Tests (Node.js)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: |
          cd converters/node
          pnpm test -- --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./converters/node/coverage/coverage-final.json
          flags: node-converter
          name: node-converter-coverage

  # Job 5: Unit Tests (Rust)
  unit-tests-rust:
    name: Unit Tests (Rust)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Cargo build
        uses: actions/cache@v4
        with:
          path: converters/rust/target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}

      - name: Run Rust tests
        run: |
          cd converters/rust
          cargo test --all-features

      - name: Generate coverage (if tarpaulin available)
        continue-on-error: true
        run: |
          cargo install cargo-tarpaulin || true
          cd converters/rust
          cargo tarpaulin --out Xml --output-dir coverage || true

      - name: Upload coverage to Codecov
        if: success()
        uses: codecov/codecov-action@v4
        with:
          files: ./converters/rust/coverage/cobertura.xml
          flags: rust-converter
          name: rust-converter-coverage

  # Job 6: Performance Benchmarks
  benchmarks:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: [integration-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download baseline benchmark
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: baseline-benchmark
          path: .

      - name: Run benchmarks
        run: |
          cd converters/node
          if [ -f "../../baseline-benchmark.json" ]; then
            pnpm tsx ../../scripts/benchmarks/run-benchmarks.ts \
              --iterations=100 \
              --compare=../../baseline-benchmark.json \
              --output=../../current-benchmark.json
          else
            pnpm tsx ../../scripts/benchmarks/run-benchmarks.ts \
              --iterations=100 \
              --output=../../current-benchmark.json
          fi

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: current-benchmark.json
          retention-days: 90

      - name: Save as baseline (main branch only)
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: baseline-benchmark
          path: current-benchmark.json
          retention-days: 365

      - name: Comment benchmark results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('current-benchmark.json', 'utf8'));

            let comment = '## 📊 Benchmark Results\n\n';
            comment += `**Average Conversion Time:** ${report.summary.averageConversionMs.toFixed(2)}ms\n`;
            comment += `**Total Benchmarks:** ${report.totalBenchmarks}\n`;
            comment += `**Total Types Generated:** ${report.summary.totalTypesGenerated}\n\n`;

            comment += '### Top 5 Results:\n';
            const sorted = [...report.results].sort((a, b) =>
              a.metrics.conversionTimeMs.mean - b.metrics.conversionTimeMs.mean
            );

            for (let i = 0; i < Math.min(5, sorted.length); i++) {
              const r = sorted[i];
              comment += `${i + 1}. **${r.name}**: ${r.metrics.conversionTimeMs.mean.toFixed(2)}ms `;
              comment += `(${r.metadata.typesGenerated} types, ${r.metrics.throughput.conversionsPerSecond.toFixed(0)} conv/s)\n`;
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # Job 7: Summary Report
  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [validate-schemas, validate-graphql, integration-tests, unit-tests-node, unit-tests-rust]
    if: always()
    steps:
      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          path: reports

      - name: Generate summary
        run: |
          echo "## 🧪 Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f "reports/schema-validation-report/schema-validation-report.json" ]; then
            SCHEMA_VALID=$(cat reports/schema-validation-report/schema-validation-report.json | jq -r '.validSchemas')
            SCHEMA_TOTAL=$(cat reports/schema-validation-report/schema-validation-report.json | jq -r '.totalSchemas')
            echo "- ✅ JSON Schema Validation: $SCHEMA_VALID/$SCHEMA_TOTAL passed" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f "reports/graphql-validation-report/graphql-validation-report.json" ]; then
            GQL_VALID=$(cat reports/graphql-validation-report/graphql-validation-report.json | jq -r '.validFiles')
            GQL_TOTAL=$(cat reports/graphql-validation-report/graphql-validation-report.json | jq -r '.totalFiles')
            echo "- ✅ GraphQL SDL Validation: $GQL_VALID/$GQL_TOTAL passed" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f "reports/integration-test-report/integration-test-report.json" ]; then
            INT_PASSED=$(cat reports/integration-test-report/integration-test-report.json | jq -r '.passedTests')
            INT_TOTAL=$(cat reports/integration-test-report/integration-test-report.json | jq -r '.totalTests')
            echo "- ✅ Integration Tests: $INT_PASSED/$INT_TOTAL passed" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All validation and test reports have been generated and uploaded as artifacts." >> $GITHUB_STEP_SUMMARY
