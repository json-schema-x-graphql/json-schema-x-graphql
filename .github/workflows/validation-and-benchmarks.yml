name: Validation and Benchmarks

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run weekly on Mondays at 00:00 UTC
    - cron: "0 0 * * 1"

jobs:
  validate-json-schemas:
    name: Validate JSON Schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            converters/rust/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock', 'converters/rust/Cargo.lock') }}

      - name: Build validation CLI
        working-directory: converters/rust
        run: cargo build --release --bin jxql --features cli

      - name: Run JSON Schema validation
        working-directory: converters/rust
        run: |
          ./target/release/jxql json-schema ../test-data/x-graphql -r || true
          echo "Validation completed (exit code: $?)"

      - name: Run validation tests
        working-directory: converters/rust
        run: cargo test --test validation_tests -- --nocapture

  validate-graphql-sdl:
    name: Validate GraphQL SDL
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            converters/rust/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock', 'converters/rust/Cargo.lock') }}

      - name: Build validation CLI
        working-directory: converters/rust
        run: cargo build --release --bin jxql --features cli

      - name: Run GraphQL SDL validation
        working-directory: converters/rust
        run: |
          if [ -d "../test-data/x-graphql/expected" ]; then
            ./target/release/jxql graphql ../test-data/x-graphql/expected -r || true
            echo "SDL validation completed (exit code: $?)"
          else
            echo "Expected SDL directory not found, skipping"
          fi

  validate-node:
    name: Validate with Node.js
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        working-directory: converters/node
        run: pnpm install --frozen-lockfile

      - name: Build Node validator
        working-directory: converters/node
        run: pnpm run build

      - name: Run JSON Schema validation (Node)
        working-directory: converters/node
        run: |
          node dist/cli/validate.js json-schema ../test-data/x-graphql -r || true
          echo "Node validation completed"

      - name: Run GraphQL SDL validation (Node)
        working-directory: converters/node
        run: |
          if [ -d "../test-data/x-graphql/expected" ]; then
            node dist/cli/validate.js graphql ../test-data/x-graphql/expected -r || true
            echo "Node SDL validation completed"
          else
            echo "Expected SDL directory not found, skipping"
          fi

  benchmarks-rust:
    name: Run Rust Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            converters/rust/target/
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('Cargo.lock', 'converters/rust/Cargo.lock') }}

      - name: Run validation benchmarks
        working-directory: converters/rust
        run: cargo bench --bench validation_benchmark | tee benchmark-results.txt

      - name: Run conversion benchmarks
        working-directory: converters/rust
        run: cargo bench --bench conversion_benchmark -- --output-format bencher | tee -a benchmark-results.txt

      - name: Store benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        with:
          tool: "cargo"
          output-file-path: converters/rust/benchmark-results.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          skip-fetch-gh-pages: true
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench
          alert-threshold: "150%"
          comment-on-alert: true
          fail-on-alert: false

  benchmarks-node:
    name: Run Node.js Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        working-directory: converters/node
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: converters/node
        run: pnpm run build

      - name: Run performance benchmarks
        working-directory: converters/node
        run: pnpm run benchmark || true

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: node-benchmark-results
          path: converters/node/benchmark-results.json

  integration-tests:
    name: Integration Tests (Validation + Conversion)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            converters/rust/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock', 'converters/rust/Cargo.lock') }}

      - name: Build Rust
        working-directory: converters/rust
        run: cargo build --release

      - name: Install Node dependencies
        working-directory: converters/node
        run: pnpm install --frozen-lockfile

      - name: Build Node
        working-directory: converters/node
        run: pnpm run build

      - name: Run Rust integration tests
        working-directory: converters/rust
        run: cargo test --test x_graphql_shared_tests -- --nocapture

      - name: Run Node integration tests
        working-directory: converters/node
        run: pnpm test x-graphql-shared.test.ts

      - name: Run validation integration
        run: |
          echo "Testing full validation pipeline..."
          cd converters/rust
          cargo run --bin jxql --features cli -- json-schema ../test-data/x-graphql -r --format json > rust-validation.json || true

          cd ../node
          node dist/cli/validate.js json-schema ../test-data/x-graphql -r --format json > node-validation.json || true

          echo "Validation pipeline completed"

  report-summary:
    name: Generate Report Summary
    runs-on: ubuntu-latest
    needs:
      [
        validate-json-schemas,
        validate-graphql-sdl,
        validate-node,
        benchmarks-rust,
        benchmarks-node,
        integration-tests,
      ]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Generate summary
        run: |
          echo "# Validation and Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Job Status" >> $GITHUB_STEP_SUMMARY
          echo "- JSON Schema Validation: ${{ needs.validate-json-schemas.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- GraphQL SDL Validation: ${{ needs.validate-graphql-sdl.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Node.js Validation: ${{ needs.validate-node.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Rust Benchmarks: ${{ needs.benchmarks-rust.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Node.js Benchmarks: ${{ needs.benchmarks-node.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Integration Tests: ${{ needs.integration-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Performance Targets" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Validation: > 10,000 ops/sec (< 0.1ms per schema)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Conversion: > 1,000 ops/sec (< 1ms per schema)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Round-trip: > 500 ops/sec (< 2ms per operation)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Workflow completed at $(date)" >> $GITHUB_STEP_SUMMARY
