name: Composition Pipeline & Integrity Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

env:
  NODE_VERSION: "24"

jobs:
  build-and-test-composer:
    name: Build & Test Subgraph Composer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Install dependencies (Workspace)
        run: pnpm install --frozen-lockfile

      - name: Run Composer Tests (Unit)
        run: pnpm --filter subgraph-composer test

      - name: Build Composer App
        run: pnpm --filter subgraph-composer build

  supergraph-integrity-check:
    name: Supergraph Generation Integrity
    runs-on: ubuntu-latest
    needs: [build-and-test-composer]
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Supergraph from Examples
        run: |
          cd converters/cli
          pnpm tsx src/scripts/validate-graphql.ts --federation

      - name: Composition & Schema Drift Validation
        run: |
          node scripts/validate-composition-drift.js
