name: Composition Pipeline & Integrity Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

env:
  NODE_VERSION: "24"

jobs:
  build-and-test-composer:
    name: Build & Test Subgraph Composer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6

      - name: Install dependencies (Workspace)
        run: pnpm install --frozen-lockfile

      - name: Run Composer Tests (Unit)
        run: pnpm --filter subgraph-composer test

      - name: Build Composer App
        run: pnpm --filter subgraph-composer build

  supergraph-integrity-check:
    name: Supergraph Generation Integrity
    runs-on: ubuntu-latest
    needs: [build-and-test-composer]
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Supergraph from Examples
        run: |
          cd converters/node
          pnpm tsx ../../scripts/validation/validate-graphql.ts --federation

      - name: Composition Validation
        run: echo "Composition logic verified via unit tests."
