# Codecov configuration
codecov:
  notify:
    wait_for_ci: yes

coverage:
  precision: 2
  round: down
  range: "70...100"
  status:
    project:
      default:
        target: 80% # aim for 80% coverage
        threshold: 1% # allow 1% drop
      node:
        target: 80%
        flags:
          - node-converter
      rust:
        target: 70%
        flags:
          - rust-converter
    patch:
      default:
        target: auto
        threshold: 0%

parsers:
  gcov:
    branch_detection:
      conditional: yes
      loop: yes
      macro: no
      method: no

comment:
  layout: "header, diff, flags, files"
  behavior: default
  require_changes: no
