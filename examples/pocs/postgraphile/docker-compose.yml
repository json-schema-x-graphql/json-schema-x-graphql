version: "3.8"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: localdb
    ports:
      - "5442:5432"
    volumes:
      - ./init:/docker-entrypoint-initdb.d:ro

  postgraphile:
    build: .
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/localdb
    # Use explicit host and = form for port to avoid CLI parsing issues in some images
    # Expose both public and unified_model schemas so the demo tables/views are available
    # Mount generated-schemas and plugins (plugin reads supergraph SDL)
    volumes:
      - ../../../generated-schemas:/srv/generated-schemas:ro
      - ./plugins:/postgraphile/plugins:ro
    entrypoint: ["node", "/postgraphile/server.js"]
    ports:
      - "5000:5000"
    restart: on-failure
