services:
  # SQLite Database (shared volume - unused but kept for volume def)
  db-init:
    image: alpine:latest
    volumes:
      - mock-data:/data
    command: sh -c "touch /data/mock-data.db && chmod 666 /data/mock-data.db"

  # FPDS Mock Service
  fpds-mock:
    build:
      context: .
      dockerfile: Dockerfile.mock
      args:
        BUILD_ENV: ${BUILD_ENV:-PRODUCTION}
    container_name: petrified-fpds-mock
    environment:
      - PORT=4001
      - SYSTEM=fpds
      - NODE_ENV=development
    volumes:
      - ../../../generated-schemas:/workspace/generated-schemas:ro
      - ./seed-data:/workspace/seed-data:ro
      - ./mockforge.config.js:/workspace/mockforge.config.js:ro
      - mock-data:/workspace/data
    ports:
      - "4001:4001"
    depends_on:
      - db-init
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4001/graphql"]
      interval: 10s
      timeout: 5s
      retries: 3

  # USAspending Mock Service
  usaspending-mock:
    build:
      context: .
      dockerfile: Dockerfile.mock
      args:
        BUILD_ENV: ${BUILD_ENV:-PRODUCTION}
    container_name: petrified-usaspending-mock
    environment:
      - PORT=4002
      - SYSTEM=usaspending
      - NODE_ENV=development
    volumes:
      - ../../../generated-schemas:/workspace/generated-schemas:ro
      - ./seed-data:/workspace/seed-data:ro
      - ./mockforge.config.js:/workspace/mockforge.config.js:ro
      - mock-data:/workspace/data
    ports:
      - "4002:4002"
    depends_on:
      - db-init
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4002/graphql"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ASSIST Mock Service
  assist-mock:
    build:
      context: .
      dockerfile: Dockerfile.mock
      args:
        BUILD_ENV: ${BUILD_ENV:-PRODUCTION}
    container_name: petrified-assist-mock
    environment:
      - PORT=4003
      - SYSTEM=assist
      - NODE_ENV=development
    volumes:
      - ../../../generated-schemas:/workspace/generated-schemas:ro
      - ./seed-data:/workspace/seed-data:ro
      - ./mockforge.config.js:/workspace/mockforge.config.js:ro
      - mock-data:/workspace/data
    ports:
      - "4003:4003"
    depends_on:
      - db-init
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4003/graphql"]
      interval: 10s
      timeout: 5s
      retries: 3

  # EASI Mock Service
  easi-mock:
    build:
      context: .
      dockerfile: Dockerfile.mock
      args:
        BUILD_ENV: ${BUILD_ENV:-PRODUCTION}
    container_name: petrified-easi-mock
    environment:
      - PORT=4004
      - SYSTEM=easi
      - NODE_ENV=development
    volumes:
      - ../../../generated-schemas:/workspace/generated-schemas:ro
      - ./seed-data:/workspace/seed-data:ro
      - ./mockforge.config.js:/workspace/mockforge.config.js:ro
      - mock-data:/workspace/data
    ports:
      - "4004:4004"
    depends_on:
      - db-init
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4004/graphql"]
      interval: 10s
      timeout: 5s
      retries: 3

  # CALM Mock Service
  calm-mock:
    build:
      context: .
      dockerfile: Dockerfile.mock
      args:
        BUILD_ENV: ${BUILD_ENV:-PRODUCTION}
    container_name: petrified-calm-mock
    environment:
      - PORT=4005
      - SYSTEM=calm
      - NODE_ENV=development
    volumes:
      - ../../../generated-schemas:/workspace/generated-schemas:ro
      - ./seed-data:/workspace/seed-data:ro
      - ./mockforge.config.js:/workspace/mockforge.config.js:ro
      - mock-data:/workspace/data
    ports:
      - "4005:4005"
    depends_on:
      - db-init
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4005/graphql"]
      interval: 10s
      timeout: 5s
      retries: 3

  # GraphQL Mesh Gateway
  mesh:
    build:
      context: .
      dockerfile: Dockerfile.mesh
      args:
        BUILD_ENV: ${BUILD_ENV:-PRODUCTION}
    container_name: petrified-mesh-gateway
    environment:
      - NODE_ENV=development
    volumes:
      - ./.meshrc.yaml:/workspace/.meshrc.yaml:ro
      - ../../../generated-schemas:/workspace/generated-schemas:ro
    ports:
      - "5050:5050"
    depends_on:
      - fpds-mock
      - usaspending-mock
      - assist-mock
      - easi-mock
      - calm-mock
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5050/graphql"]
      interval: 10s
      timeout: 5s
      retries: 3

  # GraphQL Hive Gateway (The Guild's federation gateway)
  hive-gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
      args:
        BUILD_ENV: ${BUILD_ENV:-PRODUCTION}
    container_name: petrified-hive-gateway
    environment:
      - NODE_ENV=development
      - PORT=5100
    volumes:
      - ./gateway.config.ts:/workspace/gateway.config.ts:ro
      - ../../../generated-schemas:/workspace/generated-schemas:ro
    ports:
      - "5100:5100"
    depends_on:
      fpds-mock:
        condition: service_healthy
      usaspending-mock:
        condition: service_healthy
      assist-mock:
        condition: service_healthy
      easi-mock:
        condition: service_healthy
      calm-mock:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5100/graphql?query=%7B__typename%7D"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  mock-data:
    driver: local

networks:
  default:
    name: petrified-mock-network
