# GraphQL Mesh Configuration
# Federation-aware data source integration for Petrified Forest

sources:
  # FPDS Mock Source
  - name: fpds
    handler:
      graphql:
        endpoint: http://localhost:4001/graphql
        operationHeaders:
          X-Source-System: FPDS

  # USAspending Mock Source
  - name: usaspending
    handler:
      graphql:
        endpoint: http://localhost:4002/graphql
        operationHeaders:
          X-Source-System: USAspending

  # ASSIST Mock Source
  - name: assist
    handler:
      graphql:
        endpoint: http://localhost:4003/graphql
        operationHeaders:
          X-Source-System: ASSIST

  # EASI Mock Source
  - name: easi
    handler:
      graphql:
        endpoint: http://localhost:4004/graphql
        operationHeaders:
          X-Source-System: EASI

  # CALM Mock Source
  - name: calm
    handler:
      graphql:
        endpoint: http://localhost:4005/graphql
        operationHeaders:
          X-Source-System: CALM

# Server configuration
serve:
  port: 5052
  endpoint: /graphql
  cors:
    origin: '*'
    credentials: true
