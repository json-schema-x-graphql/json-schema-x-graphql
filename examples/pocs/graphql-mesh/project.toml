# Cloud Native Buildpack configuration (project.toml)
# For use with `pack build` command

[_]
schema-version = "0.2"

[io.buildpacks]
include = [
  "package.json",
  "pnpm-lock.yaml",
  ".meshrc.yaml",
  "schemas/",
  "mocks/",
  "src/"
]

[[io.buildpacks.group]]
id = "paketo-buildpacks/nodejs"
version = "3.0.0"

[io.buildpacks.build]
include = [
  "package.json",
  "pnpm-lock.yaml",
  ".meshrc.yaml"
]

[[io.buildpacks.build.env]]
name = "BP_NODE_VERSION"
value = "18.*"

[[io.buildpacks.build.env]]
name = "BP_NODE_RUN_SCRIPTS"
value = "build"

[[io.buildpacks.build.env]]
name = "NODE_ENV"
value = "production"
