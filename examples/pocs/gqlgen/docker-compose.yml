version: '3.8'

services:
  # gqlgen GraphQL server
  gqlgen:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - GO_ENV=development
      - ENABLE_MOCKS=true
      - DATABRICKS_BASE_URL=http://mock-api:3000
      - DATABRICKS_TOKEN=${DATABRICKS_TOKEN:-dev-token}
      - GRAPHQL_PLAYGROUND=true
    volumes:
      - .:/app
      - /app/bin
    depends_on:
      - mock-api
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - schema_unification

  # Mock REST API (json-server)
  mock-api:
    image: clue/json-server:latest
    ports:
      - "3000:3000"
    volumes:
      - ./mocks:/data:ro
    command: --watch /data/db.json --host 0.0.0.0 --port 3000
    networks:
      - schema_unification

networks:
  schema_unification:
    driver: bridge
