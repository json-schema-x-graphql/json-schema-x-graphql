type Query {
  """
  Fetch a single solicitation record
  """
  solicitation: Solicitation

  """
  Fetch a single requisition record
  """
  requisition: Requisition

  """
  List query for solicitation records (non-paginated snapshot)
  """
  solicitations(limit: Int = 50): [Solicitation!]!

  """
  List query for requisition records (non-paginated snapshot)
  """
  requisitions(limit: Int = 50): [Requisition!]!
}
