# Apollo Federation Supergraph Configuration
# This file defines the subgraphs that compose the apollo-classic federated graph

federation_version: =2.3
subgraphs:
  users:
    routing_url: http://localhost:4001/graphql
    schema:
      file: ../../output/federation/node/apollo-classic-users.graphql

  products:
    routing_url: http://localhost:4002/graphql
    schema:
      file: ../../output/federation/node/apollo-classic-products.graphql

  reviews:
    routing_url: http://localhost:4003/graphql
    schema:
      file: ../../output/federation/node/apollo-classic-reviews.graphql
